// RECOMMENDATIONS TAB — التوصيات الطبية
// ══════════════════════════════════════════════════
function RecommendationsTab({patient, settings}){
  const {updatePatient} = useClinic();
  const [items, setItems] = useState(patient.recommendations || []);
  const [newItem, setNewItem] = useState('');
  const [editIdx, setEditIdx] = useState(null);
  const [editVal, setEditVal] = useState('');
  const [sendModal, setSendModal] = useState(false);
  const [therapistNote, setTherapistNote] = useState('');
  const [copyDone, setCopyDone] = useState(false);

  const save = (newItems) => {
    setItems(newItems);
    updatePatient(patient.id, {...patient, recommendations: newItems});
  };

  const addItem = () => {
    if(!newItem.trim()) return;
    const updated = [...items, newItem.trim()];
    save(updated);
    setNewItem('');
  };

  const removeItem = (idx) => {
    const updated = items.filter((_,i)=>i!==idx);
    save(updated);
  };

  const startEdit = (idx) => {
    setEditIdx(idx);
    setEditVal(items[idx]);
  };

  const saveEdit = () => {
    if(!editVal.trim()) return;
    const updated = items.map((item,i)=>i===editIdx?editVal.trim():item);
    save(updated);
    setEditIdx(null);
  };

  const moveItem = (idx, dir) => {
    const updated = [...items];
    const target = idx + dir;
    if(target < 0 || target >= updated.length) return;
    [updated[idx], updated[target]] = [updated[target], updated[idx]];
    save(updated);
  };

  const quickRecs = [
    'تجنب الجلوس أكثر من 30 دقيقة متواصلة',
    'ضع وسادة خلف الظهر عند الجلوس',
    'نم على جانبك مع وسادة بين الركبتين',
    'تجنب رفع الأشياء الثقيلة',
    'طبّق الثلج 15 دقيقة 3 مرات يومياً',
    'طبّق الحرارة قبل التمارين',
    'نفّذ تمارينك المنزلية يومياً صباحاً',
    'تجنب النوم على بطنك',
    'ارتدِ حذاءً داعماً للقوس',
    'تجنب الوقوف الطويل على أرضية صلبة',
    'اشرب 8 أكواب ماء يومياً',
    'تجنب السكر والأطعمة المصنعة لتقليل الالتهاب',
  ];

  const doCopy = () => {
    const msg = window.MOTION_SEND.build('recommendations', {
      patientName: patient.name,
      items,
      therapistNotes: therapistNote,
    }, settings);
    window.MOTION_SEND.copy(msg).then(()=>{
      setCopyDone(true);
      setTimeout(()=>setCopyDone(false), 2500);
    });
  };

  const doPrint = () => {
    window.MOTION_SEND.print('recommendations', {
      patientName: patient.name,
      diagnosis: patient.notes || '',
      items,
      therapistNotes: therapistNote,
    }, settings);
  };

  return(
    <div>
      <div className="card" style={{marginBottom:16}}>
        <div className="card-header">
          <h3>📋 التوصيات الطبية — {patient.name}</h3>
          {items.length>0&&(
            <button className="btn btn-accent btn-sm" onClick={()=>setSendModal(true)}>
              📤 إرسال للمريض
            </button>
          )}
        </div>
        <div className="card-body">
          {/* Quick add */}
          <div style={{display:'flex',gap:8,marginBottom:16}}>
            <input
              className="input"
              style={{flex:1}}
              value={newItem}
              onChange={e=>setNewItem(e.target.value)}
              placeholder="اكتب توصية جديدة..."
              onKeyDown={e=>e.key==='Enter'&&addItem()}
            />
            <button className="btn btn-primary" onClick={addItem}>+ إضافة</button>
          </div>

          {/* Quick picks */}
          <div style={{marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:700,color:'var(--text-light)',marginBottom:8}}>توصيات شائعة — اضغط لإضافة:</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
              {quickRecs.map((r,i)=>(
                <button key={i}
                  className="btn btn-ghost btn-xs"
                  style={{fontSize:11,padding:'4px 10px',textAlign:'right'}}
                  onClick={()=>{
                    if(!items.includes(r)){save([...items,r]);}
                  }}
                  disabled={items.includes(r)}
                >{items.includes(r)?'✓ ':''}{r}</button>
              ))}
            </div>
          </div>

          {/* Items list */}
          {items.length===0?(
            <div className="empty-state" style={{padding:'32px 20px'}}>
              <div className="icon">📋</div>
              <h3>لا توجد توصيات بعد</h3>
              <p>أضف توصيات من الحقل أعلاه أو من القائمة السريعة</p>
            </div>
          ):(
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {items.map((item,idx)=>(
                <div key={idx} style={{
                  display:'flex',alignItems:'center',gap:10,
                  padding:'10px 14px',
                  background:'var(--surface)',borderRadius:10,
                  border:'1px solid var(--border)',
                  borderRight:'4px solid var(--primary)',
                }}>
                  <div style={{
                    width:26,height:26,borderRadius:8,
                    background:'var(--primary)',color:'#fff',
                    display:'flex',alignItems:'center',justifyContent:'center',
                    fontSize:12,fontWeight:900,flexShrink:0
                  }}>{idx+1}</div>

                  {editIdx===idx?(
                    <input
                      className="input"
                      style={{flex:1,fontSize:13}}
                      value={editVal}
                      onChange={e=>setEditVal(e.target.value)}
                      onKeyDown={e=>{if(e.key==='Enter')saveEdit();if(e.key==='Escape')setEditIdx(null);}}
                      autoFocus
                    />
                  ):(
                    <span style={{flex:1,fontSize:13,color:'var(--text-dark)'}}>{item}</span>
                  )}

                  <div style={{display:'flex',gap:4,flexShrink:0}}>
                    {editIdx===idx?(
                      <>
                        <button className="btn btn-sm btn-primary" onClick={saveEdit}>✓</button>
                        <button className="btn btn-sm btn-ghost" onClick={()=>setEditIdx(null)}>✕</button>
                      </>
                    ):(
                      <>
                        <button className="row-action-btn" onClick={()=>moveItem(idx,-1)} disabled={idx===0}>↑</button>
                        <button className="row-action-btn" onClick={()=>moveItem(idx,1)} disabled={idx===items.length-1}>↓</button>
                        <button className="row-action-btn" onClick={()=>startEdit(idx)}>✏️</button>
                        <button className="row-action-btn danger" onClick={()=>removeItem(idx)}>🗑</button>
                      </>
                    )}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* Send Modal */}
      {sendModal&&(
        <div className="modal-overlay" onClick={()=>setSendModal(false)}>
          <div className="modal modal-lg" onClick={e=>e.stopPropagation()} style={{maxWidth:640}}>
            <div className="modal-header" style={{background:'linear-gradient(135deg,var(--primary),var(--teal))'}}>
              <h2 style={{color:'#fff'}}>📤 إرسال التوصيات للمريض</h2>
              <button className="modal-close" onClick={()=>setSendModal(false)} style={{background:'rgba(255,255,255,0.15)',color:'#fff'}}>✕</button>
            </div>
            <div className="modal-body">
              {/* Preview */}
              <div style={{
                background:'linear-gradient(135deg,#0f2d4a,#1a4a6e)',
                borderRadius:'var(--radius)',padding:20,color:'#fff',marginBottom:16
              }}>
                <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14}}>
                  <div style={{width:40,height:40,borderRadius:12,background:'linear-gradient(135deg,var(--accent),#f59e0b)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>🏥</div>
                  <div>
                    <div style={{fontWeight:900,fontSize:15}}>{settings?.clinicName||'Motion Clinic'}</div>
                    <div style={{fontSize:11,opacity:0.6}}>عيادة الحركة — دمشق</div>
                  </div>
                </div>
                <div style={{background:'rgba(255,255,255,0.1)',borderRadius:8,padding:'8px 12px',marginBottom:12,fontSize:13,fontWeight:700}}>
                  👤 {patient.name} — 📋 التوصيات الطبية
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:6,maxHeight:200,overflowY:'auto'}}>
                  {items.map((item,i)=>(
                    <div key={i} style={{
                      display:'flex',alignItems:'center',gap:8,
                      background:'rgba(255,255,255,0.08)',borderRadius:7,
                      padding:'7px 12px',borderRight:'3px solid #06b6d4'
                    }}>
                      <span style={{
                        width:20,height:20,borderRadius:5,
                        background:'rgba(255,255,255,0.15)',
                        display:'flex',alignItems:'center',justifyContent:'center',
                        fontSize:10,fontWeight:900,flexShrink:0
                      }}>{i+1}</span>
                      <span style={{fontSize:12}}>{item}</span>
                    </div>
                  ))}
                </div>
              </div>

              {/* Therapist note */}
              <div className="form-group">
                <label className="form-label">ملاحظة إضافية من المعالج</label>
                <textarea className="input" style={{minHeight:60,resize:'vertical'}}
                  value={therapistNote} onChange={e=>setTherapistNote(e.target.value)}
                  placeholder="مثال: راجعنا بعد أسبوعين للتقييم..."/>
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-ghost" onClick={()=>setSendModal(false)}>إغلاق</button>
              <div style={{flex:1}}/>
              <button className="btn btn-secondary" onClick={doPrint}>🖨️ طباعة PDF</button>
              <button className="btn btn-accent" onClick={doCopy} style={{background:'#059669'}}>
                {copyDone?'✅ تم النسخ!':'📱 نسخ للواتساب'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// INBODY PATIENT TAB — Progress Analytics
// ══════════════════════════════════════════════════
function InBodyPatientTab({patientId, patIb, openModal, deleteInbody, settings}){
  const first = patIb[0];
  const last = patIb[patIb.length-1];
  const delta = (curr,prev,lowerBetter=false)=>{
    if(prev==null||curr==null) return null;
    const d = +(curr-prev).toFixed(2);
    return {d, pos: lowerBetter?d<0:d>0, zero:d===0};
  };

  const DeltaCell = ({curr,prev,lowerBetter=false,unit=''})=>{
    if(prev==null||curr==null) return <span>—</span>;
    const r = delta(curr,prev,lowerBetter);
    if(!r) return <span>{curr}{unit}</span>;
    return(
      <span>
        {curr}{unit} {' '}
        <span className={r.zero?'delta-zero':r.pos?'delta-pos':'delta-neg'}>
          ({r.d>0?'+':''}{r.d}{unit})
        </span>
      </span>
    );
  };

  const exportIBPDF = async () => {
    const el = document.getElementById('inbody-pdf-area');
    if(el) await exportToPDF(el, `InBody_${patientId}_Report.pdf`);
  };

  return(
    <div>
      <div className="card">
        <div className="card-header">
          <h3>⚖️ قياسات InBody ({patIb.length})</h3>
          <div style={{display:'flex',gap:8}}>
            {patIb.length>0&&<button className="btn btn-sm btn-outline" onClick={exportIBPDF}>📄 تقرير PDF</button>}
            <button className="btn btn-accent btn-sm" onClick={()=>openModal('inbody',null)}>+ قياس جديد</button>
          </div>
        </div>
        {patIb.length===0?(
          <div className="empty-state"><div className="icon">⚖️</div><h3>لا قياسات InBody</h3><p>أضف أول قياس للمريض</p></div>
        ):(
          <div id="inbody-pdf-area">
            {first&&last&&patIb.length>1&&(
              <div className="card-body">
                <div style={{fontWeight:700,fontSize:14,marginBottom:12,color:'var(--primary)'}}>📈 تحليل التطور — أول قياس vs آخر قياس</div>
                <div className="grid-4" style={{gap:10}}>
                  {[
                    ['الوزن','weight','kg',true],['الدهون (%)','bodyFat','%',true],
                    ['كتلة العضلات','smi','kg',false],['BMI','bmi','',true],
                    ['نقاط InBody','score','',false],['الدهون الحشوية','visceralFat','',true],
                  ].map(([l,k,u,lb])=>(
                    <div key={k} style={{padding:'12px 14px',background:'var(--surface)',borderRadius:10,textAlign:'center'}}>
                      <div style={{fontSize:11,color:'var(--text-light)',fontWeight:700,marginBottom:6}}>{l}</div>
                      <div style={{fontSize:15,fontWeight:900}}>
                        <DeltaCell curr={last[k]} prev={first[k]} lowerBetter={lb} unit={u}/>
                      </div>
                      <div style={{fontSize:11,color:'var(--text-xlight)',marginTop:4}}>البداية: {first[k]}{u}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
            <table className="data-table">
              <thead><tr><th>التاريخ</th><th>الوزن</th><th>العضلات</th><th>الدهون%</th><th>BMI</th><th>الماء%</th><th>BMR</th><th>دهون حشوية</th><th>النقاط</th><th>إجراءات</th></tr></thead>
              <tbody>
                {patIb.map((ib,idx)=>{
                  const prev = idx>0?patIb[idx-1]:null;
                  return(
                    <tr key={ib.id}>
                      <td><strong>{ib.date}</strong></td>
                      <td>{ib.weight} <DeltaCell curr={ib.weight} prev={prev?.weight} lowerBetter unit="kg"/></td>
                      <td>{ib.smi}</td>
                      <td><DeltaCell curr={ib.bodyFat} prev={prev?.bodyFat} lowerBetter unit="%"/></td>
                      <td>{ib.bmi}</td>
                      <td>{ib.water}%</td>
                      <td>{ib.bmr}</td>
                      <td>{ib.visceralFat}</td>
                      <td><span className={`badge ${ib.score>=75?'badge-green':ib.score>=60?'badge-yellow':'badge-red'}`}>{ib.score}</span></td>
                      <td><div className="row-actions">
                        <button className="row-action-btn" onClick={()=>openModal('inbody',ib)}>✏️</button>
                        <button className="row-action-btn danger" onClick={()=>{if(confirm('حذف القياس؟'))deleteInbody(ib.id);}}>🗑</button>
                      </div></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
            {patIb.map(ib=>ib.notes?(
              <div key={ib.id+'-n'} style={{padding:'6px 14px 6px',fontSize:12,color:'var(--text-light)'}}>{ib.date}: {ib.notes}</div>
            ):null)}
          </div>
        )}
      </div>
    </div>
  );
}

// MEDICAL RECORD MODAL — 4-Step Assessment
// ══════════════════════════════════════════════════
function RecordModal({patientId,record,onClose}){
  const {addRecord,updateRecord,categories,settings} = useClinic();
  const isEdit = !!record;
  const [step,setStep] = useState(1);
  const [form,setForm] = useState(record||{
    patientId, date:today(), complaint:'', diagnosis:'', vas:5,
    painLocation:'', duration:'', sessions:'', frequency:'',
    techniques:[], goals:[], therapistName:settings.therapistName,
    status:'قيد التنفيذ', positiveTests:[], meds:'no', surgery:'no',
    impact:{sleep:'no',work:'no',sport:'no',walk:'no'},
    historyNotes:'', posture:'طبيعية', gait:'طبيعية',
    nextReview:'', therapistNotes:'', romNotes:'', mmtNotes:'',
    chronicConditions:[], medications:'',
  });
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));
  const tg=(key,id)=>f(key,form[key].includes(id)?form[key].filter(x=>x!==id):[...form[key],id]);

  const [aiBusy,setAiBusy] = useState(false);
  const [aiText,setAiText] = useState('');
  const suggestPlan = async () => {
    if(!form.diagnosis){ alert('أدخل التشخيص أولاً في الخطوة الأولى.'); return; }
    setAiBusy(true); setAiText('');
    const techLabels = (form.techniques||[]).map(id=>(categories.techniques.find(t=>t.id===id)||{}).label).filter(Boolean).join('، ');
    const goalLabels = (form.goals||[]).map(id=>(categories.goals.find(g=>g.id===id)||{}).label).filter(Boolean).join('، ');
    const prompt = `أنت أخصائي علاج طبيعي وتأهيل خبير. اقترح خطة علاجية مهنية موجزة ومنظّمة بالعربية بناءً على هذا التقييم:
- التشخيص: ${form.diagnosis}
- الشكوى: ${form.complaint||'—'}
- شدة الألم VAS: ${form.vas}/10
- موقع الألم: ${form.painLocation||'—'} | مدة الشكوى: ${form.duration||'—'}
- الوضعية: ${form.posture||'—'} | المشي: ${form.gait||'—'}
- مدى الحركة (ROM): ${form.romNotes||'—'}
- قوة العضلات (MMT): ${form.mmtNotes||'—'}
- الأدوية: ${form.medications||'لا'}
- التقنيات المختارة: ${techLabels||'—'} | الأهداف: ${goalLabels||'—'}

أعطني:
1. عدد الجلسات المقترح والتكرار الأسبوعي.
2. مراحل العلاج (المرحلة الحادة/التأهيلية/الوظيفية) باختصار.
3. أهم 4-6 تقنيات/تمارين مناسبة.
4. علامات تحذيرية تستدعي مراجعة طبية.
كن مختصراً وعملياً. اختم بـ: "هذا اقتراح — القرار النهائي للمعالج".`;
    try{
      const txt = await callAI(prompt, {max_tokens:1500});
      setAiText(txt);
    }catch(e){
      setAiText(e.message==='NO_KEY' ? '⚠️ لا يوجد مفتاح ذكاء اصطناعي. اذهب للإعدادات ← 🤖 الذكاء الاصطناعي.' : '❌ خطأ: '+e.message);
    }
    setAiBusy(false);
  };

  const STEPS = [[1,'الشكوى والتشخيص'],[2,'التاريخ المرضي'],[3,'الفحص السريري'],[4,'الخطة العلاجية']];

  const save = () => {
    if(!form.complaint||!form.diagnosis){alert('الشكوى والتشخيص مطلوبان');return;}
    if(isEdit) updateRecord(record.id,form); else addRecord({...form,id:nextId('REC')});
    onClose();
  };

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal modal-xl" onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <h2>{isEdit?'✏️ تعديل السجل الطبي':'🏥 إضافة سجل طبي — التقييم الشامل'}</h2>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-steps">
          {STEPS.map(([n,l])=>(
            <div key={n} className={`step-item ${step===n?'active':step>n?'done':''}`} onClick={()=>setStep(n)}>
              <span className="step-num">{step>n?'✓':n}</span>{l}
            </div>
          ))}
        </div>
        <div className="modal-body">
          {step===1&&(
            <div>
              <div className="form-row">
                <TF label="تاريخ التقييم" type="date" value={form.date} onChange={v=>f('date',v)}/>
                <SF label="مدة الشكوى" value={form.duration} onChange={v=>f('duration',v)} options={['','أقل من أسبوع','أسبوع - شهر','1-3 أشهر','3-6 أشهر','أكثر من 6 أشهر']}/>
              </div>
              <TA label="الشكوى الرئيسية *" value={form.complaint} onChange={v=>f('complaint',v)} placeholder="وصف تفصيلي للشكوى..."/>
              <TF label="التشخيص *" value={form.diagnosis} onChange={v=>f('diagnosis',v)} placeholder="مثال: انزلاق غضروفي L4-L5"/>
              <Field label={`شدة الألم (VAS): ${form.vas}/10`}>
                <VASSlider value={form.vas} onChange={v=>f('vas',v)}/>
              </Field>
              <Field label="موقع الألم">
                <div className="tag-list">
                  {categories.painLocations.map(l=>(
                    <button key={l.id} type="button" className={`tag-pick ${form.painLocation===l.label?'active':''}`} onClick={()=>f('painLocation',l.label)}>{l.label}</button>
                  ))}
                </div>
              </Field>
            </div>
          )}
          {step===2&&(
            <div>
              <div className="form-row">
                <SF label="هل يتناول أدوية؟" value={form.meds} onChange={v=>f('meds',v)} options={[{value:'no',label:'لا'},{value:'yes',label:'نعم'}]}/>
                <SF label="عمليات جراحية سابقة؟" value={form.surgery} onChange={v=>f('surgery',v)} options={[{value:'no',label:'لا'},{value:'yes',label:'نعم'}]}/>
              </div>
              {form.meds==='yes'&&<TF label="اسم الأدوية" value={form.medications} onChange={v=>f('medications',v)} placeholder="اذكر الأدوية الحالية..."/>}
              <Field label="تأثير الحالة على الأنشطة">
                <div className="form-row-4">
                  {[['sleep','النوم'],['work','العمل'],['sport','الرياضة'],['walk','المشي']].map(([k,l])=>(
                    <SF key={k} label={l} value={form.impact[k]} onChange={v=>f('impact',{...form.impact,[k]:v})} options={[{value:'no',label:'لا تأثير'},{value:'yes',label:'متأثر'}]}/>
                  ))}
                </div>
              </Field>
              <TA label="ملاحظات على التاريخ المرضي" value={form.historyNotes} onChange={v=>f('historyNotes',v)} placeholder="حالات مزمنة، إصابات قديمة..."/>
              <Field label="الاختبارات الخاصة (Special Tests) — إيجابية">
                <div className="tag-list">
                  {categories.specialTests.map(t=>(
                    <button key={t.id} type="button" className={`tag-pick ${form.positiveTests.includes(t.id)?'active':''}`} onClick={()=>tg('positiveTests',t.id)}>{t.label}</button>
                  ))}
                </div>
              </Field>
            </div>
          )}
          {step===3&&(
            <div>
              <div className="form-row">
                <SF label="الوضعية (Posture)" value={form.posture} onChange={v=>f('posture',v)} options={['طبيعية','انحناء أمامي','تحدب علوي','ميل جانبي','خلل عام']}/>
                <SF label="نمط المشي (Gait)" value={form.gait} onChange={v=>f('gait',v)} options={['طبيعية','خفيف انحراف','عرج','صعوبة شديدة']}/>
              </div>
              <TA label="ملاحظات مدى الحركة (ROM)" value={form.romNotes} onChange={v=>f('romNotes',v)} placeholder="مثال: ثني الركبة: يمين 130° يسار 140°..." rows={3}/>
              <TA label="ملاحظات قوة العضلات (MMT)" value={form.mmtNotes} onChange={v=>f('mmtNotes',v)} placeholder="مثال: عضلة الرباعية 4/5، الهامسترينج 3/5..." rows={3}/>
              <TA label="ملاحظات الفحص السريري العامة" value={form.therapistNotes} onChange={v=>f('therapistNotes',v)} placeholder="ملاحظات إضافية للمعالج..." rows={3}/>
            </div>
          )}
          {step===4&&(
            <div>
              <div style={{marginBottom:14,padding:'12px 14px',background:'var(--primary-bg)',border:'1px solid var(--primary-pale)',borderRadius:10}}>
                <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
                  <button type="button" className="btn btn-primary btn-sm" onClick={suggestPlan} disabled={aiBusy}>
                    {aiBusy?'🤖 جاري التحليل...':'🤖 اقترح خطة علاجية بالذكاء الاصطناعي'}
                  </button>
                  <span style={{fontSize:12,color:'var(--text-light)'}}>بناءً على التشخيص والفحص المُدخل</span>
                </div>
                {aiText&&(
                  <div style={{marginTop:12}}>
                    <div style={{whiteSpace:'pre-wrap',fontSize:13,lineHeight:1.8,color:'var(--text-dark)',background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,padding:'12px 14px',maxHeight:260,overflowY:'auto'}}>{aiText}</div>
                    <button type="button" className="btn btn-outline btn-sm" style={{marginTop:8}} onClick={()=>{f('therapistNotes',(form.therapistNotes?form.therapistNotes+'\n\n':'')+aiText);alert('تم إدراج الاقتراح في ملاحظات الفحص (الخطوة 3).');}}>⬇️ إدراج في ملاحظات السجل</button>
                  </div>
                )}
              </div>
              <div className="form-row">
                <TF label="عدد الجلسات المقترحة" value={form.sessions} onChange={v=>f('sessions',v)} placeholder="مثال: 12"/>

// SESSION MODAL — متابعة الجلسات
// ══════════════════════════════════════════════════
function SessionModal({patientId, patient, session, onClose}){
  const {addSession, updateSession, categories, settings} = useClinic();
  const isEdit = !!session;
  const [form,setForm] = useState(session||{
    patientId, date:today(), type:'جلسة علاجية',
    techniques:[], duration:60, vasStart:5, vasEnd:3,
    therapistName:settings.therapistName, notes:'', hep:'',
    paid:0, status:'completed',
  });
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));
  const tg=(id)=>f('techniques',form.techniques.includes(id)?form.techniques.filter(x=>x!==id):[...form.techniques,id]);

  const [aiBusy,setAiBusy] = useState(false);
  const suggestHEP = async () => {
    setAiBusy(true);
    const techLabels = (form.techniques||[]).map(id=>(categories.techniques.find(t=>t.id===id)||{}).label).filter(Boolean).join('، ');
    const diag = patient?.diagnosis || patient?.lastDiagnosis || '';
    const prompt = `أنت أخصائي علاج طبيعي. اكتب برنامج تمارين منزلية (HEP) موجزاً وواضحاً بالعربية للمريض ${patient?.name||''}.
المعطيات: نوع الجلسة ${form.type}، التقنيات المستخدمة: ${techLabels||'—'}، الألم قبل ${form.vasStart}/10 وبعد ${form.vasEnd}/10${diag?'، التشخيص: '+diag:''}.
اكتب 4-6 تمارين بصيغة بسيطة يفهمها المريض: اسم التمرين، عدد التكرارات/المجموعات، وملاحظة أمان قصيرة. بدون مقدمات طويلة.`;
    try{
      const txt = await callAI(prompt, {max_tokens:1200});
      f('hep', (form.hep?form.hep+'\n\n':'')+txt);
    }catch(e){
      alert(e.message==='NO_KEY' ? '⚠️ لا يوجد مفتاح ذكاء اصطناعي. اذهب للإعدادات ← 🤖 الذكاء الاصطناعي.' : '❌ خطأ: '+e.message);
    }
    setAiBusy(false);
  };

  const save=()=>{
    if(isEdit) updateSession(session.id,form); else addSession({...form,id:nextId('SS')});
    onClose();
  };

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal modal-lg" onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <h2>{isEdit?'✏️ تعديل الجلسة':'🔄 تسجيل جلسة متابعة'}</h2>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="form-row">
            <TF label="تاريخ الجلسة" type="date" value={form.date} onChange={v=>f('date',v)}/>
            <SF label="نوع الجلسة" value={form.type} onChange={v=>f('type',v)} options={categories.sessionTypes.map(s=>s.label)}/>
          </div>
          <div className="form-row">
            <TF label="مدة الجلسة (دقيقة)" type="number" value={form.duration} onChange={v=>f('duration',+v)}/>
            <TF label="المعالج" value={form.therapistName} onChange={v=>f('therapistName',v)}/>
          </div>
          <div className="grid-2">
            <Field label={`VAS قبل الجلسة: ${form.vasStart}/10`}>
              <VASSlider value={form.vasStart} onChange={v=>f('vasStart',v)}/>
            </Field>
            <Field label={`VAS بعد الجلسة: ${form.vasEnd}/10`}>
              <VASSlider value={form.vasEnd} onChange={v=>f('vasEnd',v)}/>
            </Field>
          </div>
          <Field label="التقنيات المستخدمة في هذه الجلسة">
            <div className="tag-list">
              {categories.techniques.map(t=>(
                <button key={t.id} type="button" className={`tag-pick ${form.techniques.includes(t.id)?'active':''}`} onClick={()=>tg(t.id)}>{t.label}</button>
              ))}
            </div>
          </Field>
          <TA label="ملاحظات الجلسة" value={form.notes} onChange={v=>f('notes',v)} placeholder="ما تم إنجازه، ردة فعل المريض، ملاحظات مهمة..."/>
          <div style={{display:'flex',justifyContent:'flex-end',marginBottom:-6}}>
            <button type="button" className="btn btn-primary btn-sm" onClick={suggestHEP} disabled={aiBusy}>
              {aiBusy?'🤖 جاري التوليد...':'🤖 توليد تمارين منزلية بالذكاء الاصطناعي'}
            </button>
          </div>
          <TA label="🏠 التمارين المنزلية (HEP)" value={form.hep} onChange={v=>f('hep',v)} placeholder="التمارين المطلوبة من المريض في المنزل..."/>
          <div className="form-row">
            <TF label="المبلغ المدفوع" type="number" value={form.paid} onChange={v=>f('paid',+v)}/>
            <SF label="حالة الجلسة" value={form.status} onChange={v=>f('status',v)} options={['completed','pending','cancelled']}/>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>إلغاء</button>
          <div style={{flex:1}}/>
          <button className="btn btn-accent" onClick={save}>💾 {isEdit?'حفظ التعديلات':'تسجيل الجلسة'}</button>
        </div>
      </div>
    </div>
  );
}

function FinanceModal({patientId, patient, invoice, onClose}){
  const {addFinance, updateFinance, patients, categories, settings} = useClinic();
  const isEdit = !!invoice;
  const [form,setForm] = useState(invoice||{
    patientId:patientId||'', patientName:patient?.name||'',
    date:today(), serviceLabel:'', total:0, discount:0, paid:0, remaining:0,
    status:'معلق', paymentMethod:'كاش', notes:'',
  });
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));

  useEffect(()=>{
    const net = (form.total||0)-(form.discount||0);
    const rem = Math.max(0, net-(form.paid||0));
    const status = form.paid===0?'معلق':rem===0?'مدفوع':'جزئي';
    setForm(p=>({...p, remaining:rem, status}));
  },[form.total, form.discount, form.paid]);

  const save=()=>{
    const p = patients.find(x=>x.id===form.patientId);
    const data={...form, patientName:p?.name||form.patientName};
    if(isEdit) updateFinance(invoice.id,data); else addFinance({...data,id:nextId('INV')});
    onClose();
  };

  const exportInvoicePDF = async () => {
    const el = document.getElementById('invoice-preview');
    if(el) await exportToPDF(el, `Invoice_${form.id||'new'}.pdf`);

          <div className="form-row-3">
            <TF label="المبلغ الكلي" type="number" value={form.total} onChange={v=>f('total',+v)}/>

const NUT_DRUG_DB = [
  {k:['nsaid','مسكن','بروفين','ايبوبروفين','ibuprofen','ديكلوفيناك','voltaren','فولتارين'], tip:'مضادات الالتهاب (NSAIDs): تُؤخذ بعد الأكل لحماية المعدة. أكثِر من أطعمة غنية بأوميغا-3 (سمك، بذر كتان) لتقوية تأثيرها المضاد للالتهاب وتقليل الجرعة.'},
  {k:['paracetamol','باراسيتامول','بنادول','panadol','acetaminophen'], tip:'الباراسيتامول: تجنّب الكحول تماماً. لا تتجاوز 3غ/يوم. تناول كمية كافية من البروتين لدعم الكبد.'},
  {k:['metformin','ميتفورمين','glucophage','غلوكوفاج'], tip:'الميتفورمين: قد يقلل امتصاص فيتامين B12 — راقب مستواه. تناوله مع الوجبة. وزّع الكربوهيدرات على وجبات صغيرة.'},
  {k:['vitamin d','فيتامين د','d3','ديفيت'], tip:'فيتامين D: يُمتص أفضل مع وجبة تحوي دهوناً صحية (زيت زيتون، مكسرات، أفوكادو).'},
  {k:['warfarin','وارفارين','مميع','marevan'], tip:'الوارفارين: حافظ على ثبات كمية الخضار الورقية (سبانخ، بقدونس) لأنها غنية بفيتامين K المؤثر على التمييع — لا تكثر فجأة.'},
  {k:['ace','كابتوبريل','captopril','lisinopril','enalapril','ضغط'], tip:'أدوية الضغط (ACE): انتبه للبوتاسيوم — لا تفرط ببدائل الملح والموز. قلّل ملح الطعام إلى أقل من 5غ/يوم.'},
  {k:['statin','اتورفاستاتين','atorvastatin','رزوفاستاتين','كوليسترول','lipitor'], tip:'الستاتينات (خافضات الكوليسترول): تجنّب عصير الجريب فروت. أضف أوميغا-3 وألياف ذائبة (شوفان، بقوليات).'},
  {k:['ppi','اوميبرازول','omeprazole','نيكسيوم','معدة','ارتجاع'], tip:'أدوية المعدة (PPI): قد تقلل امتصاص الحديد والمغنيسيوم وB12 والكالسيوم — أكثر من مصادرها الطبيعية وتناول الدواء قبل الفطور بنصف ساعة.'},
];
function nutDrugInteractions(text){
  if(!text) return [];
  const low = (''+text).toLowerCase();
  const out = [];
  NUT_DRUG_DB.forEach(d=>{ if(d.k.some(w=>low.includes(w.toLowerCase()))) out.push(d.tip); });
  return out;
}

// — المحرك السريري الغذائي: يحسب كل المؤشرات من بيانات المريض و InBody —
function nutritionEngine(p){
  const w = +p.weight || 0;
  const h = +p.height || 0;
  const age = +p.age || 30;
  const male = p.gender !== 'female' && p.gender !== 'أنثى';
  const hM = h/100;
  const R = {ok:true, alerts:[], notes:[]};
  if(!w || !h){ R.ok=false; return R; }

  // BMI
  R.bmi = +(w/(hM*hM)).toFixed(1);
  R.bmiClass = R.bmi<18.5?'نقص وزن' : R.bmi<25?'وزن طبيعي' : R.bmi<30?'زيادة وزن' : R.bmi<35?'سمنة درجة 1' : R.bmi<40?'سمنة درجة 2':'سمنة مفرطة';
  R.bmiColor = R.bmi<18.5?'#d97706' : R.bmi<25?'#059669' : R.bmi<30?'#d97706':'#dc2626';

  // الوزن المثالي (Devine) + النطاق الصحي
  const inch = h/2.54;
  const over = Math.max(0, inch-60);
  R.idealW = +((male?50:45.5) + 2.3*over).toFixed(1);
  R.healthyMin = +(18.5*hM*hM).toFixed(1);
  R.healthyMax = +(24.9*hM*hM).toFixed(1);
  R.excessW = +Math.max(0, w-R.idealW).toFixed(1);

  // BMR — من InBody إن توفّر وإلا Mifflin-St Jeor
  R.bmr = p.inbodyBMR ? +p.inbodyBMR : Math.round(10*w + 6.25*h - 5*age + (male?5:-161));
  R.bmrSource = p.inbodyBMR ? 'InBody' : 'Mifflin-St Jeor';

  // عامل النشاط + TDEE
  const af = {sedentary:1.2, light:1.375, moderate:1.55, active:1.725}[p.activity] || 1.375;
  R.tdee = Math.round(R.bmr*af);

  // السعرات المستهدفة حسب الهدف (عجز/فائض آمن)
  let target = R.tdee;
  if(p.goal==='fat_loss'){ target = Math.round(R.tdee*0.80); const floor = male?1500:1200; if(target<floor) target=floor; R.deficit = R.tdee-target; }
  else if(p.goal==='muscle_gain'){ target = Math.round(R.tdee + 300); R.surplus = 300; }
  R.targetCal = target;

  // الماكروز (بروتين على أساس الوزن المثالي/الحالي الأقل)
  const baseW = Math.min(w, R.idealW>0?R.idealW:w);
  let protG = Math.round(baseW * (p.goal==='muscle_gain'?2.0 : p.goal==='fat_loss'?1.8 : 1.4));
  const fatG = Math.round((target*0.25)/9);
  let carbG = Math.round((target - (protG*4 + fatG*9))/4);
  if(carbG<50){ carbG=50; }
  R.protein = protG; R.fat = fatG; R.carb = carbG;

  // الماء
  R.water = +(w*0.035).toFixed(1);

  // قراءة InBody
  if(p.bodyFat){
    const bf = +p.bodyFat;
    const hi = male?20:30, vhi = male?25:35;
    R.pbf = bf;
    R.pbfClass = bf<(male?10:18)?'منخفض' : bf<hi?'مثالي' : bf<vhi?'مرتفع':'مرتفع جداً';
    if(bf>=vhi) R.alerts.push('نسبة دهون الجسم مرتفعة جداً ('+bf+'%) — أولوية لخفض الدهون بأمان.');
  }
  if(p.visceralFat){ R.visceral=+p.visceralFat; if(R.visceral>10) R.alerts.push('الدهون الحشوية مرتفعة ('+R.visceral+') — خطر استقلابي، قلّل السكريات والدهون المشبعة.'); }
  if(p.smi){ R.smm=+p.smi; }
  if(p.score){ R.score=+p.score; }

  // الرايات المخبرية
  const labs = [];
  const vitD=+p.vitD, fer=+p.ferritin, fbs=+p.bloodSugar;
  if(p.vitD){ if(vitD<20) labs.push({t:'نقص فيتامين D حاد ('+vitD+') — مكمّل 50,000 وحدة أسبوعياً + تعرّض شمس + سمك دهني',sev:'high'}); else if(vitD<30) labs.push({t:'فيتامين D حدّي ('+vitD+') — مكمّل يومي 1000-2000 وحدة',sev:'mid'}); }
  if(p.ferritin){ if(fer<30) labs.push({t:'مخزون حديد منخفض ('+fer+') — أكثِر من اللحوم الحمراء والعدس والسبانخ مع فيتامين C',sev:'high'}); else if(fer>300) labs.push({t:'فيريتين مرتفع ('+fer+') — قد يشير لالتهاب، يُنصح بالمتابعة',sev:'mid'}); }
  if(p.bloodSugar){ if(fbs>=126) labs.push({t:'سكر صيامي مرتفع ('+fbs+') — مؤشر سكري، تحكّم صارم بالكربوهيدرات',sev:'high'}); else if(fbs>=100) labs.push({t:'سكر صيامي حدّي ('+fbs+') — مرحلة ما قبل السكري، قلّل السكريات البسيطة',sev:'mid'}); }
  R.labs = labs;

  // متلازمة استقلابية (تقدير)
  let metab=0;
  if(R.bmi>=30) metab++;
  if(R.visceral>10) metab++;
  if(fbs>=100) metab++;
  if((p.chronic||[]).includes('hypertension')) metab++;
  if((p.chronic||[]).includes('cholesterol')) metab++;
  if(metab>=3) R.alerts.push('مؤشرات متلازمة استقلابية ('+metab+'/5) — يلزم نظام غذائي علاجي صارم ومتابعة طبية.');
  R.metabScore = metab;

  // تداخلات دوائية
  R.drugTips = nutDrugInteractions(p.medications);

  // مستوى الخطورة العام
  R.risk = R.alerts.length>=2?'مرتفع' : R.alerts.length===1?'متوسط':'منخفض';
  R.riskColor = R.risk==='مرتفع'?'#dc2626':R.risk==='متوسط'?'#d97706':'#059669';

  // أهداف SMART
  const goals=[];
  if(p.goal==='fat_loss' && R.excessW>0) goals.push('خسارة '+Math.min(4, Math.round(R.excessW*0.5))+' كغ خلال 8 أسابيع (0.5 كغ/أسبوع)');
  if(p.goal==='muscle_gain') goals.push('زيادة كتلة عضلية 1-1.5 كغ شهرياً مع تمارين مقاومة 3×/أسبوع');
  goals.push('شرب '+R.water+' لتر ماء يومياً');
  goals.push('تناول '+R.protein+' غ بروتين موزّعة على الوجبات');
  if(vitD && vitD<30) goals.push('رفع فيتامين D فوق 30 خلال 3 أشهر');
  R.smartGoals = goals;

  return R;
}

        ${metric('الماء', a.water+' لتر', 'يومياً')}
        ${metric('الكربوهيدرات', a.carb+' غ', 'يومياً')}
      </div>` : '<p style="color:#888">أدخل الوزن والطول لعرض المؤشرات.</p>';
    const labsBlock = (a.labs && a.labs.length) ? `<div class="sec"><h3>🧪 ملاحظات مخبرية</h3>${a.labs.map(l=>`<div class="alert ${l.sev}">${l.t}</div>`).join('')}</div>` : '';
    const drugBlock = (a.drugTips && a.drugTips.length) ? `<div class="sec"><h3>💊 تنبيهات دوائية غذائية</h3>${a.drugTips.map(t=>`<div class="li">• ${t}</div>`).join('')}</div>` : '';
    const goalsBlock = (a.smartGoals && a.smartGoals.length) ? `<div class="sec"><h3>🎯 أهدافك القادمة</h3>${a.smartGoals.map(g=>`<div class="li">✓ ${g}</div>`).join('')}</div>` : '';
    return `<!DOCTYPE html><html dir="rtl" lang="ar"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>بطاقة التغذية — ${pName}</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:#eef2f5;color:#1e293b;padding:18px;line-height:1.7}
.card{max-width:780px;margin:auto;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,.1)}
.head{background:linear-gradient(135deg,#0B3D5C,#1B7A7E);color:#fff;padding:26px 28px;position:relative}
.head h1{font-size:22px;font-weight:800}
.head .sub{opacity:.9;font-size:13px;margin-top:4px}
.head .pn{margin-top:14px;font-size:18px;font-weight:700;background:rgba(255,255,255,.15);display:inline-block;padding:6px 16px;border-radius:30px}
.body{padding:24px 28px}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:8px}
.metric{background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:14px;text-align:center}
.metric .mv{font-size:22px;font-weight:800;color:#0B3D5C}
.metric .ml{font-size:12px;color:#64748b;margin-top:3px;font-weight:600}
.metric .ms{font-size:11px;color:#1B7A7E;margin-top:2px;font-weight:700}
.sec{margin-top:22px}
.sec h3{font-size:15px;color:#0B3D5C;border-right:4px solid #B8893A;padding-right:10px;margin-bottom:10px;font-weight:800}
.li{font-size:13.5px;padding:4px 0;color:#334155}
.alert{padding:9px 13px;border-radius:8px;font-size:13px;margin-bottom:6px;font-weight:600}
.alert.high{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
.alert.mid{background:#fffbeb;color:#b45309;border:1px solid #fde68a}
.plan{font-size:13.5px;color:#334155}
.plan strong{color:#0B3D5C}
.foot{background:#0B3D5C;color:#fff;padding:18px 28px;text-align:center;font-size:13px}
.foot .rule{background:rgba(255,255,255,.1);border-radius:10px;padding:12px;margin-bottom:12px;text-align:right}
.foot .rule b{color:#F5C56B}
.disc{font-size:11px;color:#94a3b8;text-align:center;padding:14px;background:#f1f5f9}
${forPrint?'@media print{body{background:#fff;padding:0}.card{box-shadow:none}.noprint{display:none}}':''}
</style></head><body>
<div class="card">
  <div class="head">
    <h1>🥗 بطاقة التغذية العلاجية</h1>
    <div class="sub">${clinic}${therapist?(' — '+therapist):''}</div>
    <div class="pn">${pName} • ${date}</div>
  </div>
  <div class="body">
    <div class="sec"><h3>📊 مؤشراتك الصحية</h3>${metricsBlock}</div>
    ${labsBlock}
    ${drugBlock}
    <div class="sec"><h3>📋 خطتك الغذائية</h3><div class="plan">${planHTML}</div></div>
    ${goalsBlock}
  </div>
  <div class="foot">
    <div class="rule">
      <b>5 قواعد ذهبية:</b><br/>
      1) اشرب ${a.ok?a.water:'2'} لتر ماء يومياً &nbsp; 2) لا تفوّت وجبة الفطور &nbsp; 3) امشِ 30 دقيقة يومياً<br/>
      4) قلّل السكر والمقالي &nbsp; 5) نم 7-8 ساعات
    </div>
    📞 للحجز والاستفسار: ${phone||clinic}
  </div>
  <div class="disc">هذه البطاقة إرشادية من ${clinic} وليست بديلاً عن استشارة طبية مباشرة.</div>
</div>
${forPrint?'<div class="noprint" style="text-align:center;margin:18px"><button onclick="window.print()" style="background:#1B7A7E;color:#fff;border:0;padding:12px 28px;border-radius:10px;font-size:15px;font-family:Cairo;cursor:pointer;font-weight:700">🖨️ طباعة / حفظ PDF</button></div>':''}
</body></html>`;
  };

  const openPatientCard = () => {
    const w = window.open('','_blank');
    if(!w){ alert('فعّل النوافذ المنبثقة لعرض البطاقة.'); return; }
    w.document.write(buildCardHTML(true));
    w.document.close();
  };

  const shareWhatsApp = () => {
    const a = analysis;
    const pName = selectedP?.name || resultName || 'المريض';
    const clinic = settings.clinicName || 'Motion Clinic';
    let msg = `🥗 *بطاقة التغذية العلاجية*\n${clinic}\n────────────\n👤 ${pName}\n📅 ${new Date().toLocaleDateString('ar-EG')}\n\n`;
    if(a.ok){
      msg += `📊 *مؤشراتك:*\n• BMI: ${a.bmi} (${a.bmiClass})\n• الوزن المثالي: ${a.idealW} كغ${a.excessW>0?` (زائد ${a.excessW} كغ)`:''}\n• السعرات اليومية: ${a.targetCal} سعرة\n• بروتين: ${a.protein}غ | كربوهيدرات: ${a.carb}غ | دهون: ${a.fat}غ\n• الماء: ${a.water} لتر يومياً\n\n`;
      if(a.labs.length) msg += `🧪 *ملاحظات مخبرية:*\n${a.labs.map(l=>'• '+l.t).join('\n')}\n\n`;
      if(a.smartGoals.length) msg += `🎯 *أهدافك:*\n${a.smartGoals.map(g=>'✓ '+g).join('\n')}\n\n`;
    }
    if(result){
      const plain = result.replace(/\*\*/g,'*').replace(/^\|.*$/gm,'').replace(/\n{3,}/g,'\n\n');
      msg += `📋 *خطتك الغذائية:*\n${plain}\n\n`;
    }
    msg += `📞 للحجز: ${settings.phone||clinic}`;
    const phone = (selectedP?.phone||'').replace(/[^0-9]/g,'');
    const url = (phone?`https://wa.me/${phone.startsWith('0')?'963'+phone.slice(1):phone}`:'https://wa.me/') + '?text=' + encodeURIComponent(msg);
    window.open(url,'_blank');
  };

  const formatResult = (text) => {
    const lines = text.split('\n');
    return lines.map((line, i) => {
      if(line.startsWith('**') && line.endsWith('**')) return <div key={i} style={{fontWeight:800,color:'var(--primary)',fontSize:14,marginTop:16,marginBottom:6,borderRight:'3px solid var(--primary)',paddingRight:10}}>{line.replace(/\*\*/g,'')}</div>;
      if(line.startsWith('**')) return <div key={i} style={{fontWeight:700,color:'var(--primary)',fontSize:13,marginTop:10,marginBottom:4}}>{line.replace(/\*\*/g,'')}</div>;
      if(line.startsWith('|')) {
        const cells = line.split('|').filter((_,j,arr)=>j>0&&j<arr.length-1);
        if(line.match(/^[\|\s\-]+$/)) return null;
        return <tr key={i}>{cells.map((c,j)=><td key={j} style={{padding:'7px 10px',border:'1px solid var(--border)',fontSize:12}}>{c.trim().replace(/\*\*/g,'')}</td>)}</tr>;
      }
      if(line.startsWith('- ')||line.startsWith('• ')) return <div key={i} style={{fontSize:13,color:'var(--text-mid)',padding:'2px 0 2px 0',paddingRight:14}}>{'→ '+line.replace(/^[-•]\s/,'').replace(/\*\*/g,'')}</div>;
      if(line.trim()) return <div key={i} style={{fontSize:13,color:'var(--text-dark)',marginBottom:3,lineHeight:1.7}}>{line.replace(/\*\*/g,'')}</div>;
      return <div key={i} style={{height:6}}/>;
    });
  };

  return (
    <div className="page-content">
      <div className="page-header">
        <div>
          <h1 className="page-title">🥗 التغذية العلاجية</h1>
          <p className="page-subtitle">خطط غذائية مخصصة مدعومة بالذكاء الاصطناعي — مناسبة لشعب دمشق</p>
        </div>
        <div style={{display:'flex',gap:8}}>
          {historyList.length>0&&<button className="btn btn-secondary" onClick={()=>setViewHistory(viewHistory?null:true)}>📋 السجل ({historyList.length})</button>}
        </div>
      </div>

      {viewHistory && (
        <div className="card" style={{marginBottom:20}}>
          <div className="card-header">
            <h3>📋 سجل الخطط السابقة</h3>
            <button className="btn btn-ghost btn-sm" onClick={()=>setViewHistory(null)}>✕ إغلاق</button>
          </div>
          <table className="data-table">
            <thead><tr><th>التاريخ</th><th>المريض</th><th>الهدف</th><th>التشخيص</th><th>إجراء</th></tr></thead>
            <tbody>
              {historyList.map(h=>(
                <tr key={h.id}>
                  <td>{h.date}</td>
                  <td style={{fontWeight:700,color:'var(--primary)'}}>{h.patientName}</td>
                  <td><span className="badge badge-green">{h.goal}</span></td>
                  <td style={{fontSize:12,color:'var(--text-mid)'}}>{h.diagnosis||'—'}</td>
                  <td><button className="btn btn-secondary btn-xs" onClick={()=>{setResult(h.result);setResultName(h.patientName);setViewHistory(null);}}>عرض</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      <div className="grid-2" style={{alignItems:'flex-start'}}>
        {/* LEFT PANEL — Form */}
        <div style={{display:'flex',flexDirection:'column',gap:14}}>

          {/* Patient selector */}
          <div className="card">
            <div className="card-header"><h3>👤 اختيار المريض</h3></div>
            <div className="card-body">
              <input className="input" placeholder="🔍 ابحث باسم المريض..." value={search} onChange={e=>setSearch(e.target.value)} style={{marginBottom:10}}/>
              {search && (
                <div style={{border:'1px solid var(--border)',borderRadius:8,overflow:'hidden',maxHeight:180,overflowY:'auto',marginBottom:10}}>
                  {filteredPatients.length===0 && <div style={{padding:12,fontSize:13,color:'var(--text-light)'}}>لا نتائج</div>}
                  {filteredPatients.map(p=>(
                    <div key={p.id} onClick={()=>handleSelectPatient(p.id)} style={{padding:'10px 14px',cursor:'pointer',borderBottom:'1px solid var(--border)',background:selectedPatient===p.id?'var(--primary-bg)':'var(--card)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <div>
                        <strong style={{fontSize:13,color:'var(--primary)'}}>{p.name}</strong>
                        <span style={{fontSize:11,color:'var(--text-light)',marginRight:8}}>{p.id}</span>
                      </div>
                      <span style={{fontSize:11,color:'var(--text-light)'}}>{p.age} سنة</span>
                    </div>
                  ))}
                </div>
              )}
              {selectedP ? (
                <div style={{background:'var(--primary-bg)',borderRadius:10,padding:'12px 16px',border:'1px solid var(--primary-pale)'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <div>
                      <strong style={{color:'var(--primary)',fontSize:15}}>{selectedP.name}</strong>
                      <span style={{fontSize:12,color:'var(--text-light)',display:'block',marginTop:2}}>{selectedP.age} سنة | {selectedP.gender==='male'?'ذكر':'أنثى'} | {selectedP.phone}</span>
                    </div>
                    <button className="btn btn-ghost btn-sm" onClick={()=>{setSelectedPatient('');setResult('');}}>✕</button>
                  </div>
                  {latestInbody && (
                    <div style={{marginTop:10,display:'flex',gap:8,flexWrap:'wrap'}}>
                      {[['⚖️',latestInbody.weight+' كغ'],['💪',latestInbody.smi+' كغ عضلات'],['🔥',latestInbody.bodyFat+'% دهون'],['📊',latestInbody.bmi+' BMI']].map(([ic,vl],i)=>(
                        <span key={i} style={{fontSize:11,padding:'3px 9px',background:'var(--primary)',color:'#fff',borderRadius:20,fontWeight:700}}>{ic} {vl}</span>
                      ))}
                      <span style={{fontSize:10,color:'var(--text-light)'}}>آخر InBody: {latestInbody.date}</span>
                    </div>
                  )}
                  {!latestInbody && <div style={{marginTop:8,fontSize:12,color:'var(--accent)',fontWeight:700}}>⚠️ لا يوجد قياس InBody لهذا المريض</div>}
                </div>
              ) : (
                <div style={{fontSize:12,color:'var(--text-light)',textAlign:'center',padding:'8px 0'}}>ابحث واختر مريضاً، أو أدخل البيانات يدوياً أدناه</div>
              )}
              {!latestInbody && (
                <div className="form-row" style={{marginTop:10}}>
                  <div className="form-group">
                    <label className="form-label">الوزن (كغ)</label>
                    <input className="input" type="number" value={form.extraWeight} onChange={e=>f('extraWeight',e.target.value)} placeholder="85"/>
                  </div>
                  <div className="form-group">
                    <label className="form-label">الطول (سم)</label>
                    <input className="input" type="number" value={form.extraHeight} onChange={e=>f('extraHeight',e.target.value)} placeholder="170"/>
                  </div>
                </div>
              )}
            </div>
          </div>

          {/* Clinical Info */}
          <div className="card">
            <div className="card-header"><h3>🏥 الحالة الطبية</h3></div>
            <div className="card-body">
              <div className="form-group">
                <label className="form-label">التشخيص / المشكلة الرئيسية</label>
                <input className="input" value={form.diagnosis} onChange={e=>f('diagnosis',e.target.value)} placeholder="مثال: ديسك رقبي، خشونة ركبة، تمزق رباط..."/>
              </div>
              <div className="form-row">
                <div className="form-group">
                  <label className="form-label">مستوى الألم (0-10)</label>
                  <input className="input" type="number" min="0" max="10" value={form.painLevel} onChange={e=>f('painLevel',e.target.value)} placeholder="6"/>
                </div>
                <div className="form-group">
                  <label className="form-label">مدة المشكلة</label>
                  <select className="input" value={form.duration} onChange={e=>f('duration',e.target.value)}>
                    <option value="acute">حادة (أقل من 3 أشهر)</option>
                    <option value="subacute">شبه حادة (3-6 أشهر)</option>
                    <option value="chronic">مزمنة (أكثر من 6 أشهر)</option>
                  </select>
                </div>
              </div>
              <div className="form-group">
                <label className="form-label">الأمراض المزمنة المصاحبة</label>
                <div className="tag-list">
                  {Object.entries(chronicMap).map(([k,v])=>(
                    <button key={k} className={`tag-pick ${form.chronic.includes(k)?'active':''}`} onClick={()=>toggleChronic(k)}>{v}</button>
                  ))}
                </div>
              </div>
            </div>
          </div>

          {/* Lab Results */}
          <div className="card">
            <div className="card-header"><h3>🧪 المؤشرات المخبرية</h3></div>
            <div className="card-body">
              <div className="form-row-3">
                <div className="form-group">
                  <label className="form-label">فيتامين D</label>
                  <input className="input" type="number" value={form.vitD} onChange={e=>f('vitD',e.target.value)} placeholder="ng/mL"/>
                </div>
                <div className="form-group">
                  <label className="form-label">فيريتين</label>
                  <input className="input" type="number" value={form.ferritin} onChange={e=>f('ferritin',e.target.value)} placeholder="µg/L"/>
                </div>
                <div className="form-group">
                  <label className="form-label">سكر الصيامي</label>
                  <input className="input" type="number" value={form.bloodSugar} onChange={e=>f('bloodSugar',e.target.value)} placeholder="mg/dL"/>
                </div>
              </div>
            </div>
          </div>

          {/* Goal & Preferences */}
          <div className="card">
            <div className="card-header"><h3>🎯 الهدف والتفضيلات</h3></div>
            <div className="card-body">
              <div className="form-group">
                <label className="form-label">الهدف الأساسي</label>
                <div className="tag-list">
                  {Object.entries(goalMap).map(([k,v])=>(
                    <button key={k} className={`tag-pick ${form.goal===k?'active':''}`} onClick={()=>f('goal',k)}>{v}</button>
                  ))}
                </div>
              </div>
              <div className="form-row">
                <div className="form-group">
                  <label className="form-label">مستوى النشاط</label>
                  <select className="input" value={form.activity} onChange={e=>f('activity',e.target.value)}>
                    {Object.entries(activityMap).map(([k,v])=><option key={k} value={k}>{v}</option>)}
                  </select>
                </div>
                <div className="form-group">
                  <label className="form-label">الميزانية</label>
                  <select className="input" value={form.budget} onChange={e=>f('budget',e.target.value)}>
                    <option value="limited">محدودة</option>
                    <option value="moderate">متوسطة</option>
                    <option value="good">جيدة</option>
                  </select>
                </div>
              </div>
              <div className="form-row">
                <div className="form-group">
                  <label className="form-label">الأدوية الحالية</label>
                  <input className="input" value={form.medications} onChange={e=>f('medications',e.target.value)} placeholder="اسم الدواء..."/>
                </div>
                <div className="form-group">
                  <label className="form-label">ملاحظات إضافية</label>
                  <input className="input" value={form.notes} onChange={e=>f('notes',e.target.value)} placeholder="أكلات لا يحبها، حساسية..."/>
                </div>
              </div>
              <button
                className="btn btn-accent"
                style={{width:'100%',justifyContent:'center',marginTop:6,padding:'11px',fontSize:14}}
                onClick={generate}
                disabled={generating}
              >
                {generating ? '⏳ جاري التحليل والإعداد...' : '🤖 توليد الخطة الغذائية العلاجية'}
              </button>
            </div>
          </div>
        </div>

        {/* RIGHT PANEL — Result */}
        <div>
          {!result && !generating && !analysis.ok && (
            <div className="card" style={{textAlign:'center',padding:'48px 24px'}}>
              <div style={{fontSize:48,marginBottom:16}}>🥗</div>
              <h3 style={{color:'var(--text-mid)',marginBottom:8}}>جاهز للتحليل السريري</h3>
              <p style={{fontSize:13,color:'var(--text-light)',lineHeight:1.7}}>
                اختر مريضاً من القائمة — ستُجلب بيانات InBody والتاريخ المرضي تلقائياً.<br/>
                أو أدخل الوزن والطول يدوياً لعرض المؤشرات السريرية فوراً.
              </p>
            </div>
          )}
          {!result && !generating && analysis.ok && (
            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              <div className="card">
                <div className="card-header" style={{justifyContent:'space-between'}}>
                  <h3>📊 التحليل السريري الفوري</h3>
                  <span style={{fontSize:12,fontWeight:800,padding:'3px 12px',borderRadius:20,color:'#fff',background:analysis.riskColor}}>خطورة: {analysis.risk}</span>
                </div>
                <div className="card-body">
                  <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
                    {[
                      ['BMI', analysis.bmi, analysis.bmiClass, analysis.bmiColor],
                      ['الوزن المثالي', analysis.idealW+' كغ', analysis.excessW>0?('زائد '+analysis.excessW):'مثالي', 'var(--primary)'],
                      ['BMR', analysis.bmr, analysis.bmrSource, 'var(--primary)'],
                      ['TDEE', analysis.tdee, 'سعرة/يوم', 'var(--primary)'],
                      ['السعرات الهدف', analysis.targetCal, analysis.deficit?('عجز '+analysis.deficit):analysis.surplus?('فائض '+analysis.surplus):'حفاظ', 'var(--accent)'],
                      ['الماء', analysis.water+' ل', 'يومياً', '#2563eb'],
                    ].map(([l,v,s,c],i)=>(
                      <div key={i} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,padding:'12px 8px',textAlign:'center'}}>
                        <div style={{fontSize:19,fontWeight:800,color:c}}>{v}</div>
                        <div style={{fontSize:11,color:'var(--text-light)',fontWeight:600,marginTop:2}}>{l}</div>
                        <div style={{fontSize:10,color:'var(--text-mid)',marginTop:1}}>{s}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{marginTop:12,padding:'10px 14px',background:'var(--primary-bg)',borderRadius:10,fontSize:12.5,fontWeight:700,color:'var(--primary)',textAlign:'center'}}>
                    🍗 بروتين {analysis.protein}غ &nbsp;|&nbsp; 🍚 كربوهيدرات {analysis.carb}غ &nbsp;|&nbsp; 🥑 دهون {analysis.fat}غ
                  </div>
                </div>
              </div>

              {(analysis.pbf || analysis.visceral || analysis.smm) && (
                <div className="card">
                  <div className="card-header"><h3>🔬 قراءة InBody</h3></div>
                  <div className="card-body" style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                    {analysis.pbf!=null && <span style={{fontSize:12,padding:'5px 12px',borderRadius:20,background:'var(--surface)',border:'1px solid var(--border)',fontWeight:700}}>دهون {analysis.pbf}% ({analysis.pbfClass})</span>}
                    {analysis.smm!=null && <span style={{fontSize:12,padding:'5px 12px',borderRadius:20,background:'var(--surface)',border:'1px solid var(--border)',fontWeight:700}}>عضلات {analysis.smm} كغ</span>}
                    {analysis.visceral!=null && <span style={{fontSize:12,padding:'5px 12px',borderRadius:20,background:'var(--surface)',border:'1px solid var(--border)',fontWeight:700}}>حشوية {analysis.visceral}</span>}

// CALENDAR
// ══════════════════════════════════════════════════
function CalendarPage(){
  const {appointments, patients} = useClinic();
  const [month,setMonth] = useState(new Date());
  const [modal,setModal] = useState(null);
  const [view,setView] = useState('month'); // month | week
  const [weekRef,setWeekRef] = useState(new Date());

  const year = month.getFullYear();
  const mon  = month.getMonth();
  const firstDay = new Date(year,mon,1).getDay();
  const daysInMonth = new Date(year,mon+1,0).getDate();
  const monthStr = String(mon+1).padStart(2,'0');
  const dayNames = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  const monthNames = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

  const statusColors = {confirmed:'var(--green)',pending:'var(--accent)',completed:'var(--blue)',cancelled:'var(--red)',missed:'#6b7280'};
  // — لون ثابت مميّز لكل طبيب/معالج (يسهّل قراءة التقويم) —
  const DOC_PALETTE = ['#2563eb','#059669','#d97706','#db2777','#7c3aed','#0891b2','#ca8a04','#dc2626','#4f46e5','#15803d','#9333ea','#0d9488'];
  const therapistColor = (name) => { const s=String(name||'غير محدد'); let h=0; for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0; return DOC_PALETTE[h%DOC_PALETTE.length]; };
  const therapists = [...new Set(appointments.map(a=>a.therapist||'غير محدد').filter(Boolean))];

  // — أيام الأسبوع الحالي (يبدأ بالأحد) —
  const weekStart = new Date(weekRef); weekStart.setDate(weekRef.getDate()-weekRef.getDay()); weekStart.setHours(0,0,0,0);
  const weekDays = Array(7).fill(null).map((_,i)=>{ const d=new Date(weekStart); d.setDate(weekStart.getDate()+i); return d; });
  const fmtDay = (d)=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const hours = []; for(let h=8;h<=21;h++) hours.push(h);

  return(
    <div className="page-content">
      <div className="page-header">
        <div><h1 className="page-title">📅 التقويم</h1><p className="page-subtitle">إدارة المواعيد</p></div>
        <div style={{display:'flex',gap:8}}>
          <div className="btn-group" style={{display:'flex',background:'var(--surface)',borderRadius:8,padding:3}}>
            <button className={`btn btn-sm ${view==='month'?'btn-primary':'btn-ghost'}`} onClick={()=>setView('month')}>شهري</button>
            <button className={`btn btn-sm ${view==='week'?'btn-primary':'btn-ghost'}`} onClick={()=>setView('week')}>أسبوعي</button>
          </div>
          <button className="btn btn-accent" onClick={()=>setModal({type:'apt',data:null})}>+ موعد جديد</button>
        </div>
      </div>
      {therapists.length>0 && (
        <div style={{display:'flex',flexWrap:'wrap',gap:12,alignItems:'center',padding:'9px 14px',marginBottom:12,background:'var(--surface)',borderRadius:10,fontSize:12.5}}>
          <span style={{fontWeight:800,color:'var(--text-mid)'}}>👨‍⚕️ الأطباء:</span>
          {therapists.map(t=>(
            <span key={t} style={{display:'inline-flex',alignItems:'center',gap:6,fontWeight:700,color:'var(--text-mid)'}}>
              <span style={{width:13,height:13,borderRadius:4,background:therapistColor(t)}}/>{t}
            </span>
          ))}
        </div>
      )}
      {view==='week' && (
        <div className="card">
          <div className="card-header">
            <button className="btn btn-ghost" onClick={()=>{const d=new Date(weekRef);d.setDate(d.getDate()-7);setWeekRef(d);}}>← الأسبوع السابق</button>
            <h3 style={{flex:1,textAlign:'center'}}>{weekDays[0].getDate()} {monthNames[weekDays[0].getMonth()]} — {weekDays[6].getDate()} {monthNames[weekDays[6].getMonth()]} {weekDays[6].getFullYear()}</h3>
            <button className="btn btn-ghost" onClick={()=>{const d=new Date(weekRef);d.setDate(d.getDate()+7);setWeekRef(d);}}>الأسبوع التالي →</button>
          </div>
          <div style={{padding:16,overflowX:'auto'}}>
            <div style={{display:'grid',gridTemplateColumns:'56px repeat(7,1fr)',gap:4,minWidth:760}}>
              <div/>
              {weekDays.map((d,i)=>{
                const isToday=fmtDay(d)===today();
                return <div key={i} style={{textAlign:'center',padding:6,borderRadius:8,background:isToday?'var(--primary-bg)':'transparent'}}>
                  <div style={{fontSize:11,color:'var(--text-light)',fontWeight:700}}>{dayNames[d.getDay()]}</div>
                  <div style={{fontSize:16,fontWeight:isToday?900:700,color:isToday?'var(--primary)':'var(--text-mid)'}}>{d.getDate()}</div>
                </div>;
              })}
              {hours.map(h=>(
                <React.Fragment key={h}>
                  <div style={{fontSize:11,color:'var(--text-light)',textAlign:'left',padding:'4px 6px',fontWeight:700}}>{String(h).padStart(2,'0')}:00</div>
                  {weekDays.map((d,di)=>{
                    const ds=fmtDay(d);
                    const cellApts=appointments.filter(a=>a.date===ds && parseInt((a.time||'0').split(':')[0],10)===h);
                    return <div key={di} style={{minHeight:46,border:'1px solid var(--border)',borderRadius:6,padding:2}}>
                      {cellApts.map(a=>{ const dc=therapistColor(a.therapist||'غير محدد'); return (
                        <div key={a.id} style={{fontSize:10,padding:'2px 4px',borderRadius:4,marginBottom:2,cursor:'pointer',
                          background:dc+'22',color:dc,fontWeight:700,borderRight:`3px solid ${dc}`,borderLeft:`3px solid ${statusColors[a.status]}`,
                          overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}
                          title={`${a.time} — ${a.patientName} — د. ${a.therapist||'غير محدد'} (${a.status})`} onClick={()=>setModal({type:'apt',data:a})}>
                          {a.time} {a.patientName}
                        </div>
                      ); })}
                    </div>;
                  })}
                </React.Fragment>
              ))}
            </div>
          </div>
        </div>
      )}
      {view==='month' && (
      <div className="card">
        <div className="card-header">
          <button className="btn btn-ghost" onClick={()=>setMonth(new Date(year,mon-1,1))}>← السابق</button>
          <h3 style={{flex:1,textAlign:'center'}}>{monthNames[mon]} {year}</h3>
          <button className="btn btn-ghost" onClick={()=>setMonth(new Date(year,mon+1,1))}>التالي →</button>
        </div>
        <div style={{padding:16}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4,marginBottom:8}}>
            {dayNames.map(d=><div key={d} style={{textAlign:'center',fontSize:12,fontWeight:800,color:'var(--text-light)',padding:6}}>{d}</div>)}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4}}>
            {Array(firstDay).fill(null).map((_,i)=><div key={'e'+i}/>)}
            {Array(daysInMonth).fill(null).map((_,i)=>{
              const day = i+1;
              const dayStr = `${year}-${monthStr}-${String(day).padStart(2,'0')}`;
              const dayApts = appointments.filter(a=>a.date===dayStr);
              const isToday = dayStr===today();
              return(
                <div key={day} style={{
                  minHeight:80,padding:6,border:'1px solid var(--border)',borderRadius:8,
                  background:isToday?'var(--primary-bg)':dayApts.length>0?'var(--surface)':'transparent',
                  borderColor:isToday?'var(--primary)':'var(--border)',
                }}>
                  <div style={{fontSize:13,fontWeight:isToday?900:600,color:isToday?'var(--primary)':'var(--text-mid)',marginBottom:4}}>{day}</div>
                  {dayApts.map(a=>{ const dc=therapistColor(a.therapist||'غير محدد'); return (
                    <div key={a.id} style={{
                      fontSize:10.5,padding:'2px 5px',borderRadius:4,marginBottom:2,
                      background:dc+'22',color:dc,fontWeight:700,borderRight:`3px solid ${dc}`,
                      cursor:'pointer',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
                    }} title={`${a.patientName} — د. ${a.therapist||'غير محدد'} (${a.status})`} onClick={()=>setModal({type:'apt',data:a})}>
                      {a.time} {a.patientName}
                    </div>
                  ); })}
                </div>
              );
            })}
          </div>
        </div>
      </div>
      )}
      {modal?.type==='apt'&&<AppointmentModal patientId={null} patient={null} appointment={modal.data} onClose={()=>setModal(null)}/>}
    </div>
  );
}

// FINANCE PAGE

function FinancePage({navigate}){
  const {finance, expenses, patients, settings, deleteFinance, deleteExpense, addExpense, updateExpense} = useClinic();
  const [tab,setTab] = useState('invoices');
  const [modal,setModal] = useState(null);
  const [expModal,setExpModal] = useState(null);
  const [search,setSearch] = useState('');
  const [period,setPeriod] = useState('month'); // month | last | year | all
  const cur = settings.currency || 'ل.س';

  // — تحديد المدة الزمنية —
  const now = new Date();
  const ym = now.toISOString().slice(0,7);
  const lastDate = new Date(now.getFullYear(), now.getMonth()-1, 1);
  const lastYm = lastDate.toISOString().slice(0,7);
  const yr = String(now.getFullYear());
  const periodLabel = {month:'هذا الشهر', last:'الشهر الماضي', year:'هذه السنة', all:'كل الفترات'}[period];
  const inPeriod = (d) => {
    if(!d) return period==='all';
    if(period==='all') return true;
    if(period==='month') return d.startsWith(ym);
    if(period==='last') return d.startsWith(lastYm);
    if(period==='year') return d.startsWith(yr);
    return true;
  };

  const finP = finance.filter(f=>inPeriod(f.date));
  const expP = expenses.filter(e=>inPeriod(e.date));

  const totalRev = finP.reduce((s,f)=>s+(f.paid||0),0);
  const totalPend = finP.filter(f=>f.status!=='مدفوع').reduce((s,f)=>s+(f.remaining||0),0);
  const totalBilled = finP.reduce((s,f)=>s+(f.total||0),0);
  const totalDisc = finP.reduce((s,f)=>s+(f.discount||0),0);
  const totalExp = expP.reduce((s,e)=>s+(e.amount||0),0);
  const netProfit = totalRev - totalExp;
  const collectRate = (totalRev+totalPend)>0 ? Math.round(totalRev/(totalRev+totalPend)*100) : 100;
  const profitMargin = totalRev>0 ? Math.round(netProfit/totalRev*100) : 0;

  // — مصروفات حسب الفئة —
  const expByCat = {};
  expP.forEach(e=>{ const c=e.category||'أخرى'; expByCat[c]=(expByCat[c]||0)+(e.amount||0); });
  const expCats = Object.entries(expByCat).sort((a,b)=>b[1]-a[1]);

  // — إيرادات حسب الخدمة —
  const revByService = {};
  finP.forEach(f=>{ const s=f.serviceLabel||'أخرى'; revByService[s]=(revByService[s]||0)+(f.paid||0); });
  const topServices = Object.entries(revByService).sort((a,b)=>b[1]-a[1]).slice(0,6);

  // — اتجاه آخر 6 أشهر (إيراد/مصروف/ربح) —
  const trend = [];
  const mNames=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  for(let i=5;i>=0;i--){
    const dd=new Date(now.getFullYear(), now.getMonth()-i, 1);
    const key=dd.toISOString().slice(0,7);
    const rev=finance.filter(f=>f.date?.startsWith(key)).reduce((s,f)=>s+(f.paid||0),0);
    const ex=expenses.filter(e=>e.date?.startsWith(key)).reduce((s,e)=>s+(e.amount||0),0);
    trend.push({label:mNames[dd.getMonth()], rev, ex, net:rev-ex});
  }
  const trendMax = Math.max(1, ...trend.map(t=>Math.max(t.rev,t.ex)));

  const filteredInv = finP.filter(f=>!search||f.patientName?.includes(search)||f.id?.includes(search)||f.serviceLabel?.includes(search));

  // — تقرير مالي قابل للطباعة —
  const printReport = () => {
    const w = window.open('','_blank');
    if(!w){ alert('فعّل النوافذ المنبثقة لعرض التقرير.'); return; }
    const row = (a,b,c)=>`<tr><td>${a}</td><td style="text-align:left;font-weight:700">${b}</td>${c!=null?`<td style="text-align:left;color:#64748b">${c}</td>`:''}</tr>`;
    w.document.write(`<!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8"><title>تقرير مالي — ${periodLabel}</title>
<style>@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap');

.h{background:linear-gradient(135deg,#0B3D5C,#1B7A7E);color:#fff;padding:24px;border-radius:14px;margin-bottom:20px}
.h h1{font-size:22px}.h p{opacity:.9;font-size:13px;margin-top:4px}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.c{border:1px solid #e2e8f0;border-radius:10px;padding:14px;text-align:center}.c .v{font-size:18px;font-weight:800}.c .l{font-size:11px;color:#64748b;margin-top:3px}
h2{font-size:16px;color:#0B3D5C;border-right:4px solid #B8893A;padding-right:10px;margin:22px 0 10px}
table{width:100%;border-collapse:collapse}td,th{padding:8px 12px;border:1px solid #e2e8f0;font-size:13px;text-align:right}th{background:#f8fafc;font-weight:700}
.foot{margin-top:30px;text-align:center;font-size:12px;color:#94a3b8}
@media print{.noprint{display:none}}</style></head><body>
<div class="h"><h1>📊 التقرير المالي — ${settings.clinicName||'Motion Clinic'}</h1><p>الفترة: ${periodLabel} • تاريخ الإصدار: ${now.toLocaleDateString('ar-EG')}</p></div>
<div class="cards">
  <div class="c"><div class="v" style="color:#059669">${fmt(totalRev)}</div><div class="l">إيرادات محصّلة (${cur})</div></div>
  <div class="c"><div class="v" style="color:#d97706">${fmt(totalPend)}</div><div class="l">مستحقات غير محصّلة</div></div>
  <div class="c"><div class="v" style="color:#dc2626">${fmt(totalExp)}</div><div class="l">مصروفات</div></div>

</table>
<h2>المصروفات حسب الفئة</h2><table><tr><th>الفئة</th><th>المبلغ</th><th>النسبة</th></tr>
${expCats.map(([c,v])=>row(c, fmt(v)+' '+cur, (totalExp>0?Math.round(v/totalExp*100):0)+'%')).join('')||'<tr><td colspan=3 style="text-align:center;color:#888">لا مصروفات</td></tr>'}
</table>

</body></html>`);
    w.document.close();
  };

  // — فاتورة فردية قابلة للطباعة / PDF —
  const printInvoice = (f) => {
    const w = window.open('','_blank');

<style>@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}body{font-family:Cairo,sans-serif;padding:34px;color:#1e293b;max-width:780px;margin:auto;font-size:14px}

  // — تذكير دفع عبر واتساب —
  const remindPay = (f) => {

  const daysSince = (d) => d ? Math.floor((now - new Date(d)) / 86400000) : 0;
  const issues = [];
  const seenInv = {};

    const total=+f.total||0, disc=+f.discount||0, paid=+f.paid||0, rem=+f.remaining||0;
    const net=total-disc, expectedRem=Math.max(0,net-paid);
    if(f.id){ if(seenInv[f.id]) issues.push({sev:'error',cat:'رقم مكرر',msg:`رقم الفاتورة ${f.id} مكرّر — قد يسبب تداخل بيانات`,inv:f}); seenInv[f.id]=true; }
    if(Math.abs(expectedRem-rem) > 1) issues.push({sev:'error',cat:'خطأ حسابي',msg:`فاتورة ${f.id}: المتبقي المسجّل ${fmt(rem)} لا يطابق المحسوب ${fmt(expectedRem)} (الإجمالي - الخصم - المدفوع)`,inv:f});
    if(total<0||paid<0||disc<0) issues.push({sev:'error',cat:'قيمة سالبة',msg:`فاتورة ${f.id} تحتوي قيمة سالبة`,inv:f});
    if(paid > net+1) issues.push({sev:'warn',cat:'دفع زائد',msg:`فاتورة ${f.id}: المدفوع ${fmt(paid)} أكبر من المستحق ${fmt(net)}`,inv:f});
    if(disc>total && total>0) issues.push({sev:'warn',cat:'خصم مرتفع',msg:`فاتورة ${f.id}: الخصم ${fmt(disc)} أكبر من الإجمالي ${fmt(total)}`,inv:f});
    if(f.status==='مدفوع' && rem>0) issues.push({sev:'warn',cat:'حالة خاطئة',msg:`فاتورة ${f.id} حالتها "مدفوع" لكن يوجد متبقٍّ ${fmt(rem)}`,inv:f});
    if(rem===0 && paid>0 && f.status!=='مدفوع') issues.push({sev:'info',cat:'تحديث حالة',msg:`فاتورة ${f.id} مسدّدة بالكامل لكن حالتها "${f.status||'—'}"`,inv:f});
    if(!f.patientId) issues.push({sev:'warn',cat:'بدون مريض',msg:`فاتورة ${f.id} غير مرتبطة بملف مريض`,inv:f});
  });
  const seenExp = {};

    if(!e.category) issues.push({sev:'info',cat:'بدون فئة',msg:`مصروف ${fmt(amt)} ${cur} بدون فئة محدّدة`,exp:e});
    const k=`${e.date}|${e.amount}|${e.category}|${e.description}`;
    if(seenExp[k]) issues.push({sev:'warn',cat:'مصروف مكرّر',msg:`مصروف مكرّر محتمل: ${e.description||e.category||'—'} بقيمة ${fmt(amt)} بتاريخ ${e.date||'—'}`,exp:e});

  const expGroups = {};

  const recurring = Object.values(expGroups)

    .sort((a,b)=>b.avg-a.avg);
  const fixedMonthly = recurring.reduce((s,g)=>s+g.avg,0);
  const dueRecurring = recurring.filter(g=>!g.paidThisMonth);

  // ── تنبيه تجاوز الميزانية: إنفاق الشهر الحالي لكل فئة مقابل متوسطه التاريخي ──
  const catMonths = {};

    if(mo===ym) catMonths[c].current += (+e.amount||0);
    else if(mo){ catMonths[c].months.add(mo); catMonths[c].totalPast += (+e.amount||0); }
  });
  const budgetAlerts = Object.entries(catMonths).map(([c,d])=>{
    const avg = d.months.size>0 ? d.totalPast/d.months.size : 0;
    return {category:c, avg:Math.round(avg), current:d.current, over: avg>0 && d.current > avg*1.3};
  }).filter(b=>b.over).sort((a,b)=>(b.current-b.avg)-(a.current-a.avg));

  return(
    <div className="page-content">

function ExpenseModal({expense, onClose}){
  const {addExpense, updateExpense} = useClinic();
  const isEdit = !!expense;
  const [form,setForm] = useState(expense||{date:today(),category:'',description:'',amount:0,paymentMethod:'كاش',notes:''});
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));
  const save=()=>{
    if(!form.description||!form.amount){alert('الوصف والمبلغ مطلوبان');return;}
    if(isEdit) updateExpense(expense.id,{...form,amount:+form.amount});
    else addExpense({...form,amount:+form.amount,id:nextId('EXP')});
    onClose();
  };
  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-header"><h2>{isEdit?'✏️ تعديل مصروف':'💸 إضافة مصروف'}</h2><button className="modal-close" onClick={onClose}>✕</button></div>
        <div className="modal-body">
          <div className="form-row">
            <TF label="التاريخ" type="date" value={form.date} onChange={v=>f('date',v)}/>
            <SF label="الفئة" value={form.category} onChange={v=>f('category',v)} options={['','إيجار','رواتب','أجهزة','مستهلكات','كهرباء','ماء','إنترنت','تسويق','أخرى']}/>
          </div>
          <TF label="الوصف *" value={form.description} onChange={v=>f('description',v)}/>
          <div className="form-row">
            <TF label="المبلغ *" type="number" value={form.amount} onChange={v=>f('amount',v)}/>
            <SF label="طريقة الدفع" value={form.paymentMethod} onChange={v=>f('paymentMethod',v)} options={['كاش','بطاقة','تحويل بنكي','شيك']}/>
          </div>
          <TA label="ملاحظات" value={form.notes} onChange={v=>f('notes',v)} rows={2}/>
        </div>
        <div className="modal-footer"><button className="btn btn-ghost" onClick={onClose}>إلغاء</button><div style={{flex:1}}/><button className="btn btn-accent" onClick={save}>💾 حفظ</button></div>
      </div>
    </div>
  );
}

// INBODY PAGE (Cross-patient)
// ══════════════════════════════════════════════════
function InBodyPage({navigate}){
  const {inbody, patients, settings} = useClinic();
  const [modal,setModal] = useState(null);
  const [search,setSearch] = useState('');

  const filtered = inbody.filter(ib=>{
    const p = patients.find(x=>x.id===ib.patientId);
    return !search || (p&&p.name.includes(search)) || ib.patientId.includes(search);
  });

  return(
    <div className="page-content">
      <div className="page-header">
        <div><h1 className="page-title">⚖️ قياسات InBody</h1><p className="page-subtitle">جميع القياسات لكل المرضى</p></div>
        <button className="btn btn-accent" onClick={()=>setModal({})}>+ قياس جديد</button>
      </div>
      <div className="card">
        <div className="card-body" style={{padding:'14px 20px'}}>
          <input className="input" placeholder="🔍 ابحث..." value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        <table className="data-table">
          <thead><tr><th>التاريخ</th><th>المريض</th><th>الوزن</th><th>العضلات</th><th>الدهون%</th><th>BMI</th><th>الدهون الحشوية</th><th>النقاط</th><th>إجراءات</th></tr></thead>
          <tbody>
            {filtered.map(ib=>{
              const p = patients.find(x=>x.id===ib.patientId);
              return(
                <tr key={ib.id}>
                  <td><strong>{ib.date}</strong></td>
                  <td style={{cursor:'pointer',color:'var(--primary)',fontWeight:700}} onClick={()=>navigate&&navigate('patient',ib.patientId)}>{p?.name||ib.patientId}</td>
                  <td>{ib.weight} kg</td>
                  <td>{ib.smi} kg</td>
                  <td><span className={`badge ${ib.bodyFat<=25?'badge-green':ib.bodyFat<=30?'badge-yellow':'badge-red'}`}>{ib.bodyFat}%</span></td>
                  <td>{ib.bmi}</td>
                  <td><span className={`badge ${ib.visceralFat<=9?'badge-green':'badge-red'}`}>{ib.visceralFat}</span></td>
                  <td><span className={`badge ${ib.score>=75?'badge-green':ib.score>=60?'badge-yellow':'badge-red'}`}>{ib.score}</span></td>
                  <td><div className="row-actions">
                    <button className="row-action-btn" onClick={()=>navigate&&navigate('patient',ib.patientId)}>👁</button>
                  </div></td>
                </tr>
              );
            })}
          </tbody>
        </table>
        {filtered.length===0&&<div className="empty-state"><div className="icon">⚖️</div><h3>لا قياسات</h3></div>}
      </div>
      {modal&&<InBodyModal patientId={modal.patientId||''} patient={null} record={null} onClose={()=>setModal(null)}/>}
    </div>
  );
}

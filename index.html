    {name:'لمس الهدف',eng:'Target Reaching',desc:'أهداف صغيرة أمام المريض. يمدّ يده لكل هدف بالتناوب.',sets:3,reps:'15',hold:'—',diff:'medium',tags:['تنسيق','يد'],muscle:'Motor Cortex',yt:'https://www.youtube.com/watch?v=f0eAYFpVqX8',note:''},
    {name:'وقوف على فومة عينين مغمضتين',eng:'Foam Balance Eyes Closed',desc:'قف على وسادة إسفنجية وأغمض عينيك 30 ثانية.',sets:3,reps:'1',hold:'30 ث',diff:'hard',tags:['توازن','عصبي'],muscle:'Proprioceptive System',yt:'https://www.youtube.com/watch?v=DxIeqiyYZkQ',note:'شخص مرافق للأمان'},
    {name:'جلوس ونهوض معدّل',eng:'Modified Sit-to-Stand',desc:'انهض معتمداً على الجانب السليم. تدرّج لاستخدام الجانب المتعافي.',sets:3,reps:'10',hold:'—',diff:'medium',tags:['وظيفي','سكتة'],muscle:'Full Lower Limb',yt:'https://www.youtube.com/watch?v=DxIeqiyYZkQ',note:''},
    {name:'مشي إيقاعي',eng:'Rhythmic Stepping',desc:'المشي بمصاحبة موسيقى أو إيقاع منتظم. يحسن انتظام الخطوة.',sets:1,reps:'1',hold:'15 دق',diff:'medium',tags:['إيقاع','مشي'],muscle:'Basal Ganglia',yt:'https://www.youtube.com/watch?v=f0eAYFpVqX8',note:'يساعد باركنسون'},
  ]},
];

// ══════════════════════════════════════════════════
// HEP LIBRARY v2 — احترافية مع إرسال للمريض
// ══════════════════════════════════════════════════
function HEPLibraryPage({navigate}){
  const {patients,settings}=useClinic();
  const [activeFilter,setActiveFilter]=useState('all');
  const [searchQ,setSearchQ]=useState('');
  const [selected,setSelected]=useState(new Set());
  const [sendModal,setSendModal]=useState(false);
  const [selPatient,setSelPatient]=useState('');
  const [sessionNote,setSessionNote]=useState('');
  const [therapistNote,setTherapistNote]=useState('');
  const [sendTab,setSendTab]=useState('whatsapp');
  const [copyDone,setCopyDone]=useState(false);

  const diffL={easy:'مبتدئ',medium:'متوسط',hard:'متقدم'};
  const tColors=['badge-teal','badge-blue','badge-purple','badge-orange','badge-green'];

  const toggleSel=(catId,exIdx)=>{
    const key=catId+'_'+exIdx;
    setSelected(prev=>{const n=new Set(prev);n.has(key)?n.delete(key):n.add(key);return n;});
  };

  const getSelEx=()=>{
    const list=[];
    selected.forEach(key=>{
      const [cid,eidx]=key.split('_');
      const cat=HEP_CATS.find(c=>c.id===cid);
      if(cat&&cat.exercises[+eidx])list.push({cat,ex:cat.exercises[+eidx]});
    });
    return list;
  };

  const filteredCats=HEP_CATS.map(cat=>{
    const exs=cat.exercises.filter(ex=>
      !searchQ||ex.name.includes(searchQ)||ex.eng.toLowerCase().includes(searchQ.toLowerCase())||
      ex.tags.some(t=>t.includes(searchQ))||(ex.muscle||'').toLowerCase().includes(searchQ.toLowerCase())
    );
    return {...cat,exercises:exs};
  }).filter(cat=>(activeFilter==='all'||cat.id===activeFilter)&&cat.exercises.length>0);

  const totalShown=filteredCats.reduce((s,c)=>s+c.exercises.length,0);
  const selP=patients.find(p=>p.id===selPatient);

  const buildWA=()=>{
    const items=getSelEx();
    const now=new Date().toLocaleDateString('ar-EG');
    let m='🏥 *Motion Clinic — عيادة الحركة*\n━━━━━━━━━━━━━━━━━━\n';
    if(selP)m+='👤 *المريض:* '+selP.name+'\n';
    if(sessionNote)m+='📋 *'+sessionNote+'*\n';
    m+='📅 *التاريخ:* '+now+'\n👨‍⚕️ *المعالج:* '+(settings.therapistName||'د. يامن شحادة')+'\n';
    m+='━━━━━━━━━━━━━━━━━━\n\n🏋️ *برنامج التمارين ('+items.length+' تمارين):*\n\n';
    items.forEach((item,i)=>{
      m+='*'+(i+1)+'. '+item.ex.name+'* ('+item.ex.eng+')\n';
      m+='📝 '+item.ex.desc.slice(0,100)+'\n';
      m+='🔄 '+item.ex.sets+' مجموعات × '+item.ex.reps+' | ⏱ '+item.ex.hold+'\n';
      if(item.ex.note)m+='💡 '+item.ex.note+'\n';
      m+='▶️ '+item.ex.yt+'\n\n';
    });
    if(therapistNote)m+='━━━━━━━━━━━━━━━━━━\n📌 *ملاحظات:* '+therapistNote+'\n\n';
    m+='⚠️ _توقف فوراً عند زيادة الألم._\n━━━━━━━━━━━━━━━━━━\n🌐 Motion Clinic | دمشق';
    return m;
  };

  const doCopy=()=>{
    navigator.clipboard.writeText(buildWA()).then(()=>{setCopyDone(true);setTimeout(()=>setCopyDone(false),2500);})
    .catch(()=>prompt('انسخ الرسالة:',buildWA()));
  };

  const doPrint=()=>{
    const items=getSelEx();
    const now=new Date().toLocaleDateString('ar-EG',{year:'numeric',month:'long',day:'numeric'});
    const exHTML=items.map((item,i)=>
      '<div style="border:1px solid #e2e8f0;border-right:4px solid #0e7490;border-radius:8px;padding:14px 16px;margin-bottom:12px;break-inside:avoid">'+
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'+
      '<div style="width:24px;height:24px;background:#0e7490;color:#fff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0">'+(i+1)+'</div>'+
      '<strong style="font-size:14px;color:#0f2d4a">'+item.ex.name+'</strong>'+
      '<span style="font-size:11px;color:#64748b;margin-right:4px">('+item.ex.eng+')</span>'+
      '</div>'+
      '<p style="font-size:12px;color:#334155;line-height:1.65;margin-bottom:7px">'+item.ex.desc+'</p>'+
      '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:5px">'+
      '<span style="background:#f1f5f9;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:700">🔄 '+item.ex.sets+' مجموعات</span>'+
      '<span style="background:#f1f5f9;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:700">✖ '+item.ex.reps+' تكرار</span>'+
      '<span style="background:#f1f5f9;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:700">⏱ '+item.ex.hold+'</span>'+
      (item.ex.muscle?'<span style="background:#f1f5f9;padding:3px 9px;border-radius:5px;font-size:11px">💪 '+item.ex.muscle+'</span>':'')+
      '</div>'+
      (item.ex.note?'<p style="font-size:11px;color:#d97706;margin-top:3px">💡 '+item.ex.note+'</p>':'')+
      '<p style="font-size:11px;color:#0e7490;margin-top:3px">▶ '+item.ex.yt+'</p>'+
      '</div>'
    ).join('');
    const html='<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"/><title>برنامج التمارين</title>'+
      '<style>@import url("https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800;900&display=swap");'+
      'body{font-family:Cairo,sans-serif;direction:rtl;padding:28px;max-width:820px;margin:auto;color:#0f172a}'+
      '.ph{text-align:center;border-bottom:2px solid #0e7490;padding-bottom:14px;margin-bottom:18px}'+
      '.ph h1{font-size:20px;color:#0f2d4a;font-weight:900}.ph p{font-size:12px;color:#64748b;margin-top:3px}'+
      '.pinfo{background:#f8fafc;padding:12px 16px;border-radius:8px;display:flex;justify-content:space-between;margin-bottom:20px;font-size:13px}'+
      '.warn{background:#fef3c7;border:1px solid #d97706;padding:10px 14px;border-radius:8px;font-size:11px;color:#92400e;margin-top:20px}'+
      '.foot{display:flex;justify-content:space-between;font-size:11px;color:#94a3b8;margin-top:16px;padding-top:12px;border-top:1px solid #e2e8f0}'+
      '</style></head><body>'+
      '<div class="ph"><h1>🏥 Motion Clinic — برنامج التمارين العلاجية</h1><p>عيادة الحركة | دمشق، سوريا</p></div>'+
      '<div class="pinfo">'+
      '<span>'+(selP?'المريض: '+selP.name:'')+' '+(sessionNote?'| '+sessionNote:'')+'</span>'+
      '<span>'+(settings.therapistName||'')+' | '+now+'</span>'+
      '</div>'+
      exHTML+
      (therapistNote?'<div class="warn">📌 ملاحظات المعالج: '+therapistNote+'</div>':'')+
      '<div class="warn">⚠️ نفّذ التمارين بحسب إرشادات معالجك. توقف فوراً عند زيادة الألم.</div>'+
      '<div class="foot"><span>Motion Clinic © '+new Date().getFullYear()+'</span><span>'+items.length+' تمارين علاجية</span></div>'+
      '</body></html>';
    const w=window.open('','_blank');w.document.write(html);w.document.close();setTimeout(()=>w.print(),400);
  };

  return(
    <div className="page-content">
      <div className="page-header">
        <div>
          <h1 className="page-title">🏋️ مكتبة التمارين التأهيلية</h1>
          <p className="page-subtitle">HEP Library — {totalShown} تمرين في {HEP_CATS.length} أقسام</p>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {selected.size>0&&<button className="btn btn-secondary" onClick={()=>setSelected(new Set())}>✕ إلغاء ({selected.size})</button>}
          {selected.size>0&&<button className="btn btn-accent" onClick={()=>setSendModal(true)}>📤 إرسال للمريض ({selected.size})</button>}
        </div>
      </div>

      <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'14px 18px',marginBottom:18}}>
        <div className="form-row" style={{marginBottom:10}}>
          <input className="input" placeholder="🔍 ابحث بالتمرين أو العضلة أو الحالة..." value={searchQ} onChange={e=>setSearchQ(e.target.value)}/>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            {selected.size>0&&<span style={{background:'var(--accent-light)',color:'var(--accent-dark)',padding:'4px 12px',borderRadius:20,fontSize:12,fontWeight:700,whiteSpace:'nowrap'}}>{selected.size} محدد</span>}
          </div>
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {[['all','الكل'],...HEP_CATS.map(c=>[c.id,c.icon+' '+c.name.split('(')[0].trim()])].map(([id,lbl])=>(
            <button key={id} className={'btn btn-sm '+(activeFilter===id?'btn-primary':'btn-secondary')} onClick={()=>setActiveFilter(id)}>{lbl}</button>
          ))}
        </div>
      </div>

      {selected.size>0&&(
        <div style={{background:'linear-gradient(135deg,var(--teal),var(--primary))',color:'#fff',borderRadius:'var(--radius)',padding:'12px 20px',marginBottom:16,display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
          <span style={{flex:1,fontWeight:700,fontSize:14}}>✅ {selected.size} تمرين محدد</span>
          <button className="btn btn-sm" style={{background:'rgba(255,255,255,0.15)',color:'#fff',border:'1px solid rgba(255,255,255,0.3)'}} onClick={()=>setSelected(new Set())}>✕ إلغاء</button>
          <button className="btn btn-sm" style={{background:'#fff',color:'var(--primary)',fontWeight:800}} onClick={()=>setSendModal(true)}>📤 إرسال للمريض</button>
        </div>
      )}

      {filteredCats.map(cat=>{
        const origCat=HEP_CATS.find(c=>c.id===cat.id);
        return(
          <div key={cat.id} style={{marginBottom:28}}>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14,padding:'12px 18px',borderRadius:'var(--radius)',background:'var(--card)',border:'1px solid var(--border)',borderRight:'5px solid '+cat.color}}>
              <span style={{fontSize:22}}>{cat.icon}</span>
              <div style={{flex:1}}><div style={{fontSize:16,fontWeight:900,color:'var(--text-dark)'}}>{cat.name}</div></div>
              <span style={{background:cat.color+'22',color:cat.color,padding:'3px 12px',borderRadius:20,fontSize:12,fontWeight:700}}>{cat.exercises.length} تمرين</span>
            </div>
            <div className="grid-3">
              {cat.exercises.map((ex,exIdx)=>{
                const realIdx=origCat.exercises.indexOf(ex);
                const key=cat.id+'_'+realIdx;
                const isSel=selected.has(key);
                return(
                  <div key={exIdx} className="card" style={{cursor:'pointer',border:isSel?'2px solid var(--teal)':'1px solid var(--border)',background:isSel?'rgba(8,145,178,0.04)':'var(--card)',transition:'all 0.18s'}} onClick={()=>toggleSel(cat.id,realIdx)}>
                    <div className="card-body" style={{paddingBottom:10}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
                        <div style={{display:'flex',alignItems:'center',gap:6,flex:1}}>
                          <div style={{width:22,height:22,borderRadius:6,background:isSel?'var(--teal)':'var(--border)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all 0.18s'}}>
                            {isSel&&<span style={{color:'#fff',fontSize:12}}>✓</span>}
                          </div>
                          <strong style={{fontSize:13,color:isSel?'var(--teal)':'var(--text-dark)',fontWeight:800,lineHeight:1.3}}>{ex.name}</strong>
                        </div>
                        <span className={'badge '+(ex.diff==='easy'?'badge-green':ex.diff==='medium'?'badge-yellow':'badge-red')} style={{fontSize:10,flexShrink:0,marginRight:6}}>{diffL[ex.diff]}</span>
                      </div>
                      <p style={{fontSize:11.5,color:'var(--text-mid)',lineHeight:1.6,marginBottom:8}}>{ex.desc}</p>
                      <div className="tag-list" style={{marginBottom:8}}>
                        {ex.tags.map((t,j)=><span key={j} className={'badge '+tColors[j%tColors.length]} style={{fontSize:10}}>{t}</span>)}
                      </div>
                      <div style={{display:'flex',gap:6,flexWrap:'wrap',paddingTop:8,borderTop:'1px dashed var(--border)'}}>
                        {[['🔄',ex.sets+' مجموعات'],['✖',ex.reps+' تكرار'],['⏱',ex.hold]].map(([ic,vl],i)=>(
                          <span key={i} style={{display:'flex',alignItems:'center',gap:3,fontSize:11,padding:'3px 8px',background:'var(--surface)',borderRadius:6,border:'1px solid var(--border)'}}>
                            <span>{ic}</span><strong style={{color:'var(--text-dark)'}}>{vl}</strong>
                          </span>
                        ))}
                        {ex.muscle&&<span style={{fontSize:10,padding:'3px 8px',background:'var(--primary-bg)',borderRadius:6,color:'var(--primary)',fontWeight:700}}>💪 {ex.muscle}</span>}
                      </div>
                      {ex.note&&<div style={{marginTop:6,fontSize:11,color:'var(--accent-dark)',background:'var(--accent-light)',padding:'4px 9px',borderRadius:6}}>💡 {ex.note}</div>}
                    </div>
                    <div style={{padding:'8px 16px',background:'var(--surface)',borderTop:'1px solid var(--border)',display:'flex',gap:8,alignItems:'center'}} onClick={e=>e.stopPropagation()}>
                      <a href={ex.yt} target="_blank" rel="noreferrer" style={{display:'inline-flex',alignItems:'center',gap:5,padding:'5px 11px',background:'#dc2626',color:'#fff',borderRadius:7,fontSize:11,fontWeight:700,textDecoration:'none'}}>▶ YouTube</a>
                      <span style={{fontSize:10.5,color:'var(--text-light)',fontStyle:'italic'}}>{ex.eng}</span>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}

      {filteredCats.length===0&&<div className="empty-state"><div className="icon">🔍</div><h3>لا نتائج</h3></div>}

      {sendModal&&(
        <div className="modal-overlay" onClick={()=>setSendModal(false)}>
          <div className="modal modal-lg" onClick={e=>e.stopPropagation()} style={{maxWidth:700}}>
            <div className="modal-header" style={{background:'linear-gradient(135deg,var(--primary),var(--teal))'}}>
              <h2 style={{color:'#fff'}}>📤 إرسال برنامج التمارين للمريض</h2>
              <button className="modal-close" onClick={()=>setSendModal(false)} style={{background:'rgba(255,255,255,0.15)',color:'#fff'}}>✕</button>
            </div>
            <div className="modal-body">
              <div className="tabs-nav" style={{marginBottom:14}}>
                {[['whatsapp','📱 واتساب'],['print','🖨️ طباعة PDF'],['preview','👁 معاينة']].map(([k,l])=>(
                  <button key={k} className={'tab-btn '+(sendTab===k?'active':'')} onClick={()=>setSendTab(k)}>{l}</button>
                ))}
              </div>
              <div className="form-row" style={{marginBottom:12}}>
                <div className="form-group">
                  <label className="form-label">المريض (اختياري)</label>
                  <select className="input" value={selPatient} onChange={e=>setSelPatient(e.target.value)}>
                    <option value="">— بدون ربط —</option>
                    {patients.map(p=><option key={p.id} value={p.id}>{p.name} ({p.id})</option>)}
                  </select>
                </div>
                <div className="form-group">
                  <label className="form-label">رقم الجلسة / الوصف</label>
                  <input className="input" value={sessionNote} onChange={e=>setSessionNote(e.target.value)} placeholder="الجلسة 4 — برنامج منزلي"/>
                </div>
              </div>
              <div className="form-group" style={{marginBottom:14}}>
                <label className="form-label">ملاحظات المعالج</label>
                <textarea className="input" style={{minHeight:60,resize:'vertical'}} value={therapistNote} onChange={e=>setTherapistNote(e.target.value)} placeholder="نفّذ التمارين صباحاً. توقف عند الألم. موعدنا بعد أسبوعين..."/>
              </div>
              <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'12px 16px',marginBottom:14,maxHeight:200,overflowY:'auto'}}>
                <div style={{fontWeight:800,fontSize:12,marginBottom:8}}>📋 التمارين المحددة ({selected.size})</div>
                {getSelEx().map((item,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'7px 12px',background:'var(--card)',borderRadius:8,border:'1px solid var(--border)',borderRight:'3px solid var(--teal)',marginBottom:6}}>
                    <div style={{width:22,height:22,borderRadius:6,background:'var(--teal)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:900,flexShrink:0}}>{i+1}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:12.5,fontWeight:800}}>{item.ex.name}</div>
                      <div style={{fontSize:11,color:'var(--text-light)'}}>{item.ex.sets} مجموعات × {item.ex.reps} | ⏱ {item.ex.hold}</div>
                    </div>
                  </div>
                ))}
              </div>
              {sendTab==='whatsapp'&&<button className="btn btn-success" style={{width:'100%',justifyContent:'center',padding:'11px',fontSize:14,background:'#059669'}} onClick={doCopy}>{copyDone?'✅ تم النسخ!':'📋 نسخ رسالة الواتساب كاملة'}</button>}
              {sendTab==='print'&&<button className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:'11px',fontSize:14}} onClick={doPrint}>🖨️ فتح نافذة الطباعة / حفظ PDF</button>}
              {sendTab==='preview'&&(
                <div style={{background:'linear-gradient(135deg,#0f2d4a,#1a4a6e)',borderRadius:'var(--radius)',padding:20,color:'#fff'}}>
                  <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14}}>
                    <div style={{width:40,height:40,borderRadius:12,background:'linear-gradient(135deg,var(--accent),#f59e0b)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>🏥</div>
                    <div><div style={{fontWeight:900,fontSize:15}}>Motion Clinic</div><div style={{fontSize:11,opacity:0.6}}>عيادة الحركة — دمشق</div></div>
                  </div>
                  {selP&&<div style={{background:'rgba(255,255,255,0.1)',borderRadius:8,padding:'8px 12px',marginBottom:12,fontSize:13,fontWeight:700}}>👤 {selP.name} {sessionNote&&'| '+sessionNote}</div>}
                  <div style={{display:'flex',flexDirection:'column',gap:7,maxHeight:240,overflowY:'auto'}}>
                    {getSelEx().map((item,i)=>(
                      <div key={i} style={{background:'rgba(255,255,255,0.08)',borderRadius:8,padding:'9px 12px',borderRight:'3px solid #06b6d4',display:'flex',alignItems:'center',gap:10}}>
                        <div style={{width:22,height:22,borderRadius:6,background:'rgba(255,255,255,0.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:900,flexShrink:0}}>{i+1}</div>
                        <div>
                          <div style={{fontSize:12,fontWeight:800}}>{item.ex.name}</div>
                          <div style={{fontSize:10,opacity:0.6}}>🔄 {item.ex.sets}×{item.ex.reps} | ⏱ {item.ex.hold}</div>
                        </div>
                      </div>
                    ))}
                  </div>

function InventoryModal({item, categories, onClose}){
  const {addInventory, updateInventory} = useClinic();
  const isEdit = !!item;
  const [form,setForm] = useState(item||{name:'',category:'',quantity:0,unit:'',minLevel:10,lastOrder:today(),cost:0});
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));
  const save=()=>{
    if(!form.name){alert('الاسم مطلوب');return;}
    if(isEdit) updateInventory(item.id,{...form,quantity:+form.quantity,minLevel:+form.minLevel,cost:+form.cost});
    else addInventory({...form,quantity:+form.quantity,minLevel:+form.minLevel,cost:+form.cost,id:nextId('INVSTK')});
    onClose();
  };
  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-header"><h2>{isEdit?'✏️ تعديل العنصر':'📦 إضافة عنصر مخزون'}</h2><button className="modal-close" onClick={onClose}>✕</button></div>
        <div className="modal-body">
          <div className="form-row">
            <TF label="الاسم *" value={form.name} onChange={v=>f('name',v)}/>
            <SF label="الفئة" value={form.category} onChange={v=>f('category',v)} options={['',  ...categories.map(c=>c.label)]}/>
          </div>
          <div className="form-row-3">
            <TF label="الكمية" type="number" value={form.quantity} onChange={v=>f('quantity',v)}/>
            <TF label="الوحدة" value={form.unit} onChange={v=>f('unit',v)} placeholder="إبرة، لفة، عبوة..."/>
            <TF label="الحد الأدنى" type="number" value={form.minLevel} onChange={v=>f('minLevel',v)}/>
          </div>
          <div className="form-row">
            <TF label="آخر طلب" type="date" value={form.lastOrder} onChange={v=>f('lastOrder',v)}/>
            <TF label="التكلفة" type="number" value={form.cost} onChange={v=>f('cost',v)}/>
          </div>
        </div>
        <div className="modal-footer"><button className="btn btn-ghost" onClick={onClose}>إلغاء</button><div style={{flex:1}}/><button className="btn btn-accent" onClick={save}>💾 حفظ</button></div>
      </div>
    </div>
  );
}

function ServicesPage(){
  const {settings} = useClinic();
  const [services, setServices] = useState(()=>{ try{return JSON.parse(localStorage.getItem('mc6_services'))||DEF_SERVICES;}catch{return DEF_SERVICES;} });
  const [modal,setModal] = useState(null);
  useEffect(()=>{ localStorage.setItem('mc6_services',JSON.stringify(services)); },[services]);

  const add = (d) => { const n={...d,id:nextId('SV'),active:true}; setServices(p=>[...p,n]); setModal(null); };
  const update = (id,d) => { setServices(p=>p.map(x=>x.id===id?{...x,...d}:x)); setModal(null); };
  const del = (id) => { if(confirm('حذف الخدمة؟')) setServices(p=>p.filter(x=>x.id!==id)); };

  return(
    <div className="page-content">
      <div className="page-header">
        <div><h1 className="page-title">🛠️ الخدمات والأسعار</h1><p className="page-subtitle">{services.length} خدمة</p></div>
        <button className="btn btn-accent" onClick={()=>setModal({})}>+ خدمة جديدة</button>
      </div>
      <div className="card">
        <table className="data-table">
          <thead><tr><th>الكود</th><th>الخدمة</th><th>الفئة</th><th>السعر</th><th>المدة</th><th>الحالة</th><th>إجراءات</th></tr></thead>
          <tbody>
            {services.map(s=>(
              <tr key={s.id}>
                <td><strong>{s.id}</strong></td>
                <td><strong>{s.name}</strong></td>
                <td><span className="badge badge-blue">{s.category}</span></td>
                <td><strong>{fmt(s.price)} {settings.currency}</strong></td>
                <td>{s.duration>0?s.duration+' دقيقة':'—'}</td>
                <td><span className={`badge ${s.active?'badge-green':'badge-gray'}`}>{s.active?'نشطة':'موقوفة'}</span></td>
                <td><div className="row-actions">
                  <button className="row-action-btn" onClick={()=>setModal(s)}>✏️</button>
                  <button className="row-action-btn danger" onClick={()=>del(s.id)}>🗑</button>
                </div></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {modal&&<ServiceModal service={Object.keys(modal).length===0?null:modal} onSave={d=>d.id?update(d.id,d):add(d)} onClose={()=>setModal(null)}/>}
    </div>
  );
}

  const [auditFilter,setAuditFilter] = useState('');
  const [role,setRole] = useState(localStorage.getItem('mc_role')||'admin');
  const restoreSnapshot = async (snap) => {
    if(!confirm('استرجاع لقطة '+new Date(snap.ts).toLocaleString('ar-EG')+'؟\nسيتم دمجها بأمان (إضافة الناقص فقط).')) return;
    await mergeImport(snap.data);
  };
  const handleCSVRestore = (file) => {
    if(!file) return;
    const isJSON = /\.json$/i.test(file.name||'') ;
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try{
        let parsed;
        if(isJSON){
          const d = JSON.parse(ev.target.result);
          const SECS = ['patients','records','sessions','appointments','finance','expenses','inbody','notes','staff','inventory','hepLib'];
          parsed = {};
          SECS.forEach(s=>{ if(Array.isArray(d[s]) && d[s].length) parsed[s]=d[s]; });
        } else {
          parsed = parseFullCSV(ev.target.result);
        }
        const counts = Object.entries(parsed).map(([k,v])=>`${k}: ${v.length}`).join(' · ');
        const total = Object.values(parsed).reduce((s,v)=>s+v.length,0);
        if(!total){ alert('لم يتم العثور على بيانات صالحة في الملف.'); return; }

        setImporting(true);
        await mergeImport(parsed);

              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>

                  <div key={key} style={{border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',padding:'12px 14px'}}>

                    </div>
                    <button className="btn btn-secondary btn-sm" style={{width:'100%',justifyContent:'center'}} onClick={()=>{
                      try{
                        const data=JSON.parse(localStorage.getItem('mc6_'+key)||'[]');
                        if(!data.length){alert('لا توجد بيانات في '+label);return;}
                        const headers=Object.keys(data[0]);
                        const rows=[headers.join(',')];
                        data.forEach(row=>{rows.push(headers.map(h=>{const v=String(row[h]??'');return '"'+v.replace(/"/g,'""')+'"';}).join(','));});
                        const blob=new Blob(['﻿'+rows.join('\n')],{type:'text/csv;charset=utf-8'});
                        const a=document.createElement('a');
                        a.href=URL.createObjectURL(blob);
                        a.download='MC_'+key+'_'+new Date().toISOString().slice(0,10)+'.csv';

                      }catch(e){alert('خطأ: '+e.message);}

                  </div>
                ))}
              </div>
              <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:'11px',fontSize:14}} onClick={()=>{
                const SEP='\n';const SEP2='\n\n';const BOM='\ufeff';
                const COMMA=',';const QQ='""';const QT='"';
                const keys=['patients','appointments','finance','sessions','inbody','inventory'];
                const parts=[];

function AIAssistantPage({navigate}){
  const {patients, settings, records, sessions, finance, appointments, expenses, inventory} = useClinic();
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [activeTab, setActiveTab] = useState('chat');
  const [contextPatient, setContextPatient] = useState('');
  const [showContext, setShowContext] = useState(false);
  const [copyIdx, setCopyIdx] = useState(null);
  const messagesEndRef = React.useRef(null);
  const inputRef = React.useRef(null);

  React.useEffect(()=>{
    messagesEndRef.current?.scrollIntoView({behavior:'smooth'});
  }, [messages]);

  const apiKey = window.ANTHROPIC_API_KEY || localStorage.getItem('mc_api_key') || '';

  const getClinicContext = () => {
    const selP = patients.find(p=>p.id===contextPatient);
    const today = new Date().toLocaleDateString('ar-EG');
    const ym = new Date().toISOString().slice(0,7);
    const todayISO = new Date().toISOString().slice(0,10);
    let ctx = `\n\n━━━━━━━━━━━━━━━━━━━━━━━━\n📊 بيانات العيادة الحالية (${today})\n━━━━━━━━━━━━━━━━━━━━━━━━\n`;
    ctx += `إجمالي المرضى: ${patients.length}\n`;
    ctx += `المرضى النشطون: ${patients.filter(p=>p.status==='نشط').length}\n`;
    ctx += `الجلسات هذا الشهر: ${sessions.filter(s=>s.date?.startsWith(ym)).length}\n`;
    const monthRev = finance.filter(f=>f.date?.startsWith(ym)).reduce((s,f)=>s+(f.paid||0),0);
    const monthExp = (expenses||[]).filter(e=>e.date?.startsWith(ym)).reduce((s,e)=>s+(e.amount||0),0);
    const outstanding = finance.reduce((s,f)=>s+(f.remaining||0),0);
    ctx += `الإيرادات هذا الشهر: ${monthRev.toLocaleString()} ل.س\n`;
    ctx += `المصروفات هذا الشهر: ${monthExp.toLocaleString()} ل.س\n`;
    ctx += `صافي الربح الشهري: ${(monthRev-monthExp).toLocaleString()} ل.س\n`;
    ctx += `إجمالي المبالغ المستحقة (غير محصّلة): ${outstanding.toLocaleString()} ل.س\n`;
    ctx += `مواعيد اليوم: ${(appointments||[]).filter(a=>a.date===todayISO).length}\n`;
    const lowStock = (inventory||[]).filter(i=>i.quantity<=i.minLevel);
    if(lowStock.length) ctx += `⚠️ أصناف مخزون منخفضة: ${lowStock.map(i=>i.name).join('، ')}\n`;
    // أكثر التشخيصات شيوعاً
    const diagCount = {};
    records.forEach(r=>{ const d=(r.diagnosis||'').trim(); if(d) diagCount[d]=(diagCount[d]||0)+1; });
    const topDiag = Object.entries(diagCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
    if(topDiag.length) ctx += `أكثر التشخيصات: ${topDiag.map(([d,n])=>`${d} (${n})`).join('، ')}\n`;
    if(selP){
      const patRecs = records.filter(r=>r.patientId===selP.id);
      const patSes = sessions.filter(s=>s.patientId===selP.id);
      ctx += `\n👤 المريض المحدد: ${selP.name}\n`;
      ctx += `العمر: ${selP.age||'—'} | الجنس: ${selP.gender||'—'}\n`;
      if(selP.allergy && selP.allergy !== 'لا يوجد') ctx += `الحساسية: ${selP.allergy}\n`;
      if(patRecs[0]) ctx += `التشخيص الأخير: ${patRecs[0].diagnosis||patRecs[0].complaint||'—'}\n`;
      ctx += `عدد الجلسات: ${patSes.length}\n`;
    }
    return ctx;
  };

  const sendMessage = async (userMsg) => {
    if(!userMsg.trim()) return;
    if(!apiKey){
      setMessages(p=>[...p,
        {role:'user',content:userMsg},
        {role:'assistant',content:'⚠️ لا يوجد API Key. اذهب للإعدادات ← 🤖 الذكاء الاصطناعي وأدخل مفتاحك.',error:true}
      ]);
      return;
    }

    const userMessage = {role:'user', content:userMsg, time: new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'})};
    setMessages(p=>[...p, userMessage]);
    setInput('');
    setLoading(true);

    const history = messages.slice(-10).map(m=>({role:m.role,content:m.content}));
    const systemWithContext = MOTION_AI_SYSTEM + getClinicContext();

    try{
      const resp = await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'x-api-key': apiKey,
          'anthropic-version':'2023-06-01',
          'anthropic-dangerous-direct-browser-access':'true'
        },
        body: JSON.stringify({
          model: localStorage.getItem('mc_ai_model') || 'claude-sonnet-4-5',
          max_tokens: 2000,
          system: systemWithContext,
          messages: [...history, {role:'user', content: userMsg}]
        })
      });
      const data = await resp.json();
      if(data.error) throw new Error(data.error.message);
      const text = data.content?.map(b=>b.text||'').join('') || 'لم تصل استجابة.';
      setMessages(p=>[...p,{role:'assistant',content:text,time:new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'})}]);
    }catch(e){
      setMessages(p=>[...p,{role:'assistant',content:'❌ خطأ: '+e.message,error:true}]);
    }
    setLoading(false);
    setTimeout(()=>inputRef.current?.focus(), 100);
  };

  const handleQuickAction = (action) => {
    if(action.prompt){
      setInput(action.prompt);
      setActiveTab('chat');
      setTimeout(()=>inputRef.current?.focus(), 100);
    }
  };

  const copyMsg = (idx, text) => {
    navigator.clipboard.writeText(text).then(()=>{
      setCopyIdx(idx);
      setTimeout(()=>setCopyIdx(null),2000);
    });
  };

  const clearChat = () => {
    if(confirm('مسح المحادثة كاملاً؟')) setMessages([]);
  };

  const selP = patients.find(p=>p.id===contextPatient);

  const formatMsg = (text) => {
    const lines = text.split('\n');
    const result = [];
    let tableRows = [];
    let inTable = false;

    const flushTable = () => {
      if(!tableRows.length) return;
      const filtered = tableRows.filter(r=>!r.match(/^\|[\s\-|]+\|$/));
      if(filtered.length){
        result.push(
          <div key={'t'+result.length} style={{overflowX:'auto',margin:'10px 0'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
              {filtered.map((row,ri)=>{
                const cells = row.split('|').filter((_,ci,arr)=>ci>0&&ci<arr.length-1);
                const Tag = ri===0?'th':'td';
                return(
                  <tr key={ri} style={{background:ri===0?'var(--surface)':ri%2===0?'var(--surface)':'transparent'}}>
                    {cells.map((c,ci)=>
                      <Tag key={ci} style={{padding:'7px 10px',border:'1px solid var(--border)',textAlign:'right',fontWeight:ri===0?700:400,fontSize:ri===0?11:12}}>
                        {c.trim().replace(/\*\*/g,'')}
                      </Tag>
                    )}
                  </tr>
                );
              })}
            </table>
          </div>
        );
      }
      tableRows = [];
      inTable = false;
    };

    lines.forEach((line,i)=>{
      if(line.startsWith('|')){
        inTable = true;
        tableRows.push(line);
        return;
      }
      if(inTable) flushTable();

      const clean = line.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>');

      if(/^#{1,3}\s/.test(line)){
        const txt = line.replace(/^#+\s/,'').replace(/\*\*/g,'');
        result.push(<div key={i} style={{fontWeight:800,color:'var(--primary)',fontSize:14,marginTop:14,marginBottom:6,borderRight:'3px solid var(--primary)',paddingRight:10}}>{txt}</div>);
      } else if(line.startsWith('- ')||line.startsWith('• ')){
        result.push(<div key={i} style={{display:'flex',gap:8,marginBottom:3,paddingRight:8}}><span style={{color:'var(--teal)',flexShrink:0,marginTop:2}}>›</span><span style={{fontSize:13,color:'var(--text-dark)'}} dangerouslySetInnerHTML={{__html:clean.replace(/^[-•]\s/,'')}}></span></div>);
      } else if(/^\d+\.\s/.test(line)){
        const num = line.match(/^(\d+)\./)[1];
        const txt = line.replace(/^\d+\.\s/,'');
        result.push(<div key={i} style={{display:'flex',gap:8,marginBottom:4}}><span style={{minWidth:22,height:22,background:'var(--primary)',color:'#fff',borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:900,flexShrink:0}}>{num}</span><span style={{fontSize:13,color:'var(--text-dark)',paddingTop:2}} dangerouslySetInnerHTML={{__html:txt.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}}></span></div>);
      } else if(line.trim()){
        result.push(<p key={i} style={{fontSize:13,color:'var(--text-dark)',marginBottom:4,lineHeight:1.75}} dangerouslySetInnerHTML={{__html:clean}}></p>);
      } else {
        result.push(<div key={i} style={{height:6}}/>);
      }
    });

    if(inTable) flushTable();
    return result;
  };

  return(
    <div className="page-content" style={{height:'calc(100vh - 60px)',display:'flex',flexDirection:'column',padding:'16px 20px',gap:14}}>

                  ))}
                  <span style={{fontSize:12,color:'var(--text-light)',marginRight:8}}>MOTION AI يفكر...</span>
                </div>
              </div>
            )}
            <div ref={messagesEndRef}/>
          </div>

          {/* Input */}
          <div style={{flexShrink:0,background:'var(--card)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'10px 14px',display:'flex',gap:10,alignItems:'flex-end',boxShadow:'var(--shadow)'}}>
            <textarea
              ref={inputRef}
              className="input"
              style={{flex:1,minHeight:44,maxHeight:160,resize:'none',border:'none',background:'transparent',padding:'8px 0',fontSize:13,outline:'none',lineHeight:1.6}}
              value={input}
              onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>{
                if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage(input);}
              }}
              placeholder="اكتب سؤالك... (Enter للإرسال، Shift+Enter لسطر جديد)"
              disabled={loading}
            />
            <button
              className="btn btn-accent"
              style={{padding:'10px 18px',flexShrink:0,alignSelf:'flex-end'}}
              onClick={()=>sendMessage(input)}
              disabled={loading||!input.trim()}
            >
              {loading?'⏳':'إرسال ↑'}
            </button>
          </div>
        </>
      )}
    </div>
  );
}


function AnalyticsPage({navigate}){
  const {patients, appointments, sessions, finance, expenses, records, settings} = useClinic();
  const todayStr = today();
  const now = new Date();

  // Churn Detection — مرضى لم يحضروا منذ 14 يوم
  const churnPatients = patients.filter(p=>{
    if(p.status!=='نشط') return false;
    const patSes = sessions.filter(s=>s.patientId===p.id);
    if(patSes.length===0) return false;
    const lastSes = patSes.sort((a,b)=>b.date.localeCompare(a.date))[0];
    const daysDiff = Math.floor((now - new Date(lastSes.date))/(1000*60*60*24));
    return daysDiff>=14;
  });

  // Revenue projection — الأشهر القادمة
  const confirmedApts = appointments.filter(a=>a.status==='confirmed'&&a.date>=todayStr);
  const avgPerSession = sessions.length>0? sessions.reduce((s,ses)=>s+(ses.paid||0),0)/sessions.length : 0;
  const projectedRev = Math.round(confirmedApts.length * avgPerSession);

  // Most common injuries
  const diagMap = {};
  records.forEach(r=>{ if(r.diagnosis) diagMap[r.diagnosis]=(diagMap[r.diagnosis]||0)+1; });
  const topDiag = Object.entries(diagMap).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const totalRec = records.length||1;

  // Monthly revenue trend (last 3 months)
  const monthlyRev = {};
  finance.forEach(f=>{
    const m = (f.date||'').slice(0,7);
    if(m) monthlyRev[m]=(monthlyRev[m]||0)+(f.paid||0);
  });
  const months = Object.entries(monthlyRev).sort((a,b)=>a[0].localeCompare(b[0])).slice(-6);
  const maxRev = Math.max(...months.map(([,v])=>v),1);

  return(
    <div className="page-content">
      <div className="page-header">
        <div><h1 className="page-title">🧠 التحليل التنبئي</h1><p className="page-subtitle">مؤشرات استباقية لأداء العيادة</p></div>
      </div>

      {/* Churn Alert */}
      {churnPatients.length>0&&(
        <div className="alert alert-warning" style={{marginBottom:20}}>
          <div>
            <strong>⚠️ تنبيه التسرب (Churn Alert)</strong>
            <div style={{marginTop:6,fontSize:13}}>{churnPatients.length} مريض لم يحضر منذ أكثر من 14 يوم:</div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:8}}>
              {churnPatients.map(p=>(
                <button key={p.id} className="btn btn-sm btn-secondary" onClick={()=>navigate('patient',p.id)}>{p.name}</button>
              ))}
            </div>
          </div>
        </div>
      )}

      <div className="stats-grid">
        {[
          ['⚠️ خطر التسرب', churnPatients.length+' مريض', 'var(--red)'],
          ['📅 مواعيد مؤكدة', confirmedApts.length+' موعد', 'var(--blue)'],
          ['💰 إيرادات متوقعة', fmt(projectedRev)+' '+settings.currency, 'var(--green)'],
          ['📊 متوسط الجلسة', fmt(Math.round(avgPerSession))+' '+settings.currency, 'var(--purple)'],
        ].map(([l,v,c],i)=>(
          <div key={i} className="stat-card">
            <div className="stat-content"><h3 style={{color:c,fontSize:17}}>{v}</h3><p>{l}</p></div>
          </div>
        ))}
      </div>

      <div className="grid-2" style={{gap:20,marginTop:4}}>
        <div className="card">
          <div className="card-header"><h3>🦴 أكثر الإصابات شيوعاً</h3></div>
          <div className="card-body">
            {topDiag.length===0?(
              <div className="empty-state" style={{padding:'20px 0'}}><div className="icon">🦴</div><h3>لا بيانات</h3></div>
            ):(
              topDiag.map(([diag,cnt])=>(
                <div key={diag} style={{marginBottom:12}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                    <span style={{fontSize:13,fontWeight:700}}>{diag}</span>
                    <span style={{fontSize:13,fontWeight:900,color:'var(--primary)'}}>{Math.round(cnt/totalRec*100)}%</span>
                  </div>
                  <div className="progress-bar">
                    <div className="progress-fill" style={{width:`${cnt/totalRec*100}%`}}/>
                  </div>
                </div>
              ))
            )}
            {topDiag.length>0&&(
              <div className="alert alert-info" style={{marginTop:12}}>
                💡 <strong>توصية تسويقية:</strong> ركّز محتواك على "{topDiag[0]?.[0]}" لأنها أكثر الحالات لديك
              </div>
            )}
          </div>
        </div>

        <div className="card">
          <div className="card-header"><h3>📈 الإيرادات الشهرية</h3></div>
          <div className="card-body">
            {months.length===0?(
              <div className="empty-state" style={{padding:'20px 0'}}><div className="icon">📈</div><h3>لا بيانات كافية</h3></div>
            ):(
              <div>
                {months.map(([m,v])=>(
                  <div key={m} style={{marginBottom:10}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                      <span style={{fontSize:12,fontWeight:700,color:'var(--text-mid)'}}>{m}</span>
                      <span style={{fontSize:13,fontWeight:900,color:'var(--green)'}}>{fmt(v)} {settings.currency}</span>
                    </div>
                    <div className="progress-bar"><div className="progress-fill" style={{width:`${v/maxRev*100}%`,background:'linear-gradient(90deg,var(--green),#10b981)'}}/></div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>

        {/* مرضى بحاجة متابعة */}
        <div className="card">
          <div className="card-header"><h3>🔔 مرضى بحاجة متابعة</h3></div>
          <div className="card-body">
            {churnPatients.length===0?(
              <div className="alert alert-success">✅ جميع المرضى النشطين يحضرون بانتظام</div>
            ):(
              churnPatients.map(p=>{
                const patSes = sessions.filter(s=>s.patientId===p.id).sort((a,b)=>b.date.localeCompare(a.date));
                const lastDate = patSes[0]?.date||'—';
                const days = Math.floor((now-new Date(lastDate))/(1000*60*60*24));
                return(
                  <div key={p.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 12px',background:'var(--red-light)',borderRadius:8,marginBottom:8}}>
                    <div>
                      <div style={{fontWeight:800,fontSize:13}}>{p.name}</div>
                      <div style={{fontSize:11,color:'var(--red)'}}>آخر زيارة: {lastDate} ({days} يوم)</div>
                    </div>
                    <button className="btn btn-sm btn-primary" onClick={()=>navigate('patient',p.id)}>عرض الملف</button>
                  </div>
                );
              })
            )}
          </div>
        </div>

        {/* WhatsApp Messages */}
        <div className="card">
          <div className="card-header"><h3>📱 أدوات التواصل</h3></div>
          <div className="card-body">
            <div style={{fontWeight:700,fontSize:13,color:'var(--text-mid)',marginBottom:12}}>إرسال رسائل واتساب جماعية</div>
            {[
              ['تذكير بموعد',`مرحباً، نودّ تذكيرك بموعدك في ${settings.clinicName} غداً. نتطلع لرؤيتك 🙏`,'blue'],
              ['دعوة لجلسة متابعة',`مرحباً، لاحظنا أنك لم تزرنا منذ فترة. هل أنت بخير؟ يسعدنا حجز موعد لك في ${settings.clinicName} 💪`,'orange'],
              ['طلب تقييم جوجل',`نشكرك على ثقتك بنا في ${settings.clinicName}! يسعدنا تقييمك على جوجل: [رابط]⭐⭐⭐⭐⭐`,'green'],
            ].map(([title,msg,c])=>(
              <div key={title} style={{padding:'10px 12px',background:'var(--surface)',borderRadius:8,marginBottom:8}}>
                <div style={{fontWeight:700,fontSize:13,marginBottom:4}}>{title}</div>
                <div style={{fontSize:11,color:'var(--text-light)',marginBottom:8,lineHeight:1.6}}>{msg}</div>
                <button className="btn btn-sm btn-secondary" onClick={()=>{navigator.clipboard.writeText(msg).then(()=>alert('تم نسخ الرسالة! أرسلها على واتساب'));}}>📋 نسخ الرسالة</button>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

  const {patients} = useClinic();
  const [patientId,setPatientId] = useState('');
  const [before,setBefore] = useState(null);
  const [after,setAfter]   = useState(null);

  const loadImg = (setter, e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => setter(ev.target.result);
    reader.readAsDataURL(file);
  };

  const exportComparison = async () => {
    const el = document.getElementById('xray-compare');
    if(el) await exportToPDF(el,'XRay_Comparison.pdf');
  };

  return(
    <div className="page-content">
      <div className="page-header">
        <div><h1 className="page-title">🩻 مقارنة الأشعة</h1><p className="page-subtitle">قبل وبعد العلاج — DICOM Viewer</p></div>
        {before&&after&&<button className="btn btn-accent" onClick={exportComparison}>📄 تصدير PDF</button>}
      </div>

      <div className="card" style={{marginBottom:20}}>
        <div className="card-body">
          <Field label="المريض">
            <select className="input" value={patientId} onChange={e=>setPatientId(e.target.value)}>
              <option value="">-- اختر المريض --</option>
              {patients.map(p=><option key={p.id} value={p.id}>{p.name} ({p.id})</option>)}
            </select>
          </Field>
        </div>
      </div>

      <div id="xray-compare" className="grid-2" style={{gap:20}}>
        {[['before','قبل العلاج',before,setBefore],['after','بعد العلاج',after,setAfter]].map(([key,label,img,setter])=>(
          <div key={key} className="card">
            <div className="card-header" style={{background:key==='before'?'var(--red-light)':'var(--green-light)'}}>
              <h3 style={{color:key==='before'?'var(--red)':'var(--green)'}}>{key==='before'?'🔴':'🟢'} {label}</h3>
            </div>
            <div className="card-body" style={{textAlign:'center'}}>
              {img?(
                <div style={{position:'relative'}}>
                  <img src={img} alt={label} style={{width:'100%',maxHeight:400,objectFit:'contain',borderRadius:8,background:'#000'}}/>
                  <button className="btn btn-xs btn-danger" style={{position:'absolute',top:8,right:8}} onClick={()=>setter(null)}>✕</button>
                </div>
              ):(
                <div style={{border:'2px dashed var(--border)',borderRadius:10,padding:'40px 20px',cursor:'pointer'}}
                  onClick={()=>document.getElementById('upload-'+key)?.click()}>
                  <div style={{fontSize:36,marginBottom:10}}>🩻</div>
                  <div style={{fontWeight:700,color:'var(--text-mid)'}}>اضغط لرفع {label}</div>
                  <div style={{fontSize:12,color:'var(--text-light)',marginTop:4}}>PNG, JPG, DICOM</div>
                </div>
              )}
              <input type="file" id={'upload-'+key} accept="image/*" style={{display:'none'}} onChange={e=>loadImg(setter,e)}/>
              {!img&&<button className="btn btn-outline btn-sm" style={{marginTop:10}} onClick={()=>document.getElementById('upload-'+key)?.click()}>📁 رفع صورة</button>}
            </div>
          </div>
        ))}
      </div>

      {before&&after&&(
        <div className="alert alert-success" style={{marginTop:16}}>
          ✅ تم تحميل كلتا الصورتين. اضغط على "تصدير PDF" لإنشاء تقرير مقارنة احترافي للمريض
        </div>
      )}
    </div>
  );
}


// ══════════════════════════════════════════════════
// SYNC STATUS BAR
// ══════════════════════════════════════════════════
function SyncStatusBar() {
  const { syncStatus, lastSync, pendingCount, pullFromSupabase, flushPending } = useClinic();
  const [rtConnected, setRtConnected] = React.useState(false);

  // مراقبة حالة اتصال Realtime
  React.useEffect(() => {
    const check = () => {
      try {
        const channels = _supaClient.getChannels();
        const connected = channels.some(ch => ch.state === 'joined');
        setRtConnected(connected);
      } catch(e) { setRtConnected(false); }
    };
    check();
    const t = setInterval(check, 3000);
    return () => clearInterval(t);
  }, []);

  const cfg = {
    idle:    { color: 'var(--text-light)', icon: '☁️',  label: 'Supabase' },
    syncing: { color: 'var(--accent)',     icon: '🔄',  label: 'جاري المزامنة...' },
    online:  { color: 'var(--green)',      icon: rtConnected ? '⚡' : '✅', label: rtConnected ? 'مباشر' : 'متزامن' },
    offline: { color: 'var(--red)',        icon: '📵',  label: 'بدون إنترنت' },
    error:   { color: 'var(--orange)',     icon: '⚠️',  label: 'خطأ في المزامنة' },
  };
  const c = cfg[syncStatus] || cfg.idle;
  const lastSyncStr = lastSync ? new Date(lastSync).toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' }) : null;

  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
      {pendingCount > 0 && (
        <span style={{
          background: 'var(--accent)', color: '#fff', fontSize: 10, fontWeight: 900,
          padding: '2px 7px', borderRadius: 999,
        }} title={`${pendingCount} عملية معلقة`}>
          {pendingCount} معلق
        </span>
      )}
      {rtConnected && syncStatus === 'online' && (
        <span style={{
          background: 'var(--green-light)', color: 'var(--green)',
          fontSize: 10, fontWeight: 900, padding: '2px 8px', borderRadius: 999,
          border: '1px solid var(--green)',
          animation: 'pulse 2s infinite',
        }} title="Realtime متصل — التحديث فوري على جميع الأجهزة">
          ⚡ LIVE
        </span>
      )}
      <button
        onClick={() => syncStatus === 'offline' ? flushPending() : pullFromSupabase()}
        title={syncStatus === 'offline' ? 'إعادة المحاولة عند الاتصال' : 'مزامنة الآن'}
        style={{
          display: 'flex', alignItems: 'center', gap: 5, padding: '5px 10px',
          background: c.color + '15', border: `1px solid ${c.color}44`,
          borderRadius: 8, cursor: 'pointer', fontSize: 12, fontWeight: 700,
          color: c.color, fontFamily: 'Cairo, sans-serif',
          animation: syncStatus === 'syncing' ? 'pulse 1s infinite' : 'none',
        }}
      >
        <span style={{ fontSize: 13 }}>{c.icon}</span>
        <span>{c.label}</span>
        {lastSyncStr && syncStatus === 'online' && (
          <span style={{ fontSize: 10, opacity: 0.7 }}>{lastSyncStr}</span>
        )}
      </button>
    </div>
  );
}

// AUTH — شاشة تسجيل الدخول (Supabase Auth)
// ══════════════════════════════════════════════════
function LoginScreen(){
  const [mode,setMode]   = useState('login'); // login | signup
  const [email,setEmail] = useState('');
  const [pw,setPw]       = useState('');
  const [busy,setBusy]   = useState(false);
  const [msg,setMsg]     = useState('');
  const [err,setErr]     = useState('');

  const submit = async (e) => {
    e.preventDefault();
    setBusy(true); setErr(''); setMsg('');
    try {
      if (mode === 'signup') {
        const { error } = await _supaClient.auth.signUp({ email: email.trim(), password: pw });
        if (error) throw error;
        setMsg('✅ تم إنشاء الحساب. إن طُلب تفعيل البريد فافتح رسالة التفعيل، ثم سجّل الدخول.');
        setMode('login');
      } else {
        const { error } = await _supaClient.auth.signInWithPassword({ email: email.trim(), password: pw });
        if (error) throw error;
        // onAuthStateChange في RootApp سيتكفّل بإظهار النظام
      }
    } catch(e2) {
      const m = (e2 && e2.message) || 'تعذّر تسجيل الدخول';
      setErr(m.includes('Invalid login') ? 'بريد أو كلمة مرور غير صحيحة' :
             m.includes('not confirmed') ? 'البريد غير مفعّل بعد — افتح رسالة التفعيل' : m);
    } finally { setBusy(false); }
  };

  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',
      background:'linear-gradient(170deg, var(--primary) 0%, #0a1f36 100%)',padding:20,fontFamily:'Cairo,sans-serif'}}>
      <div style={{width:'100%',maxWidth:380,background:'#fff',borderRadius:20,padding:'34px 28px',
        boxShadow:'0 20px 60px rgba(0,0,0,0.35)'}}>
        <div style={{textAlign:'center',marginBottom:22}}>
          <div style={{width:64,height:64,borderRadius:16,margin:'0 auto 14px',
            background:'linear-gradient(135deg,var(--accent),#f0b840)',display:'flex',alignItems:'center',
            justifyContent:'center',fontSize:34,boxShadow:'0 8px 20px rgba(232,160,32,0.4)'}}>🏥</div>
          <h1 style={{fontSize:20,fontWeight:900,color:'var(--primary)',margin:0}}>Motion Clinic</h1>
          <p style={{fontSize:12.5,color:'var(--text-light)',marginTop:4}}>
            {mode==='login' ? 'سجّل الدخول للوصول إلى نظام العيادة' : 'إنشاء حساب موظف جديد'}
          </p>
        </div>

        <form onSubmit={submit}>
          <label style={{fontSize:12,fontWeight:700,color:'var(--text-mid)'}}>البريد الإلكتروني</label>
          <input className="input" type="email" required value={email} dir="ltr"
            onChange={e=>setEmail(e.target.value)} placeholder="name@clinic.com"
            style={{width:'100%',margin:'6px 0 14px'}}/>
          <label style={{fontSize:12,fontWeight:700,color:'var(--text-mid)'}}>كلمة المرور</label>
          <input className="input" type="password" required value={pw} minLength={6} dir="ltr"
            onChange={e=>setPw(e.target.value)} placeholder="••••••••"
            style={{width:'100%',margin:'6px 0 16px'}}/>

          {err && <div style={{background:'var(--red-light)',color:'var(--red)',padding:'9px 12px',
            borderRadius:8,fontSize:12.5,fontWeight:700,marginBottom:12}}>{err}</div>}
          {msg && <div style={{background:'var(--green-light)',color:'var(--green)',padding:'9px 12px',
            borderRadius:8,fontSize:12.5,fontWeight:700,marginBottom:12}}>{msg}</div>}

          <button type="submit" className="btn btn-primary" disabled={busy}
            style={{width:'100%',justifyContent:'center',padding:'11px'}}>
            {busy ? '⏳ جارٍ...' : (mode==='login' ? '🔐 دخول' : '✨ إنشاء الحساب')}
          </button>
        </form>

        <div style={{textAlign:'center',marginTop:16,fontSize:12.5,color:'var(--text-light)'}}>
          {mode==='login' ? (
            <span>ليس لديك حساب؟{' '}
              <button onClick={()=>{setMode('signup');setErr('');setMsg('');}}
                style={{background:'none',border:'none',color:'var(--primary)',fontWeight:800,cursor:'pointer',fontFamily:'Cairo,sans-serif'}}>أنشئ حساباً</button>
            </span>
          ) : (
            <span>لديك حساب بالفعل؟{' '}
              <button onClick={()=>{setMode('login');setErr('');setMsg('');}}
                style={{background:'none',border:'none',color:'var(--primary)',fontWeight:800,cursor:'pointer',fontFamily:'Cairo,sans-serif'}}>تسجيل الدخول</button>
            </span>
          )}
        </div>
      </div>
    </div>
  );
}

// مكوّن الجذر: يتحكّم بحالة الجلسة ويعرض إمّا تسجيل الدخول أو النظام
function RootApp(){
  const [session,setSession] = useState(undefined); // undefined=قيد التحميل

  useEffect(()=>{
    _supaClient.auth.getSession().then(({data})=>{
      window.__MC_USER = data.session ? data.session.user : null;
      setSession(data.session || null);
    });
    const { data: sub } = _supaClient.auth.onAuthStateChange((_event, s)=>{
      window.__MC_USER = s ? s.user : null;
      setSession(s);
      if (s) loadApiKeyFromSupabase();   // أعد جلب مفتاح AI بعد الدخول (RLS)
    });
    return ()=>{ try{ sub.subscription.unsubscribe(); }catch(e){} };
  },[]);

  if (session === undefined) {
    return (
      <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',
        background:'linear-gradient(170deg,#1a3c5e,#0a1f36)',color:'#fff',fontFamily:'Cairo,sans-serif',
        flexDirection:'column',gap:14}}>
        <div style={{fontSize:40}}>🏥</div>
        <div style={{fontSize:14,opacity:0.8}}>جارٍ التحميل...</div>
      </div>
    );
  }
  if (!session) return <LoginScreen/>;
  return <App/>;
}

// ── API Key — يُجلب من Supabase تلقائياً ──────────
async function loadApiKeyFromSupabase() {
  try {
    const { data, error } = await _supaClient
      .from('clinic_settings')
      .select('value')
      .eq('key', 'anthropic_api_key')
      .single();
    if (data?.value) {
      window.ANTHROPIC_API_KEY = data.value;
      localStorage.setItem('mc_api_key', data.value);
      console.log('✅ API Key loaded from Supabase');
    } else {
      window.ANTHROPIC_API_KEY = localStorage.getItem('mc_api_key') || '';
      console.warn('⚠️ API Key not found in Supabase, using cached key');
    }
  } catch(e) {
    window.ANTHROPIC_API_KEY = localStorage.getItem('mc_api_key') || '';
    console.warn('⚠️ Could not reach Supabase, using cached API Key');
  }
}
loadApiKeyFromSupabase();
// ─────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(<RootApp/>);
</script>

    '<rect x="150" y="206" width="212" height="100" rx="22" fill="#e8a020"/>' +
    '<rect x="206" y="150" width="100" height="212" rx="22" fill="#e8a020"/>' +
    '<text x="256" y="470" font-family="Arial" font-size="60" fill="#ffffff" text-anchor="middle" font-weight="bold">MOTION</text>' +
    '</svg>'
  );
  const iconURL = 'data:image/svg+xml,' + iconSVG;

  const manifest = {
    name: 'Motion Clinic — عيادة الحركة',
    short_name: 'Motion Clinic',
    description: 'نظام إدارة عيادة العلاج الطبيعي والتأهيل',
    start_url: '.',
    scope: '.',
    display: 'standalone',
    orientation: 'portrait',
    background_color: '#0f2d4a',
    theme_color: '#0f2d4a',
    lang: 'ar', dir: 'rtl',
    icons: [
      { src: iconURL, sizes: '192x192', type: 'image/svg+xml', purpose: 'any maskable' },
      { src: iconURL, sizes: '512x512', type: 'image/svg+xml', purpose: 'any maskable' },
    ],
  };
  try {
    const mBlob = new Blob([JSON.stringify(manifest)], {type:'application/manifest+json'});
    const link = document.createElement('link');
    link.rel = 'manifest';
    link.href = URL.createObjectURL(mBlob);
    document.head.appendChild(link);
    // أيقونة على الشاشة الرئيسية (iOS)
    const aple = document.createElement('link');
    aple.rel = 'apple-touch-icon'; aple.href = iconURL;
    document.head.appendChild(aple);
  } catch(e){}
})();

// ══════════════════════════════════════════════════
// Service Worker — Network-First للتطبيق (يضمن وصول التحديثات دائماً)
// ══════════════════════════════════════════════════
if('serviceWorker' in navigator && location.protocol.startsWith('http')) {
  const SW = `
const CACHE = 'mc-v9';
self.addEventListener('install', e => { self.skipWaiting(); });
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys => Promise.all(
    keys.filter(k => k !== CACHE).map(k => caches.delete(k))   // امسح النسخ القديمة
  )).then(() => self.clients.claim()));
});
self.addEventListener('fetch', e => {
  if(e.request.method !== 'GET') return;
  const url = e.request.url;
  // لا نخزّن أبداً نداءات API (بيانات حيّة) — شبكة فقط
  if(url.includes('supabase.co') || url.includes('anthropic.com')) {
    e.respondWith(fetch(e.request).catch(() => new Response('{}', {headers:{'Content-Type':'application/json'}})));
    return;
  }
  // باقي الملفات: الشبكة أولاً (أحدث نسخة)، والكاش احتياطي عند انقطاع الإنترنت
  e.respondWith(
    fetch(e.request).then(resp => {
      if(resp && resp.status === 200) {
        const clone = resp.clone();
        caches.open(CACHE).then(c => c.put(e.request, clone));
      }
      return resp;
    }).catch(() => caches.match(e.request))
  );
});`;
  const blob = new Blob([SW], {type:'text/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob))
    .then(() => console.log('✅ PWA جاهز — يعمل أوفلاين وقابل للتثبيت'))
    .catch(() => {});
}
</script>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="theme-color" content="#0f2d4a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Motion Clinic"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Motion Clinic Enterprise v7 — Realtime</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
/* ══════════════════════════════════════════════════
   MOTION CLINIC v6 — ENTERPRISE DESIGN SYSTEM
   Theme: Deep Medical Navy + Olive Brand
══════════════════════════════════════════════════ */
:root {
  --sidebar-w: 260px;
  --primary: #1a3c5e;
  --primary-mid: #2a5f8f;
  --primary-light: #4a8bbf;
  --primary-pale: #c8dff0;
  --primary-bg: #eaf3fb;
  --accent: #e8a020;
  --accent-light: #fdf3dc;
  --accent-dark: #c8880a;
  --green: #059669;
  --green-light: #d1fae5;
  --red: #dc2626;
  --red-light: #fee2e2;
  --blue: #2563eb;
  --blue-light: #dbeafe;
  --purple: #7c3aed;
  --purple-light: #ede9fe;
  --orange: #ea580c;
  --orange-light: #ffedd5;
  --teal: #0891b2;
  --teal-light: #cffafe;
  --text-dark: #0f172a;
  --text-mid: #334155;
  --text-light: #64748b;
  --text-xlight: #94a3b8;
  --border: #e2e8f0;
  --border-dark: #cbd5e1;
  --surface: #f8fafc;
  --surface-2: #f1f5f9;
  --bg: #f0f4f8;
  --card: #ffffff;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --shadow: 0 1px 6px rgba(15,23,42,0.08), 0 4px 16px rgba(15,23,42,0.06);
  --shadow-lg: 0 8px 40px rgba(15,23,42,0.15);
  --shadow-xl: 0 20px 60px rgba(15,23,42,0.20);
}

/* Themes */
[data-theme="olive"]   { --primary:#4a5e1a; --primary-mid:#6a8a2a; --primary-light:#8aaa4a; --primary-pale:#d8e8b8; --primary-bg:#f3fae0; }
[data-theme="green"]   { --primary:#065f46; --primary-mid:#047857; --primary-light:#10b981; --primary-pale:#a7f3d0; --primary-bg:#ecfdf5; }
[data-theme="blue"]    { --primary:#1e40af; --primary-mid:#2563eb; --primary-light:#60a5fa; --primary-pale:#bfdbfe; --primary-bg:#eff6ff; }
[data-theme="purple"]  { --primary:#5b21b6; --primary-mid:#7c3aed; --primary-light:#a78bfa; --primary-pale:#ddd6fe; --primary-bg:#f5f3ff; }
[data-theme="teal"]    { --primary:#0d4a4a; --primary-mid:#0e7490; --primary-light:#06b6d4; --primary-pale:#a5f3fc; --primary-bg:#ecfeff; }
[data-theme="charcoal"]{ --primary:#1f2937; --primary-mid:#374151; --primary-light:#6b7280; --primary-pale:#d1d5db; --primary-bg:#f9fafb; }

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:15px;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text-dark);direction:rtl;min-height:100vh;}

/* ── Layout ── */
.app-layout{display:flex;min-height:100vh;}
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:linear-gradient(170deg, var(--primary) 0%, #0a1f36 100%);
  display:flex;flex-direction:column;
  position:fixed;inset-block:0;right:0;z-index:100;
  overflow-y:auto;transition:transform 0.3s cubic-bezier(.4,0,.2,1);
  box-shadow:var(--shadow-xl);
}
.main-area{margin-right:var(--sidebar-w);flex:1;min-height:100vh;display:flex;flex-direction:column;}

/* ── Sidebar ── */
.sidebar-header{
  padding:20px 18px 16px;
  border-bottom:1px solid rgba(255,255,255,0.08);
  display:flex;align-items:center;gap:12px;
}
.logo-box{
  width:44px;height:44px;border-radius:12px;
  background:linear-gradient(135deg,var(--accent),#f0b840);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;flex-shrink:0;overflow:hidden;
  box-shadow:0 4px 12px rgba(232,160,32,0.4);
}
.logo-box img{width:100%;height:100%;object-fit:cover;border-radius:12px;}
.logo-text strong{color:#fff;font-size:15px;font-weight:900;display:block;}
.logo-text span{color:rgba(255,255,255,0.45);font-size:10px;letter-spacing:0.5px;}

.sidebar-nav{flex:1;padding:10px 8px;overflow-y:auto;}
.nav-section{margin-bottom:6px;}
.nav-section-title{
  padding:8px 12px 4px;
  font-size:9.5px;font-weight:700;letter-spacing:1.5px;
  color:rgba(255,255,255,0.3);text-transform:uppercase;
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  width:100%;padding:9px 14px;border:none;
  background:transparent;color:rgba(255,255,255,0.65);
  border-radius:10px;cursor:pointer;font-family:'Cairo',sans-serif;
  font-size:13.5px;font-weight:600;text-align:right;
  transition:all 0.18s;
}
.nav-item:hover{background:rgba(255,255,255,0.08);color:#fff;}
.nav-item.active{
  background:linear-gradient(135deg,var(--accent),var(--accent-dark));
  color:#fff;box-shadow:0 4px 14px rgba(232,160,32,0.35);
}
.nav-icon{font-size:17px;flex-shrink:0;}
.nav-badge{
  margin-right:auto;background:var(--red);color:#fff;
  font-size:10px;font-weight:900;padding:2px 6px;border-radius:10px;
}
.sidebar-footer{
  padding:14px 18px;border-top:1px solid rgba(255,255,255,0.07);
  font-size:11px;color:rgba(255,255,255,0.3);text-align:center;
}

/* ── Topbar ── */
.topbar{
  height:64px;background:var(--card);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:16px;padding:0 24px;
  position:sticky;top:0;z-index:50;
  box-shadow:0 1px 8px rgba(15,23,42,0.06);
}
.mobile-toggle{display:none;background:none;border:none;font-size:22px;cursor:pointer;color:var(--primary);padding:6px;}
.breadcrumb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-light);flex:1;}
.breadcrumb strong{color:var(--text-dark);font-weight:800;font-size:15px;}
.breadcrumb-sep{color:var(--border-dark);}
.topbar-right{display:flex;align-items:center;gap:12px;}
.status-pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 12px;background:var(--green-light);color:var(--green);
  border-radius:999px;font-size:12px;font-weight:700;
}
.status-dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

.content-area{flex:1;padding:0;}

/* ── Cards ── */
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);}
.card-header{
  padding:16px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.card-header h3{font-size:15px;font-weight:800;color:var(--text-dark);}
.card-body{padding:20px;}

/* ── Page ── */
.page-content{padding:24px;}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:16px;flex-wrap:wrap;}
.page-title{font-size:22px;font-weight:900;color:var(--text-dark);margin-bottom:4px;}
.page-subtitle{font-size:13px;color:var(--text-light);}

/* ── Stats ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.stat-card{
  background:var(--card);border-radius:var(--radius);border:1px solid var(--border);
  padding:18px 20px;display:flex;align-items:center;gap:14px;
  box-shadow:var(--shadow);transition:transform 0.18s,box-shadow 0.18s;
}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);}
.stat-icon{
  width:48px;height:48px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;
}
.stat-content h3{font-size:22px;font-weight:900;color:var(--text-dark);}
.stat-content p{font-size:12px;color:var(--text-light);margin-top:2px;font-weight:600;}
.stat-lbl{font-size:12px;color:var(--text-light);margin-top:2px;font-weight:600;}

/* ── Buttons ── */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:8px;border:none;cursor:pointer;
  font-family:'Cairo',sans-serif;font-size:13.5px;font-weight:700;
  transition:all 0.18s;white-space:nowrap;
}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(26,60,94,0.2);}
.btn-primary:hover{background:var(--primary-mid);transform:translateY(-1px);}
.btn-accent{background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;box-shadow:0 3px 10px rgba(232,160,32,0.3);}
.btn-accent:hover{opacity:0.9;transform:translateY(-1px);}
.btn-secondary{background:var(--surface-2);color:var(--text-mid);border:1px solid var(--border);}
.btn-secondary:hover{background:var(--border);color:var(--text-dark);}
.btn-success{background:var(--green);color:#fff;}
.btn-danger{background:var(--red);color:#fff;}
.btn-danger:hover{background:#b91c1c;}
.btn-outline{background:transparent;color:var(--primary);border:2px solid var(--primary);}
.btn-outline:hover{background:var(--primary-bg);}
.btn-ghost{background:transparent;color:var(--text-mid);}
.btn-ghost:hover{background:var(--surface-2);}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:6px;}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:5px;}

/* ── Forms ── */
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:12px;font-weight:700;color:var(--text-mid);margin-bottom:5px;}
.input{
  width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;
  font-family:'Cairo',sans-serif;font-size:13.5px;color:var(--text-dark);
  background:var(--card);transition:border-color 0.18s,box-shadow 0.18s;outline:none;
}
.input:focus{border-color:var(--primary-light);box-shadow:0 0 0 3px var(--primary-pale);}
textarea.input{resize:vertical;min-height:80px;}
select.input{cursor:pointer;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.form-row-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}

/* ── Tables ── */
.data-table{width:100%;border-collapse:collapse;font-size:13px;}
.data-table th{
  padding:10px 14px;background:var(--surface);
  font-weight:800;font-size:11.5px;color:var(--text-mid);
  border-bottom:2px solid var(--border);text-align:right;white-space:nowrap;
}
.data-table td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
.data-table tr:hover td{background:var(--surface);}
.data-table tr:last-child td{border-bottom:none;}
.row-actions{display:flex;gap:6px;align-items:center;}
.row-action-btn{
  padding:4px 8px;border:none;border-radius:6px;cursor:pointer;
  font-size:13px;background:var(--surface-2);color:var(--text-mid);transition:all 0.15s;
}
.row-action-btn:hover{background:var(--primary-pale);color:var(--primary);}
.row-action-btn.danger:hover{background:var(--red-light);color:var(--red);}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;white-space:nowrap;}
.badge-green{background:var(--green-light);color:var(--green);}
.badge-red{background:var(--red-light);color:var(--red);}
.badge-blue{background:var(--blue-light);color:var(--blue);}
.badge-yellow{background:#fef3c7;color:#b45309;}
.badge-purple{background:var(--purple-light);color:var(--purple);}
.badge-teal{background:var(--teal-light);color:var(--teal);}
.badge-orange{background:var(--orange-light);color:var(--orange);}
.badge-gray{background:var(--surface-2);color:var(--text-light);}

/* ── Modals ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(15,23,42,0.6);
  display:flex;align-items:center;justify-content:center;
  z-index:500;padding:20px;backdrop-filter:blur(4px);
  animation:fadeIn 0.2s;
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal{
  background:var(--card);border-radius:var(--radius-lg);width:100%;max-width:600px;
  max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-xl);
  animation:slideUp 0.25s cubic-bezier(.4,0,.2,1);
}
@keyframes slideUp{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-xl{max-width:900px;}
.modal-lg{max-width:750px;}
.modal-header{
  padding:18px 22px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:var(--card);z-index:10;
}
.modal-header h2{font-size:18px;font-weight:900;color:var(--text-dark);}
.modal-close{
  background:var(--surface-2);border:none;width:32px;height:32px;
  border-radius:8px;cursor:pointer;font-size:16px;color:var(--text-mid);
  display:flex;align-items:center;justify-content:center;transition:all 0.15s;
}
.modal-close:hover{background:var(--red-light);color:var(--red);}
.modal-body{padding:22px;}
.modal-footer{
  padding:16px 22px;border-top:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
  position:sticky;bottom:0;background:var(--card);
}

/* ── Steps ── */
.modal-steps{
  display:flex;gap:0;background:var(--surface);
  border-bottom:1px solid var(--border);overflow-x:auto;
}
.step-item{
  display:flex;align-items:center;gap:8px;
  padding:12px 18px;cursor:pointer;font-size:13px;font-weight:700;
  color:var(--text-light);border-bottom:3px solid transparent;
  white-space:nowrap;transition:all 0.18s;
}
.step-item.active{color:var(--primary);border-bottom-color:var(--primary);}
.step-item.done{color:var(--green);}
.step-num{
  width:22px;height:22px;border-radius:50%;border:2px solid currentColor;
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;
}
.step-item.done .step-num{background:var(--green);border-color:var(--green);color:#fff;}

/* ── Tags ── */
.tag-list{display:flex;flex-wrap:wrap;gap:6px;}
.tag-pick{
  padding:5px 12px;border-radius:8px;border:1.5px solid var(--border);
  background:var(--surface);color:var(--text-mid);
  cursor:pointer;font-family:'Cairo',sans-serif;font-size:12.5px;font-weight:700;
  transition:all 0.15s;
}
.tag-pick:hover{border-color:var(--primary-light);color:var(--primary);}
.tag-pick.active{background:var(--primary);border-color:var(--primary);color:#fff;}

/* ── Tabs ── */
.tabs-nav{display:flex;gap:4px;margin-bottom:20px;background:var(--card);border-radius:var(--radius);padding:6px;border:1px solid var(--border);flex-wrap:wrap;}
.tab-btn{
  flex:1;min-width:80px;padding:8px 14px;border:none;border-radius:8px;
  background:transparent;color:var(--text-light);cursor:pointer;
  font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;
  transition:all 0.18s;white-space:nowrap;
}
.tab-btn.active{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(26,60,94,0.2);}

/* ── Grids ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}

/* ── Profile ── */
.profile-header{
  background:linear-gradient(135deg,var(--primary) 0%,var(--primary-mid) 100%);
  border-radius:var(--radius-lg);padding:28px 32px;
  display:flex;align-items:center;gap:20px;margin-bottom:20px;
  color:#fff;box-shadow:var(--shadow-lg);
}
.profile-avatar{
  width:72px;height:72px;border-radius:20px;
  background:linear-gradient(135deg,var(--accent),#f0b840);
  display:flex;align-items:center;justify-content:center;
  font-size:32px;font-weight:900;color:#fff;flex-shrink:0;
  box-shadow:0 4px 16px rgba(232,160,32,0.4);
}
.profile-info h1{font-size:22px;font-weight:900;color:#fff;}
.pid{font-size:12px;color:rgba(255,255,255,0.6);margin:2px 0 8px;font-weight:700;}
.profile-meta{display:flex;flex-wrap:wrap;gap:16px;}
.profile-meta span{display:flex;align-items:center;gap:5px;font-size:13px;color:rgba(255,255,255,0.85);}
.profile-meta strong{color:#fff;}

/* ── Session log specific ── */
.session-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px 20px;margin-bottom:12px;transition:box-shadow 0.18s;
  border-right:4px solid var(--primary);
}
.session-card:hover{box-shadow:var(--shadow-lg);}
.session-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.session-date{font-weight:800;font-size:15px;color:var(--primary);}
.session-tech{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.session-tech span{
  padding:3px 10px;background:var(--primary-pale);color:var(--primary);
  border-radius:6px;font-size:11.5px;font-weight:700;
}
.vas-row{display:flex;align-items:center;gap:8px;margin-top:8px;}
.vas-num{font-size:13px;font-weight:900;}

/* ── Empty State ── */
.empty-state{
  text-align:center;padding:60px 20px;color:var(--text-light);
}
.empty-state .icon{font-size:48px;margin-bottom:12px;}
.empty-state h3{font-size:17px;font-weight:800;color:var(--text-mid);margin-bottom:6px;}
.empty-state p{font-size:13px;}

/* ── Progress bar ── */
.progress-bar{background:var(--surface-2);border-radius:999px;height:8px;overflow:hidden;}
.progress-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--primary-light),var(--primary));transition:width 0.6s;}

/* ── Alert ── */
.alert{padding:12px 16px;border-radius:10px;display:flex;align-items:flex-start;gap:10px;font-size:13px;}
.alert-warning{background:#fffbeb;border:1px solid #fcd34d;color:#92400e;}
.alert-danger{background:var(--red-light);border:1px solid #fca5a5;color:#991b1b;}
.alert-success{background:var(--green-light);border:1px solid #6ee7b7;color:#065f46;}
.alert-info{background:var(--blue-light);border:1px solid #93c5fd;color:#1e40af;}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border-dark);border-radius:999px;}

/* ── Finance summary ── */
.fin-summary{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
.fin-box{flex:1;min-width:130px;padding:14px 16px;border-radius:10px;border:1.5px solid;}
.fin-box.paid{border-color:var(--green-light);background:var(--green-light);}
.fin-box.pending{border-color:#fde68a;background:#fffbeb;}
.fin-box.total{border-color:var(--blue-light);background:var(--blue-light);}
.fin-box strong{display:block;font-size:18px;font-weight:900;margin-bottom:2px;}
.fin-box span{font-size:11px;font-weight:700;color:var(--text-mid);}

/* ── Inbody delta ── */
.delta-pos{color:var(--green);font-weight:800;}
.delta-neg{color:var(--red);font-weight:800;}
.delta-zero{color:var(--text-light);font-weight:700;}

/* ── Mobile ── */
.mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99;}
@media(max-width:980px){
  .sidebar{transform:translateX(100%);transition:transform 0.3s;}
  .sidebar.open{transform:translateX(0);}
  .main-area{margin-right:0;}
  .mobile-toggle{display:flex;}
  .mobile-overlay{display:block;}
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .form-row,.form-row-3,.form-row-4,.grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}
  .page-content{padding:14px;}
}
@media(max-width:600px){.stats-grid{grid-template-columns:1fr;}}

/* ── PDF print mode ── */

const sb = {
  // جلب جميع السجلات من جدول (بما فيها شواهد الحذف deleted=true ليتمكن السحب من إزالتها محلياً)
  async select(table) {
    const { data, error } = await _supaClient.from(table).select('*').order('updated_at', { ascending: false });
    if (error) { console.warn(`[sb.select] ${table}:`, error.message); return []; }
    return (data || []).map(row => {
      if (row.data && typeof row.data === 'object') {
        return { ...row.data, id: row.id, updated_at: row.updated_at, deleted: row.deleted || row.data.deleted || false };
      }
      return row;
    });
  },

  // إدراج أو تحديث سجل (التوقيت updated_at يُكتب من قاعدة البيانات عبر trigger لتوحيد الساعة بين الأجهزة)
  async upsert(table, data) {
    const rows = Array.isArray(data) ? data : [data];
    const { error } = await _supaClient.from(table).upsert(rows, { onConflict: 'id' });
    if (error) throw new Error(error.message);
    return true;
  },

  // حذف ناعم (Tombstone) — لا يُحذف السجل فعلياً بل يُعلَّم كمحذوف.
  // هذا يمنع عودة السجلات المحذوفة عند المزامنة من جهاز آخر كان مغلقاً (سبب رئيسي للتداخل).
  async delete(table, id) {
    const { error } = await _supaClient.from(table)
      .update({ deleted: true, deleted_at: new Date().toISOString(), updated_at: new Date().toISOString() })
      .eq('id', id);
    if (error) throw new Error(error.message);
    return true;
  },

  // حفظ إعداد في جدول KV
  async upsertKV(key, value) {
    const { error } = await _supaClient.from('mc_kv').upsert(
      [{ key, value: JSON.stringify(value), updated_at: new Date().toISOString() }],
      { onConflict: 'key' }
    );
    if (error) throw new Error(error.message);
  },

  // جلب إعداد من جدول KV
  async selectKV(key) {
    const { data, error } = await _supaClient.from('mc_kv').select('value').eq('key', key).maybeSingle();
    if (error || !data) return null;
    try { return JSON.parse(data.value); } catch { return null; }
  },

  // ══════════════════════════════════════════════════
  // ── تخزين الملفات (صور الأشعة / تقارير InBody PDF / صور المريض / مستندات) ──
  // يرفع إلى Supabase Storage (سحابة، متاح لكل الأجهزة) + كاش محلي IndexedDB للعمل دون إنترنت.
  // ══════════════════════════════════════════════════
  BUCKET: 'patient-files',
  async uploadFile(path, file) {
    const { error } = await _supaClient.storage.from(this.BUCKET).upload(path, file, { upsert: true, contentType: file.type || 'application/octet-stream' });
    if (error) throw new Error(error.message);
    const { data } = _supaClient.storage.from(this.BUCKET).getPublicUrl(path);
    return data?.publicUrl || '';
  },
  fileUrl(path) {
    const { data } = _supaClient.storage.from(this.BUCKET).getPublicUrl(path);
    return data?.publicUrl || '';
  },
  async removeFile(path) {
    const { error } = await _supaClient.storage.from(this.BUCKET).remove([path]);
    if (error) throw new Error(error.message);
    return true;
  },

  // ── Realtime Subscriptions ──
  // يستمع لأي تغيير على جدول معين ويستدعي callback فوراً
  subscribeTable(table, callback) {
    return _supaClient
      .channel(`realtime:${table}:${Math.random().toString(36).slice(2)}`)
      .on('postgres_changes', { event: '*', schema: 'public', table }, payload => {
        callback(payload);
      })
      .subscribe(status => {
        if (status === 'SUBSCRIBED') console.log(`[Realtime] ✅ متصل بـ ${table}`);
        if (status === 'CHANNEL_ERROR') console.warn(`[Realtime] ❌ خطأ في ${table}`);
      });
  },

  // إلغاء الاشتراك
  unsubscribe(channel) {
    if (channel) _supaClient.removeChannel(channel);
  },
};

async function callAI(prompt, opts={}){
  const apiKey = window.ANTHROPIC_API_KEY || localStorage.getItem('mc_api_key') || '';
  if(!apiKey){ throw new Error('NO_KEY'); }
  const body = {
    model: opts.model || localStorage.getItem('mc_ai_model') || 'claude-sonnet-4-5',
    max_tokens: opts.max_tokens || 2500,
    messages: opts.messages || [{role:'user', content: prompt}],
  };
  if(opts.system) body.system = opts.system;
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key': apiKey,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body: JSON.stringify(body)
  });
  const data = await resp.json();
  if(data.error) throw new Error(data.error.message || 'AI error');
  return (data.content||[]).map(b=>b.text||'').join('') || '';
}

// ── PDF Export ──
async function exportToPDF(el, filename='report.pdf') {
  try {
    const canvas = await html2canvas(el, {scale:2, useCORS:true, backgroundColor:'#ffffff'});
    const {jsPDF} = window.jspdf;
    const pdf = new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const w = pdf.internal.pageSize.getWidth();
    const h = (canvas.height * w) / canvas.width;
    let pos = 0;
    while(pos < h) {
      if(pos > 0) pdf.addPage();
      pdf.addImage(canvas.toDataURL('image/jpeg',0.92),'JPEG',0,-pos,w,h);
      pos += pdf.internal.pageSize.getHeight();
    }
    pdf.save(filename);
  } catch(e) { alert('خطأ في التصدير: ' + e.message); }
}

// IMPORT — محلّل ملف CSV الشامل (MotionClinic_FULL) للاستعادة الآمنة
// ══════════════════════════════════════════════════
const CSV_SECTION_KEY = {
  PATIENTS:'patients', APPOINTMENTS:'appointments', FINANCE:'finance',
  SESSIONS:'sessions', INBODY:'inbody', INVENTORY:'inventory',
  RECORDS:'records', EXPENSES:'expenses', NOTES:'notes', STAFF:'staff',
  HEP:'hepLib', HEPLIB:'hepLib',
};
// الحقول الرقمية — تُحوّل من نص إلى رقم حتى لا تنكسر الحسابات المالية والقياسات
const CSV_NUMERIC = new Set(['age','total','discount','paid','remaining','weight','smi',
  'bodyFat','bmi','water','bmr','visceralFat','score','quantity','minLevel','cost',
  'duration','vasStart','vasEnd','amount','height']);
function csvCoerce(key, val){
  if(CSV_NUMERIC.has(key) && /^-?\d+(\.\d+)?$/.test(val)) return Number(val);
  return val;
}
// محلّل CSV حقيقي يحترم الفواصل والأسطر داخل علامات التنصيص
function parseFullCSV(text){
  text = String(text).replace(/^\ufeff/, '');
  const rows = []; let row=[], field='', q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(q){
      if(c==='"'){ if(text[i+1]==='"'){ field+='"'; i++; } else q=false; }
      else field+=c;
    } else {
      if(c==='"') q=true;
      else if(c===','){ row.push(field); field=''; }
      else if(c==='\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else if(c==='\r'){ /* تجاهل */ }
      else field+=c;
    }
  }
  if(field!=='' || row.length){ row.push(field); rows.push(row); }
  const out={}; let sec=null, headers=null;
  for(const r of rows){
    const nonEmpty = r.filter(x=>x!=='' && x!=null);
    if(nonEmpty.length===0){ sec=null; headers=null; continue; }
    if(nonEmpty.length===1){
      const name = String(r[0]).trim().toUpperCase();
      if(CSV_SECTION_KEY[name]){ sec=CSV_SECTION_KEY[name]; headers=null; out[sec]=out[sec]||[]; continue; }
    }
    if(sec && !headers){ headers=r.map(h=>String(h).trim()); continue; }
    if(sec && headers){
      const obj={};
      headers.forEach((h,idx)=>{ if(h) obj[h]=csvCoerce(h, (r[idx]!=null?r[idx]:'')); });
      if(obj.id!=null && obj.id!=='') out[sec].push(obj);
    }
  }
  return out;
}

// ══════════════════════════════════════════════════
// IndexedDB — تخزين محلي عالي السعة (بالجيجابايت) وغير متزامن
// يحل محل حدّ 5 ميجابايت في localStorage ويمنع فقدان البيانات عند الامتلاء.
// localStorage يبقى كذاكرة إقلاع فورية (cache)، وIndexedDB هو المخزن الدائم.
// ══════════════════════════════════════════════════
const IDB_NAME='motionclinic_db', IDB_STORE='kv', IDB_FILES='files', IDB_VER=1;
let _idbPromise=null;
function idbOpen(){
  if(_idbPromise) return _idbPromise;
  _idbPromise=new Promise((res,rej)=>{
    try{
      if(!('indexedDB' in window)){ rej(new Error('no-idb')); return; }
      const r=indexedDB.open(IDB_NAME,IDB_VER);
      r.onupgradeneeded=()=>{ const db=r.result;
        if(!db.objectStoreNames.contains(IDB_STORE)) db.createObjectStore(IDB_STORE);
        if(!db.objectStoreNames.contains(IDB_FILES)) db.createObjectStore(IDB_FILES);
      };
      r.onsuccess=()=>res(r.result);
      r.onerror=()=>rej(r.error);
    }catch(e){ rej(e); }
  });
  return _idbPromise;
}
async function idbSet(key,val,store=IDB_STORE){
  try{ const db=await idbOpen(); return await new Promise((res,rej)=>{ const tx=db.transaction(store,'readwrite'); tx.objectStore(store).put(val,key); tx.oncomplete=()=>res(true); tx.onerror=()=>rej(tx.error); }); }catch(e){ return false; }
}
async function idbGet(key,store=IDB_STORE){
  try{ const db=await idbOpen(); return await new Promise((res,rej)=>{ const tx=db.transaction(store,'readonly'); const rq=tx.objectStore(store).get(key); rq.onsuccess=()=>res(rq.result); rq.onerror=()=>rej(rq.error); }); }catch(e){ return undefined; }
}
async function idbDel(key,store=IDB_STORE){
  try{ const db=await idbOpen(); return await new Promise((res)=>{ const tx=db.transaction(store,'readwrite'); tx.objectStore(store).delete(key); tx.oncomplete=()=>res(true); tx.onerror=()=>res(false); }); }catch(e){ return false; }
}
async function idbKeys(store=IDB_FILES){
  try{ const db=await idbOpen(); return await new Promise((res)=>{ const tx=db.transaction(store,'readonly'); const rq=tx.objectStore(store).getAllKeys(); rq.onsuccess=()=>res(rq.result||[]); rq.onerror=()=>res([]); }); }catch(e){ return []; }
}
// حفظ موحّد آمن: IndexedDB (دائم) + localStorage (ذاكرة إقلاع) — لا يتعطل عند امتلاء localStorage
function persistKV(key,value){
  idbSet(key, value);
  try{ localStorage.setItem(key, JSON.stringify(value)); }
  catch(e){ /* localStorage ممتلئ — IndexedDB يحتفظ بالبيانات */ }
}

// ══════════════════════════════════════════════════
// CONTEXT PROVIDER — Offline First + Supabase Sync
// ══════════════════════════════════════════════════
function ClinicProvider({ children }) {
  const ls = (k, def) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; } };
  // ⚠️ سجلات المرضى تبدأ فارغة دائماً — لا بيانات تجريبية تُزرع (تمنع تلوث البيانات والتداخل بين الأجهزة)
  // الإعدادات والتصنيفات فقط تبقى لها قيم افتراضية لأنها إعدادات وليست سجلات.
  const [settings,    setSettings]   = useState(() => ls('mc6_settings',    DEF_SETTINGS));
  const [categories,  setCategories] = useState(() => ls('mc6_categories',  DEF_CATEGORIES));
  const [patients,    setPatients]   = useState(() => ls('mc6_patients',    []));
  const [records,     setRecords]    = useState(() => ls('mc6_records',     []));
  const [sessions,    setSessions]   = useState(() => ls('mc6_sessions',    []));
  const [appointments,setApts]       = useState(() => ls('mc6_appointments',[]));
  const [finance,     setFinance]    = useState(() => ls('mc6_finance',     []));
  const [expenses,    setExpenses]   = useState(() => ls('mc6_expenses',    []));
  const [inbody,      setInbody]     = useState(() => ls('mc6_inbody',      []));
  const [notes,       setNotes]      = useState(() => ls('mc6_notes',       []));
  const [staff,       setStaff]      = useState(() => ls('mc6_staff',       []));
  const [inventory,   setInventory]  = useState(() => ls('mc6_inventory',   []));
  const [hepLib,      setHepLib]     = useState(() => ls('mc6_hep',         []));
  const [audit,       setAudit]      = useState(() => ls('mc6_audit',       DEF_AUDIT));
  const [toast,       setToast]      = useState(null);
  const [syncStatus,  setSyncStatus] = useState('idle'); // idle | syncing | online | offline | error
  const [lastSync,    setLastSync]   = useState(() => ls('mc6_last_sync', null));
  const [pendingCount,setPendingCount] = useState(() => getPending().length);
  const isOnline = useRef(navigator.onLine);

  // ── Persist locally (always — offline safety net) — IndexedDB دائم + localStorage إقلاع ──
  useEffect(()=>{persistKV('mc6_settings',    settings);},   [settings]);
  useEffect(()=>{persistKV('mc6_categories',  categories);}, [categories]);
  useEffect(()=>{persistKV('mc6_patients',    patients);},   [patients]);
  useEffect(()=>{persistKV('mc6_records',     records);},    [records]);
  useEffect(()=>{persistKV('mc6_sessions',    sessions);},   [sessions]);
  useEffect(()=>{persistKV('mc6_appointments',appointments);}, [appointments]);
  useEffect(()=>{persistKV('mc6_finance',     finance);},    [finance]);
  useEffect(()=>{persistKV('mc6_expenses',    expenses);},   [expenses]);
  useEffect(()=>{persistKV('mc6_inbody',      inbody);},     [inbody]);
  useEffect(()=>{persistKV('mc6_notes',       notes);},      [notes]);
  useEffect(()=>{persistKV('mc6_staff',       staff);},      [staff]);
  useEffect(()=>{persistKV('mc6_inventory',   inventory);},  [inventory]);
  useEffect(()=>{persistKV('mc6_hep',         hepLib);},     [hepLib]);
  useEffect(()=>{persistKV('mc6_audit',       audit);},      [audit]);
  useEffect(()=>{persistKV('mc6_last_sync',   lastSync);},   [lastSync]);

  // ── استرجاع من IndexedDB عند الإقلاع (إن فقد localStorage بيانات بسبب امتلاء السعة) ──
  const _hydratedRef = useRef(false);
  useEffect(()=>{
    if(_hydratedRef.current) return; _hydratedRef.current=true;
    (async()=>{
      const map={ mc6_patients:setPatients, mc6_records:setRecords, mc6_sessions:setSessions, mc6_appointments:setApts, mc6_finance:setFinance, mc6_expenses:setExpenses, mc6_inbody:setInbody, mc6_notes:setNotes, mc6_staff:setStaff, mc6_inventory:setInventory, mc6_hep:setHepLib };
      const cur={ mc6_patients:patients, mc6_records:records, mc6_sessions:sessions, mc6_appointments:appointments, mc6_finance:finance, mc6_expenses:expenses, mc6_inbody:inbody, mc6_notes:notes, mc6_staff:staff, mc6_inventory:inventory, mc6_hep:hepLib };
      for(const k of Object.keys(map)){
        try{ const v=await idbGet(k); if(Array.isArray(v) && v.length > (cur[k]?.length||0)) map[k](v); }catch(e){}
      }
    })();
  }, []);

  // ── مزامنة عدّادات المعرّفات التسلسلية مع أعلى رقم موجود (سحابي + محلي) ──
  // يمنع توليد معرّف مكرَّر مثل P-005 على جهازين مختلفين (سبب رئيسي لطمس البيانات والتداخل).
  const reconcileSeq = (arr, prefix) => {
    if (!Array.isArray(arr) || !arr.length) return;
    const key = SEQ_KEYS[prefix] || ('mc6_seq_' + prefix.toLowerCase());
    const re = new RegExp('^' + prefix + '-(\\d+)$');
    let max = parseInt(localStorage.getItem(key) || '0', 10);
    for (const it of arr) {
      const m = it && typeof it.id === 'string' && it.id.match(re);
      if (m) { const n = parseInt(m[1], 10); if (n > max) max = n; }
    }
    localStorage.setItem(key, String(max));
  };
  useEffect(()=>{ reconcileSeq(patients,'P'); },        [patients]);
  useEffect(()=>{ reconcileSeq(records,'REC'); },       [records]);
  useEffect(()=>{ reconcileSeq(sessions,'SS'); },       [sessions]);
  useEffect(()=>{ reconcileSeq(appointments,'APT'); },  [appointments]);
  useEffect(()=>{ reconcileSeq(finance,'INV'); },       [finance]);
  useEffect(()=>{ reconcileSeq(expenses,'EXP'); },      [expenses]);
  useEffect(()=>{ reconcileSeq(inbody,'IB'); },         [inbody]);
  useEffect(()=>{ reconcileSeq(notes,'NOTE'); },        [notes]);
  useEffect(()=>{ reconcileSeq(staff,'STAFF'); },       [staff]);
  useEffect(()=>{ reconcileSeq(inventory,'INVSTK'); },  [inventory]);

  // حارس يمنع تشغيل عمليتي سحب متزامنتين (يمنع تعارض السحب مع التعديلات المحلية الجارية)
  const pullingRef = useRef(false);

  // ── Network status listeners ──
  useEffect(() => {
    const goOnline  = () => { isOnline.current = true;  setSyncStatus('online');  flushPending(); };
    const goOffline = () => { isOnline.current = false; setSyncStatus('offline'); };
    window.addEventListener('online',  goOnline);
    window.addEventListener('offline', goOffline);
    setSyncStatus(navigator.onLine ? 'online' : 'offline');
    return () => { window.removeEventListener('online', goOnline); window.removeEventListener('offline', goOffline); };
  }, []);

  // ── Push a single record to Supabase ──
  const pushToSupabase = useCallback(async (table, op, data) => {
    if (!isOnline.current) {
      queueOp({ table, op, data });
      setPendingCount(getPending().length);
      return false;
    }
    try {
      if (op === 'delete') await sb.delete(table, data.id);
      // لا نعيد ختم updated_at هنا — نحافظ على وقت التعديل الأصلي ليبقى LWW صحيحاً
      else await sb.upsert(table, data);
      return true;
    } catch(e) {
      queueOp({ table, op, data });
      setPendingCount(getPending().length);
      return false;
    }
  }, []);

  // ── Flush pending offline operations ──
  const flushPending = useCallback(async () => {
    const ops = getPending();
    if (!ops.length) return;
    setSyncStatus('syncing');
    const failed = [];
    for (const op of ops) {
      try {
        if (op.op === 'delete') await sb.delete(op.table, op.data.id);
        // نحافظ على updated_at الأصلي للعملية المؤجَّلة (لا نطمس تعديلاً أحدث على جهاز آخر)
        else await sb.upsert(op.table, op.data);
      } catch {
        failed.push(op);
      }
    }
    savePending(failed);
    setPendingCount(failed.length);
    setSyncStatus(failed.length === 0 ? 'online' : 'error');
    if (failed.length === 0) {
      const now = new Date().toISOString();
      setLastSync(now);
    }
  }, []);

  // ── Pull ALL data from Supabase (full sync) ──
  const pullFromSupabase = useCallback(async () => {
    if (!isOnline.current) { showToast('لا يوجد إنترنت — البيانات محلية', 'info'); return; }
    if (pullingRef.current) return;      // سحب جارٍ بالفعل — تجنّب التعارض
    pullingRef.current = true;
    setSyncStatus('syncing');
    try {
      const setters = {
        mc_patients: setPatients, mc_records: setRecords, mc_sessions: setSessions,
        mc_appointments: setApts, mc_finance: setFinance, mc_expenses: setExpenses,
        mc_inbody: setInbody, mc_notes: setNotes, mc_staff: setStaff,
        mc_inventory: setInventory, mc_hep: setHepLib,
      };
      await Promise.all(
        Object.entries(setters).map(async ([table, setter]) => {
          try {
            const rows = await sb.select(table);
            if (rows && rows.length > 0) {
              // دمج: آخر تعديل يربح (LWW) + احترام شواهد الحذف (Tombstones)
              setter(local => {
                const localMap = Object.fromEntries(local.map(r => [r.id, r]));
                const merged = { ...localMap };
                for (const cr of rows) {
                  const lr = localMap[cr.id];
                  if (cr.deleted) {
                    // السجل محذوف سحابياً → أزله محلياً نهائياً (يمنع عودته)
                    delete merged[cr.id];
                    continue;
                  }
                  if (!lr || (cr.updated_at && (!lr.updated_at || cr.updated_at > lr.updated_at))) {
                    merged[cr.id] = cr;
                  }
                }
                // استبعاد أي سجل معلَّم محذوف محلياً
                return Object.values(merged)
                  .filter(r => !r.deleted)
                  .sort((a,b)=>(b.updated_at||'').localeCompare(a.updated_at||''));
              });
            }
          } catch(e) { /* table may not exist yet */ }
        })
      );
      // KV: settings & categories
      try {
        const cloudSettings = await sb.selectKV('settings');
        if (cloudSettings) setSettings(s => ({ ...s, ...cloudSettings }));
        const cloudCats = await sb.selectKV('categories');
        if (cloudCats) setCategories(cloudCats);
      } catch(e) {}

      const now = new Date().toISOString();
      setLastSync(now);
      setSyncStatus('online');
      showToast('✅ تمت المزامنة مع Supabase');
    } catch(e) {
      setSyncStatus('error');
      showToast('خطأ في المزامنة: ' + e.message, 'error');
    } finally {
      pullingRef.current = false;
    }
  }, []);

  // ── Push settings/categories to Supabase KV ──
  const pushKV = useCallback(async (key, value) => {
    if (!isOnline.current) { queueOp({ table: 'mc_kv', op: 'kv', data: { key, value } }); return; }
    try { await sb.upsertKV(key, value); } catch(e) {}
  }, []);

  // ── Realtime Subscriptions — التحديث الفوري على جميع الأجهزة ──
  useEffect(() => {
    // خريطة الجداول والـ setters المقابلة
    const tableSetterMap = {
      mc_patients:     setPatients,
      mc_records:      setRecords,
      mc_sessions:     setSessions,
      mc_appointments: setApts,
      mc_finance:      setFinance,
      mc_expenses:     setExpenses,
      mc_inbody:       setInbody,
      mc_notes:        setNotes,
      mc_staff:        setStaff,
      mc_inventory:    setInventory,
      mc_hep:          setHepLib,
    };

    // معالج التغييرات الواردة من Supabase Realtime
    const handleChange = (table, setter) => (payload) => {
      const { eventType, new: newRow, old: oldRow } = payload;
      // تطبيع السجل (دعم flat columns)
      const normalize = (row) => {
        if (!row) return null;
        if (row.data && typeof row.data === 'object') {
          return { ...row.data, id: row.id, updated_at: row.updated_at, deleted: row.deleted || row.data.deleted || false };
        }
        return row;
      };

      if (eventType === 'INSERT') {
        const rec = normalize(newRow);
        if (rec && rec.deleted) return;            // تجاهل السجلات المعلَّمة محذوفة
        if (rec) setter(prev => {
          if (prev.some(x => x.id === rec.id)) return prev; // تجنب التكرار
          return [rec, ...prev];
        });
      } else if (eventType === 'UPDATE') {
        const rec = normalize(newRow);
        if (rec && rec.deleted) {                  // حذف ناعم وارد → أزله محلياً
          setter(prev => prev.filter(x => x.id !== rec.id));
          return;
        }
        if (rec) setter(prev => {
          if (!prev.some(x => x.id === rec.id)) return [rec, ...prev]; // سجل غُيّر على جهاز آخر ولم يكن لدينا
          return prev.map(x => x.id === rec.id ? { ...x, ...rec } : x);
        });
      } else if (eventType === 'DELETE') {          // حذف فعلي (نادر) → أزله محلياً
        const id = oldRow?.id;
        if (id) setter(prev => prev.filter(x => x.id !== id));
      }
    };

    // الاشتراك في كل الجداول
    const channels = Object.entries(tableSetterMap).map(([table, setter]) =>
      sb.subscribeTable(table, handleChange(table, setter))
    );

    // مزامنة أولية عند الفتح
    const init = async () => {
      if (navigator.onLine) {
        await flushPending();
        await pullFromSupabase();
      }
    };
    const timer = setTimeout(init, 800);

    // Polling احتياطي كل 60 ثانية (في حال انقطع Realtime)
    const interval = setInterval(() => {
      if (navigator.onLine && document.visibilityState === 'visible') {
        pullFromSupabase();
      }
    }, 60000);

    // مزامنة عند العودة للنافذة
    const onVisible = () => {
      if (document.visibilityState === 'visible' && navigator.onLine) {
        pullFromSupabase();
      }
    };
    document.addEventListener('visibilitychange', onVisible);

    // مزامنة عند استعادة الإنترنت
    const onOnline = async () => {
      await flushPending();
      await pullFromSupabase();
    };
    window.addEventListener('online', onOnline);

    return () => {
      clearTimeout(timer);
      clearInterval(interval);
      document.removeEventListener('visibilitychange', onVisible);
      window.removeEventListener('online', onOnline);
      // إلغاء جميع اشتراكات Realtime عند تدمير المكوّن
      channels.forEach(ch => sb.unsubscribe(ch));
    };
  }, []);

  // Theme
  useEffect(()=>{
    const themes = {
      teal:{primary:'#1a5c6e',mid:'#1e7a8f',light:'#22a3c4',pale:'#a5f3fc',bg:'#ecfeff'},
      olive:{primary:'#4a5e1a',mid:'#6a8a2a',light:'#8aaa4a',pale:'#d8e8b8',bg:'#f3fae0'},
      green:{primary:'#065f46',mid:'#047857',light:'#10b981',pale:'#a7f3d0',bg:'#ecfdf5'},
      blue:{primary:'#1e40af',mid:'#2563eb',light:'#60a5fa',pale:'#bfdbfe',bg:'#eff6ff'},
      purple:{primary:'#5b21b6',mid:'#7c3aed',light:'#a78bfa',pale:'#ddd6fe',bg:'#f5f3ff'},
      charcoal:{primary:'#1f2937',mid:'#374151',light:'#6b7280',pale:'#d1d5db',bg:'#f9fafb'},
    };
    const t = themes[settings.theme] || themes.teal;
    const r = document.documentElement;
    r.style.setProperty('--primary', t.primary);
    r.style.setProperty('--primary-mid', t.mid);
    r.style.setProperty('--primary-light', t.light);
    r.style.setProperty('--primary-pale', t.pale);
    r.style.setProperty('--primary-bg', t.bg);
    document.documentElement.setAttribute('data-theme', settings.theme);
  }, [settings.theme]);

  const showToast = useCallback((msg, type='success') => {
    setToast({msg,type}); setTimeout(()=>setToast(null), 3000);
  }, []);

  const logAudit = useCallback((action, entity, entityId, details='') => {
    const roleLabel = {admin:'مدير',therapist:'معالج',reception:'استقبال'}[localStorage.getItem('mc_role')||''] || '';
    const base = (window.__MC_USER && window.__MC_USER.email) || settings.therapistName || 'مستخدم';
    const who = roleLabel ? (base+' ('+roleLabel+')') : base;
    const entry = {id:uid('AU'),timestamp:new Date().toISOString(),user:who,action,entity,entityId,details};
    setAudit(prev => [entry,...prev].slice(0,500));
  }, [settings.therapistName]);

  // ── CRUD helpers — Local + Supabase ──
  const CRUD = (setter, key, sbTable) => ({
    add: (data) => {
      const n = { ...data, id: data.id || uid(key), created_at: new Date().toISOString(), updated_at: new Date().toISOString() };
      setter(p => [n, ...p]);
      logAudit('CREATE', key, n.id);
      showToast('تمت الإضافة بنجاح ✓');
      if (sbTable) pushToSupabase(sbTable, 'upsert', n);
      return n;
    },
    update: (id, data) => {
      const updated = { ...data, id, updated_at: new Date().toISOString() };
      setter(p => p.map(x => x.id === id ? { ...x, ...updated } : x));
      logAudit('UPDATE', key, id);
      showToast('تم الحفظ ✓');
      if (sbTable) pushToSupabase(sbTable, 'upsert', updated);
    },
    delete: (id) => {
      setter(p => p.filter(x => x.id !== id));
      logAudit('DELETE', key, id);
      showToast('تم الحذف', 'info');
      if (sbTable) pushToSupabase(sbTable, 'delete', { id });
    },
  });

  const patCRUD  = CRUD(setPatients,  'P',      'mc_patients');
  const recCRUD  = CRUD(setRecords,   'REC',    'mc_records');
  const sesCRUD  = CRUD(setSessions,  'SS',     'mc_sessions');
  const aptCRUD  = CRUD(setApts,      'APT',    'mc_appointments');
  const finCRUD  = CRUD(setFinance,   'INV',    'mc_finance');
  const expCRUD  = CRUD(setExpenses,  'EXP',    'mc_expenses');
  const ibCRUD   = CRUD(setInbody,    'IB',     'mc_inbody');
  const noteCRUD = CRUD(setNotes,     'NOTE',   'mc_notes');
  const stfCRUD  = CRUD(setStaff,     'STAFF',  'mc_staff');
  const invCRUD  = CRUD(setInventory, 'INVSTK', 'mc_inventory');
  const hepCRUD  = CRUD(setHepLib,    'HEP',    'mc_hep');

  // Categories CRUD
  const addCatItem = (grp, label) => {
    const item = {id:uid('cat'),label};
    setCategories(p=>({...p,[grp]:[...(p[grp]||[]),item]}));
    showToast('تمت الإضافة ✓');
  };
  const updateCatItem = (grp, id, label) => {
    setCategories(p=>({...p,[grp]:p[grp].map(x=>x.id===id?{...x,label}:x)}));
    showToast('تم التعديل ✓');
  };
  const deleteCatItem = (grp, id) => {
    setCategories(p=>({...p,[grp]:p[grp].filter(x=>x.id!==id)}));
    showToast('تم الحذف','info');
  };
  const addCatGroup = (grp) => {
    setCategories(p=>({...p,[grp]:[]}));
    showToast('تمت إضافة المجموعة ✓');
  };
  const deleteCatGroup = (grp) => {
    setCategories(p=>{const n={...p};delete n[grp];return n;});
    showToast('تم الحذف','info');
  };
  const updateSettings = (d) => {
    const next = { ...settings, ...d };
    setSettings(next);
    showToast('تم حفظ الإعدادات ✓');
    pushKV('settings', next);
  };

  // Backup/Restore
  const exportBackup = () => {
    const data = {settings,categories,patients,records,sessions,appointments,finance,expenses,inbody,notes,staff,inventory,hepLib,audit,v:'6',ts:new Date().toISOString()};
    const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `MotionClinic_Backup_${today()}.json`;
    a.click();
    showToast('تم تصدير النسخة الاحتياطية ✓');
  };
  const importBackup = (json) => {
    const d = JSON.parse(json);
    if(d.settings)    setSettings(d.settings);
    if(d.categories)  setCategories(d.categories);
    if(d.patients)    setPatients(d.patients);
    if(d.records)     setRecords(d.records);
    if(d.sessions)    setSessions(d.sessions);
    if(d.appointments)setApts(d.appointments);
    if(d.finance)     setFinance(d.finance);
    if(d.expenses)    setExpenses(d.expenses);
    if(d.inbody)      setInbody(d.inbody);
    if(d.notes)       setNotes(d.notes);
    if(d.staff)       setStaff(d.staff);
    if(d.inventory)   setInventory(d.inventory);
    if(d.hepLib)      setHepLib(d.hepLib);
    showToast('تم استيراد البيانات بنجاح ✓');
  };

  // ── دمج آمن من ملف CSV الشامل: يضيف الناقص ويحدّث الأحدث فقط (بدون تكرار أو تضارب) ──
  const mergeImport = async (sections) => {
    const conf = {
      patients:[patients, setPatients, 'mc_patients'],
      records:[records, setRecords, 'mc_records'],
      sessions:[sessions, setSessions, 'mc_sessions'],
      appointments:[appointments, setApts, 'mc_appointments'],
      finance:[finance, setFinance, 'mc_finance'],
      expenses:[expenses, setExpenses, 'mc_expenses'],
      inbody:[inbody, setInbody, 'mc_inbody'],
      notes:[notes, setNotes, 'mc_notes'],
      staff:[staff, setStaff, 'mc_staff'],
      inventory:[inventory, setInventory, 'mc_inventory'],
      hepLib:[hepLib, setHepLib, 'mc_hep'],
    };
    let added=0, updated=0, skipped=0;
    const toPush=[];
    Object.entries(sections).forEach(([sec, rows])=>{
      const c = conf[sec];
      if(!c || !Array.isArray(rows) || !rows.length) return;
      const [cur, setter, tbl] = c;
      const byId = new Map((cur||[]).map(r=>[String(r.id), r]));
      rows.forEach(r=>{
        const id = (r.id!=null && r.id!=='') ? String(r.id) : '';
        if(!id) return;
        const ex = byId.get(id);
        if(!ex){ byId.set(id, r); added++; toPush.push([tbl, r]); }
        else if((r.updated_at||'') > (ex.updated_at||'')){ const m={...ex, ...r}; byId.set(id, m); updated++; toPush.push([tbl, m]); }
        else skipped++;
      });
      setter(Array.from(byId.values()));
    });
    // ادفع الجديد/المحدّث فقط إلى Supabase (upsert بالمعرّف = لا تكرار)
    for(const [tbl, rec] of toPush){ try{ await pushToSupabase(tbl, 'upsert', rec); }catch(e){} }
    showToast('تم الدمج: '+added+' جديد · '+updated+' محدّث · '+skipped+' دون تغيير ✓');
    return {added, updated, skipped};
  };

  const resetSystem = () => {
    // إعادة ضبط محلية فقط — تُفرّغ كل السجلات وتُبقي الإعدادات والتصنيفات الافتراضية.
    setSettings(DEF_SETTINGS); setCategories(DEF_CATEGORIES);
    setPatients([]); setRecords([]); setSessions([]);
    setApts([]); setFinance([]); setExpenses([]);
    setInbody([]); setNotes([]); setStaff([]);
    setInventory([]); setHepLib([]); setAudit([]);
  };

  // ── نسخ احتياطي تلقائي محلي (لقطات) — حماية إضافية ضد فقدان البيانات ──
  React.useEffect(()=>{
    try{
      const last = parseInt(localStorage.getItem('mc6_snap_ts')||'0',10);
      if(Date.now()-last < 12*3600*1000) return; // كل 12 ساعة
      if((patients.length+records.length+sessions.length)===0) return; // لا تحفظ نظاماً فارغاً
      const snap = {ts:new Date().toISOString(), counts:{patients:patients.length,sessions:sessions.length,finance:finance.length},
        data:{patients,records,sessions,appointments,finance,expenses,inbody,notes,staff,inventory,hepLib}};
      const arr = JSON.parse(localStorage.getItem('mc6_snapshots')||'[]');
      arr.unshift(snap);
      localStorage.setItem('mc6_snapshots', JSON.stringify(arr.slice(0,5)));
      localStorage.setItem('mc6_snap_ts', String(Date.now()));
    }catch(e){}
  }, [patients,records,sessions,appointments,finance,expenses,inbody]);

  const value = {
    settings, categories, patients, records, sessions, appointments, finance, expenses,
    inbody, notes, staff, inventory, hepLib, audit, toast, showToast,
    // Sync state
    syncStatus, lastSync, pendingCount, pullFromSupabase, flushPending,
    // Patient CRUD
    addPatient:patCRUD.add, updatePatient:patCRUD.update, deletePatient:patCRUD.delete,
    // Record CRUD
    addRecord:recCRUD.add, updateRecord:recCRUD.update, deleteRecord:recCRUD.delete,
    // Sessions CRUD
    addSession:sesCRUD.add, updateSession:sesCRUD.update, deleteSession:sesCRUD.delete,
    // Appointment CRUD
    addAppointment:aptCRUD.add, updateAppointment:aptCRUD.update, deleteAppointment:aptCRUD.delete,
    // Finance CRUD
    addFinance:finCRUD.add, updateFinance:finCRUD.update, deleteFinance:finCRUD.delete,
    // Expense CRUD
    addExpense:expCRUD.add, updateExpense:expCRUD.update, deleteExpense:expCRUD.delete,
    // InBody CRUD
    addInbody:ibCRUD.add, updateInbody:ibCRUD.update, deleteInbody:ibCRUD.delete,
    // Notes CRUD
    addNote:noteCRUD.add, updateNote:noteCRUD.update, deleteNote:noteCRUD.delete,
    // Staff CRUD
    addStaff:stfCRUD.add, updateStaff:stfCRUD.update, deleteStaff:stfCRUD.delete,
    // Inventory CRUD
    addInventory:invCRUD.add, updateInventory:invCRUD.update, deleteInventory:invCRUD.delete,
    // HEP CRUD
    addHep:hepCRUD.add, updateHep:hepCRUD.update, deleteHep:hepCRUD.delete,
    // Categories
    addCatItem, updateCatItem, deleteCatItem, addCatGroup, deleteCatGroup,
    // Settings
    updateSettings, exportBackup, importBackup, mergeImport, resetSystem,
  };

  return (
    <ClinicCtx.Provider value={value}>
      {children}
      {toast && (
        <div style={{
          position:'fixed',bottom:24,left:'50%',transform:'translateX(-50%)',
          background: toast.type==='info'?'var(--text-mid)':toast.type==='error'?'var(--red)':'var(--green)',
          color:'#fff',padding:'12px 24px',borderRadius:12,fontWeight:700,fontSize:14,
          zIndex:9999,boxShadow:'var(--shadow-xl)',animation:'slideUp 0.3s',
        }}>{toast.type==='success'?'✓ ':toast.type==='info'?'ℹ ':'✕ '}{toast.msg}</div>
      )}
    </ClinicCtx.Provider>
  );
}

// SHARED UI COMPONENTS

function Field({label,children}){return(<div className="form-group"><label className="form-label">{label}</label>{children}</div>);}
function TF({label,value,onChange,type='text',placeholder='',required=false}){
  return(<Field label={label}><input className="input" type={type} value={value||''} onChange={e=>onChange(e.target.value)} placeholder={placeholder} required={required}/></Field>);
}
function SF({label,value,onChange,options=[]}){
  return(<Field label={label}><select className="input" value={value||''} onChange={e=>onChange(e.target.value)}>
    {options.map(o=>typeof o==='string'?<option key={o} value={o}>{o}</option>:<option key={o.value} value={o.value}>{o.label}</option>)}
  </select></Field>);
}
function TA({label,value,onChange,placeholder='',rows=3}){
  return(<Field label={label}><textarea className="input" value={value||''} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows}/></Field>);
}

function StatusBadge({status}){
  const map = {
    'نشط':'green','active':'green','confirmed':'green','مدفوع':'green','completed':'green',
    'متوقف':'gray','pending':'yellow','محجوز':'yellow','قيد التنفيذ':'yellow','جزئي':'yellow',
    'ملغي':'red','cancelled':'red','done':'blue','تم':'blue',
    'منتهي':'gray','missed':'red',
  };
  const c = map[status]||'gray';
  return <span className={`badge badge-${c}`}>{status}</span>;
}

function VASBadge({value}){
  const v = +value||0;
  const c = v<=3?'green':v<=6?'yellow':'red';
  return <span className={`badge badge-${c}`}>VAS {v}/10</span>;
}

function VASSlider({value,onChange}){
  const v = +value||0;
  const colors = ['#059669','#059669','#059669','#16a34a','#ca8a04','#d97706','#ea580c','#ef4444','#dc2626','#b91c1c','#991b1b'];
  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
        <span style={{fontSize:13,fontWeight:700,color:'var(--text-mid)'}}>شدة الألم</span>
        <span style={{fontSize:18,fontWeight:900,color:colors[v]}}>{v}/10</span>
      </div>
      <input type="range" min={0} max={10} value={v} onChange={e=>onChange(+e.target.value)}
        style={{width:'100%',accentColor:colors[v]}}/>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--text-light)',marginTop:4}}>
        <span>لا ألم</span><span>متوسط</span><span>أشد ألم</span>
      </div>
    </div>
  );
}

function InfoGrid({items}){
  return(
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,fontSize:13}}>
      {items.map(([l,v])=>v&&v!=='-'?(<div key={l} style={{padding:'10px 12px',background:'var(--surface)',borderRadius:8}}>
        <div style={{fontSize:11,color:'var(--text-light)',marginBottom:3,fontWeight:700}}>{l}</div>
        <div style={{fontWeight:800,color:'var(--text-dark)'}}>{v||'—'}</div>
      </div>):null)}
    </div>
  );
}

// DASHBOARD
// ══════════════════════════════════════════════════
function Dashboard({navigate}){
  const {patients,appointments,records,sessions,finance,expenses,inventory,inbody,settings} = useClinic();
  const todayStr = today();
  const todayApts = appointments.filter(a=>a.date===todayStr);
  const totalRev = finance.filter(f=>f.status==='مدفوع').reduce((s,f)=>s+(f.paid||0),0);
  const totalExp = expenses.reduce((s,e)=>s+(e.amount||0),0);
  const lowStock = inventory.filter(i=>i.quantity<=i.minLevel);
  const activePatients = patients.filter(p=>p.status==='نشط').length;
  const cur = settings.currency || 'ل.س';
  const todaySessions = sessions.filter(s=>s.date===todayStr);
  const todayRev = todaySessions.reduce((s,x)=>s+(x.paid||0),0);
  const outstanding = finance.reduce((s,f)=>s+(f.remaining||0),0);
  // مرضى منقطعون: آخر جلسة لهم منذ أكثر من 21 يوماً
  const lastSesMap = {};
  sessions.forEach(s=>{ if(s.patientId && (!lastSesMap[s.patientId] || s.date>lastSesMap[s.patientId])) lastSesMap[s.patientId]=s.date; });
  const dayMs = 86400000;
  const lapsedList = patients.filter(p=>{ const d=lastSesMap[p.id]; if(!d) return false; const days=(Date.now()-new Date(d).getTime())/dayMs; return days>21 && days<180; })
    .map(p=>({...p, last:lastSesMap[p.id], days:Math.floor((Date.now()-new Date(lastSesMap[p.id]).getTime())/dayMs)}))
    .sort((a,b)=>b.days-a.days);
  const lapsed = lapsedList.length;
  const remindApt = (a) => {
    const p = patients.find(x=>String(x.id)===String(a.patientId)) || {};
    let ph=(p.phone||a.phone||'').replace(/[^0-9]/g,''); if(ph.startsWith('0')) ph='963'+ph.slice(1);
    if(!ph){ alert('لا يوجد رقم هاتف لهذا المريض.'); return; }
    const msg = `مرحباً ${a.patientName||''} 🌿\nنذكّركم بموعدكم في ${settings.clinicName||'العيادة'} اليوم ${a.date} الساعة ${a.time}.\nبانتظاركم 🙏`;
    window.open(`https://wa.me/${ph}?text=${encodeURIComponent(msg)}`,'_blank');
  };
  const recallPatient = (p) => {
    let ph=(p.phone||'').replace(/[^0-9]/g,''); if(ph.startsWith('0')) ph='963'+ph.slice(1);
    if(!ph){ alert('لا يوجد رقم هاتف لهذا المريض.'); return; }
    const msg = `مرحباً ${p.name||''} 🌿\nنفتقد متابعتكم في ${settings.clinicName||'العيادة'}! مضى ${p.days} يوماً على آخر جلسة.\nنسعد بحجز موعد لمتابعة تحسّنكم. تواصلوا معنا 🙏`;
    window.open(`https://wa.me/${ph}?text=${encodeURIComponent(msg)}`,'_blank');
  };

  // ── تقرير المالك (Owner BI) ──
  const ym = new Date().toISOString().slice(0,7);
  const newThisMonth = patients.filter(p=>(p.registeredAt||p.created_at||'').startsWith(ym)).length;
  const sesCountByPat = {}; sessions.forEach(s=>{ if(s.patientId) sesCountByPat[s.patientId]=(sesCountByPat[s.patientId]||0)+1; });
  const returningPatients = Object.values(sesCountByPat).filter(c=>c>1).length;
  const paidByPat = {}; finance.forEach(f=>{ if(f.patientId) paidByPat[f.patientId]=(paidByPat[f.patientId]||0)+(f.paid||0); });
  const payingCount = Object.values(paidByPat).filter(v=>v>0).length;
  const avgRevPerPat = payingCount>0 ? Math.round(Object.values(paidByPat).reduce((s,v)=>s+v,0)/payingCount) : 0;
  const totalApt = appointments.length;
  const missedApt = appointments.filter(a=>a.status==='missed'||a.status==='cancelled').length;
  const noShowRate = totalApt>0 ? Math.round(missedApt/totalApt*100) : 0;
  const activeLast30 = patients.filter(p=>{ const d=lastSesMap[p.id]; return d && (Date.now()-new Date(d).getTime())<30*dayMs; }).length;
  const retentionRate = patients.length>0 ? Math.round(activeLast30/patients.length*100) : 0;
  // عائد كل مصدر تسويقي
  const srcMap = {};
  patients.forEach(p=>{ const s=p.source||'غير محدد'; if(!srcMap[s]) srcMap[s]={count:0,rev:0}; srcMap[s].count++; srcMap[s].rev+=(paidByPat[p.id]||0); });
  const srcRows = Object.entries(srcMap).sort((a,b)=>b[1].rev-a[1].rev);
  const printOwnerReport = () => {
    const w=window.open('','_blank'); if(!w){alert('فعّل النوافذ المنبثقة.');return;}
    const card=(v,l,c)=>`<div class="c"><div class="v" style="color:${c}">${v}</div><div class="l">${l}</div></div>`;
    const srcTr=srcRows.map(([s,o])=>`<tr><td>${s}</td><td style="text-align:center">${o.count}</td><td style="text-align:left;font-weight:700;color:#059669">${fmt(o.rev)} ${cur}</td><td style="text-align:left">${o.count>0?fmt(Math.round(o.rev/o.count)):0} ${cur}</td></tr>`).join('');
    w.document.write(`<!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8"><title>تقرير المالك</title>
<style>@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap');*{margin:0;padding:0;box-sizing:border-box}body{font-family:Cairo,sans-serif;padding:30px;max-width:840px;margin:auto;color:#1e293b}
.h{background:linear-gradient(135deg,#0B3D5C,#1B7A7E);color:#fff;padding:24px;border-radius:14px;margin-bottom:20px}.h h1{font-size:22px}.h p{opacity:.9;font-size:13px;margin-top:4px}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}.c{border:1px solid #e2e8f0;border-radius:10px;padding:14px;text-align:center}.c .v{font-size:19px;font-weight:800}.c .l{font-size:11px;color:#64748b;margin-top:3px}
h2{font-size:16px;color:#0B3D5C;border-right:4px solid #B8893A;padding-right:10px;margin:22px 0 10px}
table{width:100%;border-collapse:collapse}th,td{padding:9px 12px;border:1px solid #e2e8f0;font-size:13px;text-align:right}th{background:#0B3D5C;color:#fff}
.foot{margin-top:26px;text-align:center;font-size:12px;color:#94a3b8}@media print{.noprint{display:none}}</style></head><body>
<div class="h"><h1>📊 تقرير المالك — ${settings.clinicName||'Motion Clinic'}</h1><p>${new Date().toLocaleDateString('ar-EG',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</p></div>
<div class="cards">
${card(patients.length,'إجمالي المرضى','#0B3D5C')}
${card(newThisMonth,'مرضى جدد هذا الشهر','#059669')}
${card(returningPatients,'مرضى عائدون','#2563eb')}
${card(fmt(avgRevPerPat)+' '+cur,'متوسط الإيراد/مريض','#7c3aed')}
${card(retentionRate+'%','معدل الاحتفاظ (30 يوم)','#0891b2')}
${card(noShowRate+'%','معدل الغياب','#dc2626')}
${card(lapsed,'مرضى منقطعون','#d97706')}
${card(fmt(outstanding)+' '+cur,'ذمم مستحقة','#dc2626')}
</div>
<h2>عائد كل مصدر تسويقي (ROI)</h2>
<table><thead><tr><th>المصدر</th><th>عدد المرضى</th><th style="text-align:left">إجمالي الإيراد</th><th style="text-align:left">متوسط/مريض</th></tr></thead><tbody>${srcTr||'<tr><td colspan=4 style="text-align:center;color:#888">لا بيانات</td></tr>'}</tbody></table>
<div class="foot">${settings.clinicName||'Motion Clinic'} — ${settings.phone||''}</div>
<div class="noprint" style="text-align:center;margin-top:20px"><button onclick="window.print()" style="background:#1B7A7E;color:#fff;border:0;padding:12px 30px;border-radius:10px;font-family:Cairo;font-size:15px;font-weight:700;cursor:pointer">🖨️ طباعة / PDF</button></div>
</body></html>`); w.document.close();
  };

  return(
    <div className="page-content">
      <div className="page-header">
        <div>
          <h1 className="page-title">🏠 لوحة التحكم الرئيسية</h1>
          <p className="page-subtitle">{new Date().toLocaleDateString('ar-EG',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</p>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-secondary" onClick={printOwnerReport}>📊 تقرير المالك</button>
          <button className="btn btn-accent" onClick={()=>navigate('patients','new')}>+ مريض جديد</button>

function PatientsList({navigate}){

  // فهرس بحث فوري متسامح (مطبّع) — يُحسب مرة ويُعاد فقط عند تغيّر القائمة
  const searchIndex = useMemo(()=> patients.map(p=>({
    p, hay: normAr([p.name,p.phone,p.id,p.email,p.diagnosis,p.address].filter(Boolean).join(' '))
  })), [patients]);
  const q = normAr(search);
  const filtered = searchIndex.filter(({p,hay})=>{
    const ms = !q || hay.includes(q);
    const mf = filter==='الكل' || p.status===filter || p.gender===filter;

  }).map(x=>x.p);

  return(
    <div className="page-content">

          <input className="input" placeholder="🔍 اسم، هاتف، ID..." value={search} onChange={e=>setSearch(e.target.value)} style={{flex:1,minWidth:200}}/>
          {['الكل','نشط','متوقف','ذكر','أنثى'].map(f=>(
            <button key={f} className={`btn ${filter===f?'btn-primary':'btn-secondary'}`} onClick={()=>setFilter(f)}>{f}</button>
          ))}
        </div>
        <table className="data-table">
          <thead><tr><th>ID</th><th>الاسم</th><th>الهاتف</th><th>العمر</th><th>الجنس</th><th>المصدر</th><th>الحالة</th><th>إجراءات</th></tr></thead>
          <tbody>
            {filtered.map(p=>(
              <tr key={p.id}>

                <td><strong style={{cursor:'pointer',color:'var(--primary)'}} onClick={()=>navigate('patient',p.id)}>{p.name}</strong></td>
                <td>{p.phone}</td>

// مرفقات المريض — صور الأشعة / تقارير InBody PDF / صور / مستندات
// السحابة: Supabase Storage + فهرس في mc_kv (يتزامن بين الأجهزة)
// المحلي: IndexedDB (يعمل دون إنترنت + إعادة رفع تلقائية)
// ══════════════════════════════════════════════════
function FileAttachments({patient}){
  const pid = patient.id;
  const kvKey = 'files_'+pid;
  const idbKey = 'mc6_'+kvKey;
  const [list,setList] = useState([]);
  const [busy,setBusy] = useState(false);
  const [msg,setMsg]   = useState('');
  const fileRef = useRef(null);

  useEffect(()=>{ (async()=>{
    let l=null;
    try{ l = await sb.selectKV(kvKey); }catch(e){}
    if(!Array.isArray(l)){ try{ l = await idbGet(idbKey); }catch(e){} }
    setList(Array.isArray(l)?l:[]);
  })(); }, [pid]);

  const saveList = async (nl)=>{ setList(nl); idbSet(idbKey, nl); try{ await sb.upsertKV(kvKey, nl); }catch(e){} };
  const fileIcon = (t='')=> t.includes('pdf')?'📄' : t.startsWith('image')?'🖼️' : (t.includes('word')||t.includes('doc'))?'📝' : '📎';
  const human = (b=0)=> b>1048576? (b/1048576).toFixed(1)+' MB' : b>1024? (b/1024).toFixed(0)+' KB' : b+' B';

  const onPick = async (e)=>{
    const files = Array.from(e.target.files||[]); if(!files.length) return;
    setBusy(true); setMsg('جارٍ الرفع…');
    let nl = [...list];
    for(const f of files){
      const safe = (f.name||'file').replace(/[^\w.\-]+/g,'_');
      const path = `${pid}/${Date.now()}_${safe}`;
      const meta = {path, name:f.name, type:f.type, size:f.size, uploadedAt:new Date().toISOString(), url:'', pending:false};
      try{ await idbSet(path, f, IDB_FILES); }catch(err){}
      try{ meta.url = await sb.uploadFile(path, f); }
      catch(err){ meta.pending = true; }
      nl = [meta, ...nl];
    }
    await saveList(nl); setBusy(false);
    if(fileRef.current) fileRef.current.value='';
    setMsg(nl.some(x=>x.pending)?'حُفظ محلياً (سيُرفع عند عودة الإنترنت)':'تم الحفظ ✓');
    setTimeout(()=>setMsg(''),3000);
  };

  const openFile = async (m)=>{
    if(m.url){ window.open(m.url,'_blank'); return; }
    try{ const blob = await idbGet(m.path, IDB_FILES); if(blob){ window.open(URL.createObjectURL(blob),'_blank'); return; } }catch(e){}
    alert('الملف غير متاح دون اتصال على هذا الجهاز.');
  };
  const retry = async (m)=>{
    setBusy(true);
    try{ const blob = await idbGet(m.path, IDB_FILES); if(!blob) throw new Error('النسخة المحلية غير موجودة');
      const url = await sb.uploadFile(m.path, blob);
      await saveList(list.map(x=>x.path===m.path?{...x,url,pending:false}:x));
    }catch(e){ alert('تعذّر الرفع: '+e.message); }
    setBusy(false);
  };
  const del = async (m)=>{
    if(!confirm('حذف الملف؟\n'+m.name)) return;
    try{ await sb.removeFile(m.path); }catch(e){}
    try{ await idbDel(m.path, IDB_FILES); }catch(e){}
    await saveList(list.filter(x=>x.path!==m.path));
  };

  return (
    <div className="card">
      <div className="card-header">
        <h3>📎 الملفات والمرفقات ({list.length})</h3>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {msg && <span style={{fontSize:12,color:'#059669',fontWeight:700}}>{msg}</span>}
          <button className="btn btn-accent btn-sm" disabled={busy} onClick={()=>fileRef.current&&fileRef.current.click()}>{busy?'⏳ جارٍ…':'+ رفع ملف'}</button>
          <input ref={fileRef} type="file" multiple accept="image/*,application/pdf,.doc,.docx" style={{display:'none'}} onChange={onPick}/>
        </div>
      </div>
      <div className="card-body" style={{padding:'12px 16px'}}>
        <div style={{fontSize:12,color:'var(--text-light)',marginBottom:10}}>صور الأشعة · تقارير InBody (PDF) · صورة المريض · مستندات. تُحفظ في السحابة وتظهر على كل الأجهزة.</div>
        {list.length===0?(
          <div className="empty-state" style={{padding:'28px'}}><div className="icon">📎</div><h3>لا مرفقات بعد</h3></div>
        ):(
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(150px,1fr))',gap:10}}>
            {list.map(m=>(
              <div key={m.path} style={{border:'1px solid var(--border)',borderRadius:10,padding:10,background:'var(--surface)'}}>
                <div onClick={()=>openFile(m)} style={{cursor:'pointer',textAlign:'center'}}>
                  {m.type&&m.type.startsWith('image')&&m.url
                    ? <img src={m.url} alt={m.name} style={{width:'100%',height:90,objectFit:'cover',borderRadius:6}}/>
                    : <div style={{fontSize:38,padding:'14px 0'}}>{fileIcon(m.type)}</div>}
                  <div style={{fontSize:12,fontWeight:700,marginTop:6,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={m.name}>{m.name}</div>
                  <div style={{fontSize:11,color:'var(--text-light)'}}>{human(m.size)} · {(m.uploadedAt||'').slice(0,10)}</div>
                </div>
                <div style={{display:'flex',justifyContent:'center',gap:6,marginTop:8}}>
                  {m.pending && <button className="row-action-btn" title="إعادة الرفع" style={{color:'#d97706'}} onClick={()=>retry(m)}>⬆️</button>}
                  <button className="row-action-btn" title="فتح" onClick={()=>openFile(m)}>👁️</button>
                  <button className="row-action-btn danger" title="حذف" onClick={()=>del(m)}>🗑</button>
                </div>
                {m.pending && <div style={{fontSize:10,color:'#d97706',textAlign:'center',marginTop:4}}>بانتظار الرفع للسحابة</div>}
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

        {tab==='files' && <FileAttachments patient={patient}/>}

      </div>

      {/* Modals */}

      {modal?.type==='record'&&<RecordModal patientId={patientId} record={modal.data} onClose={closeModal}/>}
      {modal?.type==='session'&&<SessionModal patientId={patientId} patient={patient} session={modal.data} onClose={closeModal}/>}

      {modal?.type==='note'&&<NoteModal patientId={patientId} note={modal.data} onClose={closeModal}/>}
    </div>
  );
}
